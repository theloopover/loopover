<style>
  :root {
    --bg: #f4f1ea; --surface: #ffffff; --line: #e3ddcf;
    --fg: #0a0a0a; --muted: #6b6357;
    --accent: #ff4d2e; --accent2: #0a0a0a; --ink: #0a0a0a;

    --display: 'Bricolage Grotesque', system-ui, sans-serif;
    --body: 'DM Sans', system-ui, sans-serif;
    --mono: 'JetBrains Mono', ui-monospace, monospace;
    --display-weight: 800;
    --tight: -0.04em;

    --section-pad: 96px;
    --hero-pad: 96px;
    --grid-gap: 24px;
    --maxw: 1320px;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--fg);
    font-family: var(--body);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    text-rendering: optimizeLegibility;
    overflow-x: hidden;
    padding-left: env(safe-area-inset-left);
    padding-right: env(safe-area-inset-right);
  }
  .container { max-width: var(--maxw); margin: 0 auto; padding: 0 32px; }
  a { color: inherit; }
  ::selection { background: var(--accent); color: var(--ink); }

  /* Mobile menu button & drawer */
  .nav-menu-btn { display: none; }
  .nav-menu-btn {
    width: 40px; height: 40px; border-radius: 999px; border: 1px solid var(--line);
    background: var(--surface); color: var(--fg);
    align-items: center; justify-content: center;
    cursor: pointer; padding: 0;
  }
  .nav-menu-btn svg { display: block; }
  .nav-drawer {
    position: fixed; left: 0; right: 0; top: 64px; z-index: 49;
    background: var(--bg); border-top: 1px solid var(--line); border-bottom: 1px solid var(--line);
    padding: 16px 20px 24px;
    display: flex; flex-direction: column; gap: 6px;
    transform: translateY(-8px); opacity: 0; pointer-events: none;
    transition: opacity .2s ease, transform .25s ease;
  }
  .nav-drawer.open { transform: translateY(0); opacity: 1; pointer-events: auto; }
  .nav-drawer a {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 4px; text-decoration: none; color: var(--fg);
    font-family: var(--mono); font-size: 13px; letter-spacing: .12em; text-transform: uppercase;
    border-bottom: 1px solid var(--line);
  }
  .nav-drawer a:last-child { border-bottom: none; }
  .nav-drawer .nav-cta {
    margin-top: 12px; justify-content: center; border-bottom: none;
    background: var(--accent); color: var(--ink); border-radius: 999px; padding: 14px 18px;
    font-weight: 700;
  }

  /* Responsive */
  @media (max-width: 960px) {
    .privacy-grid { grid-template-columns: minmax(0, 1fr) !important; gap: 24px !important; }
    .privacy-toc { position: static !important; padding-bottom: 12px !important;
                   border-bottom: 1px solid var(--line); }
    .partners-grid { grid-template-columns: minmax(0, 1fr) !important; }
    .optout-grid { grid-template-columns: minmax(0, 1fr) !important; }
    .footer-grid { grid-template-columns: minmax(0, 1fr) minmax(0, 1fr) !important; }
  }
  @media (max-width: 768px) {
    .nav-links { display: none !important; }
    .nav-menu-btn { display: inline-flex; }
  }
  @media (max-width: 640px) {
    .container { padding: 0 20px; }
  }
  @media (max-width: 480px) {
    .container { padding: 0 16px; }
    .footer-grid { grid-template-columns: 1fr !important; }
  }

  button { font-family: inherit; }
  select { font-family: inherit; -webkit-appearance: none; appearance: none; cursor: pointer; }
</style>
