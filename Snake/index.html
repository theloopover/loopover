<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classic Snake</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #1a1a1a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #ececec;
            overflow: hidden;
        }

        .game-container {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header {
            width: 400px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 12px;
        }

        .score-box {
            display: flex;
            flex-direction: column;
        }

        .score-label {
            font-size: 10px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        #score, #highScore {
            font-size: 24px;
            font-weight: bold;
            color: #4CAF50;
        }

        #highScore {
            color: #FFD700; /* Gold color for high score */
        }

        canvas {
            background-color: #242424;
            border-radius: 8px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }

        #overlay {
            position: absolute;
            top: 56px; 
            left: 0;
            width: 400px;
            height: 400px;
            background: rgba(26, 26, 26, 0.9);
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            z-index: 10;
        }

        #overlay h2 { margin: 0 0 10px 0; font-size: 28px; color: #fff; }
        #overlay p { margin: 0; font-size: 16px; color: #aaa; line-height: 1.5; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="game-container">
        <div class="header">
            <div class="score-box">
                <span class="score-label">Current</span>
                <div id="score">0</div>
            </div>
            <div class="score-box" style="text-align: right;">
                <span class="score-label">Best</span>
                <div id="highScore">0</div>
            </div>
        </div>
        
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        
        <div id="overlay">
            <h2 id="overlay-title">SNAKE</h2>
            <p>Press <strong>Arrows</strong> or <strong>WASD</strong><br>to Start</p>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const highScoreElement = document.getElementById('highScore');
        const overlay = document.getElementById('overlay');
        const overlayTitle = document.getElementById('overlay-title');

        // Audio Engine
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx;

        function playSound(type) {
            if (!audioCtx) audioCtx = new AudioContext();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            if (type === 'eat') {
                osc.type = 'square';
                osc.frequency.setValueAtTime(450, audioCtx.currentTime); 
                osc.frequency.exponentialRampToValueAtTime(800, audioCtx.currentTime + 0.08);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.08);
                osc.start(); osc.stop(audioCtx.currentTime + 0.08);
            } else if (type === 'die') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(220, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 0.4);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
                osc.start(); osc.stop(audioCtx.currentTime + 0.4);
            }
        }

        // Game State
        const grid = 20;
        let fps = 10;
        let score = 0;
        let highScore = localStorage.getItem('snakeHighScore') || 0;
        highScoreElement.innerText = highScore;

        let isPlaying = false;
        let gameLoopTimeout;

        let snake = { x: 160, y: 160, dx: grid, dy: 0, cells: [], maxCells: 4 };
        let food = { x: 320, y: 320 };

        function getRandomInt(min, max) { return Math.floor(Math.random() * (max - min)) + min; }

        function resetGame() {
            snake.x = 160; snake.y = 160; snake.cells = []; snake.maxCells = 4;
            snake.dx = grid; snake.dy = 0; score = 0;
            scoreElement.innerText = score;
            placeFood();
        }

        function placeFood() {
            food.x = getRandomInt(0, 20) * grid;
            food.y = getRandomInt(0, 20) * grid;
            snake.cells.forEach(cell => { if (cell.x === food.x && cell.y === food.y) placeFood(); });
        }

        function loop() {
            if (!isPlaying) return;
            gameLoopTimeout = setTimeout(() => { requestAnimationFrame(loop); }, 1000 / fps);
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            snake.x += snake.dx; snake.y += snake.dy;

            if (snake.x < 0) snake.x = canvas.width - grid;
            else if (snake.x >= canvas.width) snake.x = 0;
            if (snake.y < 0) snake.y = canvas.height - grid;
            else if (snake.y >= canvas.height) snake.y = 0;

            snake.cells.unshift({ x: snake.x, y: snake.y });
            if (snake.cells.length > snake.maxCells) snake.cells.pop();

            ctx.fillStyle = '#ff4757';
            ctx.beginPath();
            ctx.arc(food.x + grid / 2, food.y + grid / 2, grid / 2 - 2, 0, Math.PI * 2);
            ctx.fill();

            snake.cells.forEach(function (cell, index) {
                ctx.fillStyle = (index === 0) ? '#45a049' : '#4CAF50';
                ctx.fillRect(cell.x + 1, cell.y + 1, grid - 2, grid - 2);
                for (let i = index + 1; i < snake.cells.length; i++) {
                    if (cell.x === snake.cells[i].x && cell.y === snake.cells[i].y) gameOver();
                }
            });

            if (snake.x === food.x && snake.y === food.y) {
                snake.maxCells++;
                score += 10;
                scoreElement.innerText = score;
                playSound('eat');
                if (score > highScore) {
                    highScore = score;
                    highScoreElement.innerText = highScore;
                    localStorage.setItem('snakeHighScore', highScore);
                }
                placeFood();
            }
        }

        function startGame() {
            if (!isPlaying) {
                overlay.classList.add('hidden');
                isPlaying = true;
                resetGame();
                requestAnimationFrame(loop);
            }
        }

        function gameOver() {
            if (isPlaying) playSound('die');
            isPlaying = false;
            clearTimeout(gameLoopTimeout);
            overlayTitle.innerText = "GAME OVER";
            overlay.classList.remove('hidden');
        }

        document.addEventListener('keydown', function (e) {
            if(["ArrowUp","ArrowDown","ArrowLeft","ArrowRight"," "].indexOf(e.key) > -1) e.preventDefault();
            const key = e.key.toLowerCase();
            if ((key === 'arrowleft' || key === 'a') && snake.dx === 0) { snake.dx = -grid; snake.dy = 0; startGame(); }
            else if ((key === 'arrowup' || key === 'w') && snake.dy === 0) { snake.dy = -grid; snake.dx = 0; startGame(); }
            else if ((key === 'arrowright' || key === 'd') && snake.dx === 0) { snake.dx = grid; snake.dy = 0; startGame(); }
            else if ((key === 'arrowdown' || key === 's') && snake.dy === 0) { snake.dy = grid; snake.dx = 0; startGame(); }
        });
    </script>
</body>
</html>
