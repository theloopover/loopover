<style>
  :root {
    /* Defaults (overridden in JS) */
    --bg: #0a0a0a; --surface: #141414; --line: #222;
    --fg: #f4f1ea; --muted: #9a948a;
    --accent: #ff4d2e; --accent2: #ffd23f; --ink: #0a0a0a;

    --display: 'Bricolage Grotesque', system-ui, sans-serif;
    --body: 'DM Sans', system-ui, sans-serif;
    --mono: 'JetBrains Mono', ui-monospace, monospace;
    --display-weight: 800;
    --tight: -0.04em;

    --section-pad: 96px;
    --hero-pad: 96px;
    --grid-gap: 24px;
    --card-pad: 18px;

    --maxw: 1320px;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--fg);
    font-family: var(--body);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    text-rendering: optimizeLegibility;
    overflow-x: hidden;
    padding-left: env(safe-area-inset-left);
    padding-right: env(safe-area-inset-right);
  }

  .container {
    max-width: var(--maxw);
    margin: 0 auto;
    padding: 0 32px;
  }

  a { color: inherit; }
  ::selection { background: var(--accent); color: var(--ink); }

  /* Marquee/drift animation */
  @keyframes drift {
    from { transform: translateX(0); }
    to   { transform: translateX(-50%); }
  }
  @media (prefers-reduced-motion: reduce) {
    .phone-carousel > div { animation: none !important; }
  }

  /* Mobile menu button & drawer */
  .nav-menu-btn { display: none; }
  .nav-menu-btn {
    width: 40px; height: 40px; border-radius: 999px; border: 1px solid var(--line);
    background: var(--surface); color: var(--fg);
    align-items: center; justify-content: center;
    cursor: pointer; padding: 0;
  }
  .nav-menu-btn svg { display: block; }
  .nav-drawer {
    position: fixed; left: 0; right: 0; top: 64px; z-index: 49;
    background: var(--bg); border-top: 1px solid var(--line); border-bottom: 1px solid var(--line);
    padding: 16px 20px 24px;
    display: flex; flex-direction: column; gap: 6px;
    transform: translateY(-8px); opacity: 0; pointer-events: none;
    transition: opacity .2s ease, transform .25s ease;
  }
  .nav-drawer.open { transform: translateY(0); opacity: 1; pointer-events: auto; }
  .nav-drawer a {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 4px; text-decoration: none; color: var(--fg);
    font-family: var(--mono); font-size: 13px; letter-spacing: .12em; text-transform: uppercase;
    border-bottom: 1px solid var(--line);
  }
  .nav-drawer a:last-child { border-bottom: none; }
  .nav-drawer .nav-cta {
    margin-top: 12px; justify-content: center; border-bottom: none;
    background: var(--accent); color: var(--ink); border-radius: 999px; padding: 14px 18px;
    font-weight: 700;
  }

  /* Responsive */
  @media (max-width: 1024px) {
    .container { padding: 0 24px; }
    .games-grid { grid-template-columns: repeat(3, minmax(0, 1fr)) !important; }
    .games-grid--compact { grid-template-columns: repeat(2, minmax(0, 1fr)) !important; }
    .featured-grid { grid-template-columns: minmax(0, 1fr) !important; }
    .featured-grid > div:last-child { height: 480px !important; }
    .about-grid { grid-template-columns: minmax(0, 1fr) !important; gap: 24px !important; }
    .footer-grid { grid-template-columns: minmax(0, 1fr) minmax(0, 1fr) !important; }
  }
  @media (max-width: 768px) {
    .container { padding: 0 20px; }
    /* Swap desktop links for a hamburger */
    .nav-links { display: none !important; }
    .nav-menu-btn { display: inline-flex; }
    .stats-grid { grid-template-columns: repeat(2, 1fr) !important; }
    .stats-grid > div { border-right: none !important; border-bottom: 1px solid var(--line); padding: 22px 18px !important; }
    .stats-grid > div:nth-child(2) { border-right: 1px solid var(--line) !important; }
    .stats-grid > div:nth-child(3),
    .stats-grid > div:nth-child(4) { border-bottom: none; }
    .stats-grid > div:nth-child(3) { border-right: 1px solid var(--line) !important; }
    .games-grid { grid-template-columns: repeat(2, minmax(0, 1fr)) !important; }
    .games-grid--compact { grid-template-columns: minmax(0, 1fr) !important; }
    .games-grid--poster { grid-template-columns: repeat(2, minmax(0, 1fr)) !important; }
    .featured-card { padding: 28px !important; border-radius: 24px !important; }
    .featured-grid > div:last-child { height: 380px !important; }
    .featured-phones .__side-phone { display: none !important; }
    .hero-stack > div { grid-template-columns: minmax(0, 1fr) !important; }
    .hero-stack > div > div:last-child { height: 440px !important; }
    .games-head { align-items: flex-start !important; }
    .about-pillars { grid-template-columns: minmax(0, 1fr) !important; }
    .footer-grid { grid-template-columns: minmax(0, 1fr) minmax(0, 1fr) !important; gap: 24px !important; }
  }
  @media (max-width: 480px) {
    .container { padding: 0 16px; }
    .stats-grid { grid-template-columns: minmax(0, 1fr) !important; }
    .stats-grid > div { border-right: none !important; border-bottom: 1px solid var(--line) !important; }
    .stats-grid > div:last-child { border-bottom: none !important; }
    /* Keep phone/poster cards at 2 columns so they don't blow up full-width */
    .games-grid--compact { grid-template-columns: minmax(0, 1fr) !important; }
    .games-grid { gap: 12px !important; }
    .games-grid h3 { font-size: 16px !important; }
    .featured-card { padding: 22px !important; }
    .featured-grid > div:last-child { height: 320px !important; }
    .footer-grid { grid-template-columns: minmax(0, 1fr) !important; }
  }

  /* Buttons reset */
  button { font-family: inherit; }
  select { font-family: inherit; -webkit-appearance: none; appearance: none; cursor: pointer; }
</style>
