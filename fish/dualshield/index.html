<body><canvas id="c"></canvas>
<script>
'use strict';
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
let W, H;

function resize() {
  W = canvas.width  = Math.min(window.innerWidth, 520);
  H = canvas.height = window.innerHeight;
  buildStars();
  if (RUN) { RUN.player.x=W/2; RUN.player.y=H*.74; RUN.enemy.x=W/2; RUN.enemy.y=H*.26; }
}
window.addEventListener('resize', resize);

// ── ROUNDRECT POLYFILL (fixed: was y+h+r, now y+h-r) ──────────────────
if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function(x,y,w,h,r) {
    r = Math.min(r, w/2, h/2);
    this.beginPath();
    this.moveTo(x+r, y);   this.lineTo(x+w-r, y);
    this.quadraticCurveTo(x+w, y,   x+w, y+r);
    this.lineTo(x+w, y+h-r);
    this.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
    this.lineTo(x+r, y+h);
    this.quadraticCurveTo(x, y+h,   x, y+h-r);   // fixed: was y+h+r
    this.lineTo(x, y+r);
    this.quadraticCurveTo(x, y,     x+r, y);
    this.closePath();
  };
}

// ── SAVE ───────────────────────────────────────────────────────────────
const SK = 'ds5';
let SV = { pts:0, perm:{}, best:0 };
function loadSave() { try { const r=JSON.parse(localStorage.getItem(SK)); if(r?.perm) SV=r; } catch(e){} }
function writeSave() { try { localStorage.setItem(SK, JSON.stringify(SV)); } catch(e){} }
const lvl = id => SV.perm[id] || 0;

// ── PERMANENT UPGRADES — 100 levels, cost 120×1.15^n per level ─────────
// Redesigned so L100 is a meaningful but not game-breaking ceiling.
// L1:120  L10:486  L20:1,969  L50:174k  L100:2B — very long grind to max
function permCost(id) { const l=lvl(id); return l>=100 ? null : Math.round(120*Math.pow(1.15,l)); }

const PDEF = [
  { id:'hp',   label:'HULL PLATING',  col:'#44ff88', icon:'⬡',
    stat: l => `+${l*3} max HP`,
    desc: '+3 max HP per level  ·  peak +300 at level 100' },
  { id:'dmg',  label:'WEAPON CORE',   col:'#ff6644', icon:'◈',
    stat: l => `+${(l*0.5).toFixed(1)} base damage`,
    desc: '+0.5 damage per level  ·  peak +50 at level 100' },
  { id:'rate', label:'FIRE MATRIX',   col:'#ffee44', icon:'⟳',
    stat: l => `-${Math.round((1-Math.pow(0.994,l))*100)}% fire interval`,
    desc: '×0.994 per level  ·  peak -45% interval at level 100' },
  { id:'regen',label:'NANO REPAIR',   col:'#44ffcc', icon:'♡',
    stat: l => `+${(l*0.05).toFixed(2)} HP/s regen`,
    desc: '+0.05 HP/s per level  ·  peak +5 HP/s at level 100' },
  { id:'armor',label:'ABLATIVE SKIN', col:'#aa88ff', icon:'▣',
    stat: l => `-${(l*0.5).toFixed(1)}% damage taken`,
    desc: '+0.5% damage reduction per level  ·  peak -50% at level 100' },
  { id:'speed',label:'VELOCITY CORE', col:'#ffaa44', icon:'⟶',
    stat: l => `+${(l*0.5).toFixed(1)}% projectile speed`,
    desc: '+0.5% speed per level  ·  peak +50% at level 100' },
];

function applyPerms(p) {
  p.permDmgBonus = lvl('dmg') * 0.5;                    // +0.5 dmg/level → +50 at L100
  p.permRateMult = Math.pow(0.994, lvl('rate'));          // ×0.994/level  → -45% at L100
  p.maxHp  = 200 + lvl('hp')    * 3;    p.hp = p.maxHp; // +3 HP/level   → +300 at L100
  p.regen  = lvl('regen') * 0.05;                        // +0.05 HP/s    → +5 at L100
  p.armor  = lvl('armor') * 0.005;                       // +0.5%/level   → 50% at L100
  p.projSpd= 1 + lvl('speed') * 0.005;                  // +0.5%/level   → +50% at L100
}

// ── WEAPON BASE STATS ─────────────────────────────────────────────────
// All ~9 DPS at base. Different flavour, not different tiers.
// Gun:    fast rate, aimed volume — scales with multi stacks
// Missile:slow rate, homing burst — ×1.87 dmg compensates lower rate
// Laser:  instant hit, guaranteed — ×1.47 dmg, beams stack simultaneously
// Swarm:  homing drones, scatter/converge — scales extremely well stacked
const WBASE = {
  gun:    { fr:1650, dmg:15, multi:1 },
  missile:{ fr:2700, dmg:28, multi:1 },
  laser:  { fr:2400, dmg:22, multi:1 },
  swarm:  { fr:3200, dmg:11, multi:3 },
};

// ── RUN UPGRADES ───────────────────────────────────────────────────────
const ROM = ['II','III','IV','V','VI','VII','VIII'];
const RDEF = [
  { id:'rapid',  label:'RAPID FIRE',    col:'#ffee44', wt:null,
    desc: () => '-18% fire interval',
    note: 'Compounds with Fire Matrix — very effective when stacked' },
  { id:'power',  label:'POWER AMP',     col:'#ff6644', wt:null,
    desc: () => '+22% damage output',
    note: 'Compounds with Weapon Core — very effective when stacked' },
  { id:'repair', label:'FIELD REPAIR',  col:'#44ff88', wt:null,
    desc: () => 'Restore 35% of max HP immediately',
    note: 'Instant effect — useful at any health level' },
  { id:'regen',  label:'REGEN MODULE',  col:'#44ffcc', wt:null,
    desc: () => '+2 HP/s regen  (max 3 picks per run)',
    note: 'Effective early in a run — weaker against heavy burst damage' },
  { id:'speed',  label:'VELOCITY BOOST',col:'#ffaa44', wt:null,

  { id:'barrier',label:'BARRIER FIELD', col:'#8888ff', wt:null,

    note: 'Each drone deals less damage individually but many stack well' },
];

// ── ENEMY DIFFICULTY ───────────────────────────────────────────────────
// HP grows ~22% per wave. Enemy weapon chosen randomly from unlocked pool.
// All weapon DPS is normalised so no weapon is trivially dominant.
function enemyForWave(w) {
  const hp  = Math.round(140 * Math.pow(1.22, w-1));
  const dmg = 8 + w * 2.0;
  const pool= w<=2 ? ['gun'] : w<=4 ? ['gun','missile','swarm'] : ['gun','missile','laser','swarm'];
  const weapon = pool[Math.floor(Math.random() * pool.length)];
  const fr = {
    gun:    Math.max(480,  2300 - w * 80),
    missile:Math.max(1100, 3200 - w * 110),
    laser:  Math.max(680,  2900 - w * 100),
    swarm:  Math.max(900,  3800 - w * 130),  // swarm rate adjusted for lower early multi
  }[weapon];
  // Swarm multi ramps gradually so wave-1 enemy doesn't triple-dip
  const multi = weapon === 'swarm'
    ? Math.min(1 + Math.floor(w/3), 4)
    : w >= 9 ? 2 : 1;
  return { hp, dmg, fr, weapon, multi };
}

// ── AUDIO ─────────────────────────────────────────────────────────────
let AC = null;
function initAudio() {
  if (!AC) { try { AC = new (window.AudioContext||window.webkitAudioContext)(); } catch(e){} }
  if (AC?.state === 'suspended') AC.resume();
}
function snd(type) {
  if (!AC) return;
  try {
    const now = AC.currentTime;
    const mk = (wt,fr,v,d,fe,fa,dl=0) => {
      const o=AC.createOscillator(), g=AC.createGain();
      o.type=wt; o.frequency.setValueAtTime(fr, now+dl);
      if (fe) o.frequency.exponentialRampToValueAtTime(fe, now+dl+(fa||d));
      g.gain.setValueAtTime(v, now+dl); g.gain.exponentialRampToValueAtTime(0.001, now+dl+d);
      o.connect(g); g.connect(AC.destination); o.start(now+dl); o.stop(now+dl+d+.04);
    };
    const ns = (v,d,fc) => {
      const l=Math.ceil(AC.sampleRate*d), b=AC.createBuffer(1,l,AC.sampleRate), dd=b.getChannelData(0);
      for (let i=0;i<l;i++) dd[i]=(Math.random()*2-1)*Math.exp(-i/(l*.3));
      const s=AC.createBufferSource(); s.buffer=b;
      const f=AC.createBiquadFilter(); f.type='bandpass'; f.frequency.value=fc||400; f.Q.value=1;
      const g=AC.createGain(); s.connect(f); f.connect(g); g.connect(AC.destination);
      g.gain.setValueAtTime(v,now); g.gain.exponentialRampToValueAtTime(0.001,now+d);
      s.start(); s.stop(now+d+.04);
    };
    if (type==='gun')    { mk('sawtooth',440,.10,.07,100,.07); }
    if (type==='missile'){ mk('square',200,.09,.17,650,.17); }
    if (type==='laser')  { mk('sine',1200,.16,.40,3500,.13); mk('sine',600,.07,.40,1800,.13); }
    if (type==='swarm')  { for(let i=0;i<3;i++) mk('sine',300+i*80,.06,.18,900+i*100,.18,i*.06); }
    if (type==='hit')    { ns(.28,.12,900); mk('sine',300,.05,.10,80,.10); }
    if (type==='big')    { ns(.48,.60,200); mk('sawtooth',180,.09,.42,50,.42); }
    if (type==='clear')  { [0,.10,.21,.34].forEach((d,i)=>mk('sine',[523,659,784,1047][i],.17,.55,null,null,d)); }
    if (type==='upg')    { [0,.09,.18].forEach((d,i)=>mk('sine',[523,659,784][i],.12,.28,null,null,d)); }
    if (type==='perm')   { [0,.08,.16,.25,.35].forEach((d,i)=>mk('sine',[523,659,784,880,1047][i],.12,.38,null,null,d)); }
    if (type==='over')   { [0,.15,.32,.52].forEach((d,i)=>mk('sawtooth',[392,349,311,262][i],.16,.50,null,null,d)); }
  } catch(e) {}
}

// ── PARTICLES ─────────────────────────────────────────────────────────
const parts = [];
const _sp  = (x,y,c,n,s1=2,s2=7,l=600) => {
  for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,s=s1+Math.random()*(s2-s1);
    parts.push({t:'s',x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,c,life:l*(0.7+Math.random()*.6),ml:l,r:2+Math.random()*2.5});}};
const _db  = (x,y,c,n=12) => {
  for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,s=3+Math.random()*9,ml=700+Math.random()*500;
    parts.push({t:'d',x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,c,life:ml,ml,len:5+Math.random()*13,ang:Math.random()*Math.PI*2,sp:(Math.random()-.5)*.28});}};
const _rg  = (x,y,c,r1=110) => parts.push({t:'r',x,y,c,life:550,ml:550,r0:16,r1});
const _sw  = (x,y,c)  => { _rg(x,y,c,200); parts.push({t:'r',x,y,c:'#fff',life:260,ml:260,r0:0,r1:135}); };
const _bst = (x,y,c)  => { for(let i=0;i<8;i++){const a=(i/8)*Math.PI*2; parts.push({t:'s',x,y,vx:Math.cos(a)*8,vy:Math.sin(a)*8,c,life:350,ml:350,r:4});} };

// All particle physics now frame-rate independent via f = dt/16.667
function upParts(dt) {
  const f = dt / 16.667;
  for (let i=parts.length-1; i>=0; i--) {
    const p = parts[i]; p.life -= dt;
    if (p.life <= 0) { parts.splice(i,1); continue; }
    p.x  += p.vx * f;
    p.y  += p.vy * f;
    const drag = Math.pow(0.91, f);   // compound drag per frame
    p.vx *= drag; p.vy *= drag;
    p.vy += 0.06 * f;                 // gravity scaled to dt
    if (p.t === 'd') p.ang += p.sp * f;
  }
}

function drParts() {
  for (const p of parts) {
    const a = Math.max(0, p.life/p.ml); ctx.globalAlpha = a;
    if (p.t === 's') {
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r*a+.3,0,Math.PI*2);
      ctx.fillStyle=p.c; ctx.shadowColor=p.c; ctx.shadowBlur=11; ctx.fill(); ctx.shadowBlur=0;
    } else if (p.t === 'd') {
      ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.ang);
      ctx.beginPath(); ctx.moveTo(-p.len/2,0); ctx.lineTo(p.len/2,0);
      ctx.strokeStyle=p.c; ctx.lineWidth=2; ctx.shadowColor=p.c; ctx.shadowBlur=7; ctx.stroke(); ctx.shadowBlur=0;
      ctx.restore();
    } else {
      const fr=1-a, r=p.r0+(p.r1-p.r0)*fr;
      if (r>0) { ctx.beginPath(); ctx.arc(p.x,p.y,r,0,Math.PI*2);
        ctx.strokeStyle=p.c; ctx.lineWidth=2.5*(1-fr)+.4; ctx.shadowColor=p.c; ctx.shadowBlur=14; ctx.stroke(); ctx.shadowBlur=0; }
    }
  }
  ctx.globalAlpha = 1;
}

// ── STARS / BG ────────────────────────────────────────────────────────
let stars = [];
function buildStars() {
  stars = Array.from({length:160}, () => ({
    x:Math.random()*W, y:Math.random()*H, r:Math.random()*1.4+.2,
    a:Math.random()*.6+.15, ph:Math.random()*Math.PI*2, sp:Math.random()*.014+.003
  }));
}
function drawBG(t) {
  const bg = ctx.createLinearGradient(0,0,0,H);
  bg.addColorStop(0,'#00020d'); bg.addColorStop(.5,'#00040f'); bg.addColorStop(1,'#02000d');
  ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);
  const HS=32, HW=HS*Math.sqrt(3), pp=.012+.009*Math.sin(t*.0006);
  ctx.strokeStyle=`rgba(0,100,220,${pp})`; ctx.lineWidth=.5;
  for (let row=-1; row<H/HS/1.5+2; row++) {
    for (let col=-1; col<W/HW+2; col++) {
      const hx=col*HW+(row%2===0?0:HW/2), hy=row*HS*1.5;
      ctx.beginPath();
      for (let k=0;k<6;k++) { const aa=Math.PI/3*k+Math.PI/6; k===0?ctx.moveTo(hx+HS*Math.cos(aa),hy+HS*Math.sin(aa)):ctx.lineTo(hx+HS*Math.cos(aa),hy+HS*Math.sin(aa)); }
      ctx.closePath(); ctx.stroke();
    }
  }
  for (const s of stars) {
    s.ph += s.sp;
    ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
    ctx.fillStyle=`rgba(255,255,255,${s.a*(0.5+0.5*Math.sin(s.ph))})`; ctx.fill();
  }
  const vg=ctx.createRadialGradient(W/2,H/2,H*.14,W/2,H/2,H*.8);
  vg.addColorStop(0,'rgba(0,0,0,0)'); vg.addColorStop(1,'rgba(0,0,0,.74)');
  ctx.fillStyle=vg; ctx.fillRect(0,0,W,H);
}

// ── ENTITY ────────────────────────────────────────────────────────────
class Entity {
  constructor(x,y,col,isPlayer) {
    this.x=x; this.y=y; this.col=col; this.isPlayer=isPlayer; this.R=82;
    this.permDmgBonus=0; this.permRateMult=1;
    this.runDmgMult=1; this.runRateMult=1;
    this.weapon='gun';
    this.weaponMult={gun:1,missile:1,laser:1,swarm:3};
    this.maxHp=200; this.hp=200; this.regen=0; this.armor=0; this.projSpd=1;
    this._bFr=1650; this._bDmg=15;
    this.lastFire=isPlayer?0:1200; this.hitFlash=0; this.ringA=0; this.orbitA=0; this.pulseT=0;
    this.segDmg=new Float32Array(64);
  }
  get alive()    { return this.hp > 0; }
  get fireRate() { return Math.max(300, this._bFr * this.permRateMult * this.runRateMult); }
  get damage()   { return (this._bDmg + this.permDmgBonus) * this.runDmgMult; }
  get multi()    { return this.weaponMult[this.weapon] || 1; }

  switchWeapon(wt) {
    const b=WBASE[wt]; this._bFr=b.fr; this._bDmg=b.dmg; this.weapon=wt;
    if (this.weaponMult[wt]===undefined || (wt==='swarm'&&this.weaponMult[wt]<3)) this.weaponMult[wt]=b.multi;
  }
  enhanceWeapon() {
    if (this.weapon === 'swarm') this.weaponMult.swarm += 3;
    else this.weaponMult[this.weapon]++;
  }

  update(dt, tgt, bullets) {
    if (!this.alive) return;
    this.lastFire  += dt; this.ringA += dt*.0014; this.orbitA += dt*.0011;
    if (this.hitFlash > 0) this.hitFlash -= dt;
    if (this.pulseT   > 0) this.pulseT = Math.max(0, this.pulseT - dt*1.5);
    if (this.regen    > 0) this.hp = Math.min(this.maxHp, this.hp + this.regen*dt/1000);
    for (let i=0;i<64;i++) if(this.segDmg[i]>0) this.segDmg[i]=Math.max(0,this.segDmg[i]-dt*.00018);
    if (this.lastFire >= this.fireRate && tgt.alive) { this.lastFire=0; this.fire(tgt,bullets); }
  }

  fire(tgt, bullets) {
    const dx=tgt.x-this.x, dy=tgt.y-this.y, d=Math.hypot(dx,dy);
    const nx=dx/d, ny=dy/d;
    const m = this.multi;

    if (this.weapon === 'laser') {
      snd('laser');
      for (let i=0; i<m; i++) {
        const off = (i-(m-1)/2)*10;
        const px=off*(-ny), py=off*nx;
        bullets.push({ type:'laser', x1:this.x+nx*this.R+px, y1:this.y+ny*this.R+py,
          x2:tgt.x-nx*tgt.R+px, y2:tgt.y-ny*tgt.R+py,
          life:420, ml:420, col:this.col, tgt, owner:this, done:false, beam:i, total:m });
      }

    } else if (this.weapon === 'swarm') {
      snd('swarm');
      for (let i=0; i<m; i++) {
        const sa = Math.atan2(ny,nx) + (Math.random()-.5)*.8;
        const spd = (2.4+Math.random()*.8) * this.projSpd;
        bullets.push({ type:'drone', x:this.x+nx*this.R, y:this.y+ny*this.R,
          vx:Math.cos(sa)*spd, vy:Math.sin(sa)*spd,
          tgt, owner:this, col:this.col, dmg:this.damage,
          life:12000, trail:[], phase:0, pTime:350+Math.random()*250, sz:6 });
      }

    } else if (this.weapon === 'missile') {
      snd('missile');
      for (let i=0; i<m; i++) {
        const off = (i-(m-1)/2)*18;
        const sx=this.x+nx*this.R+off*(-ny), sy=this.y+ny*this.R+off*nx;
        const tdx=tgt.x-sx, tdy=tgt.y-sy, td=Math.hypot(tdx,tdy);
        const spd = 4.2 * this.projSpd;
        bullets.push({ type:'missile', x:sx, y:sy, vx:tdx/td*spd, vy:tdy/td*spd,
          tgt, owner:this, col:this.col, dmg:this.damage, sz:8, life:11000, trail:[] });
      }

    } else { // gun — all bullets spawned from different shield positions but ALL aimed at target
      snd('gun');
      for (let i=0; i<m; i++) {
        const arcOff = (i-(m-1)/2)*0.28;
        const spawnA = Math.atan2(ny,nx) + arcOff;
        const sx=this.x+Math.cos(spawnA)*this.R, sy=this.y+Math.sin(spawnA)*this.R;
        const tdx=tgt.x-sx, tdy=tgt.y-sy, td=Math.hypot(tdx,tdy);
        const spd = 9.5 * this.projSpd;
        bullets.push({ type:'bullet', x:sx, y:sy, vx:tdx/td*spd, vy:tdy/td*spd,
          tgt, owner:this, col:this.col, dmg:this.damage, sz:4.5, life:5500, trail:[] });
      }
    }
    this.pulseT = 80;
    _sp(this.x+nx*this.R, this.y+ny*this.R, this.col, 5, .5, 2, 120);
  }

  hit(rawDmg) {
    const d = Math.max(1, Math.round(rawDmg*(1-this.armor)));
    this.hp = Math.max(0, this.hp-d);
    this.hitFlash = 200; this.pulseT = 60;
    const n=6+Math.floor(Math.random()*6), st=Math.floor(Math.random()*64);
    for (let i=0;i<n;i++) this.segDmg[(st+i)%64] = Math.min(1,(this.segDmg[(st+i)%64]||0)+.75);
    return d;
  }

  draw() {
    const {x,y,col,R} = this;
    const hpR=Math.max(0,this.hp/this.maxHp), fl=this.hitFlash>0, gc=fl?'#fff':col;
    for (const [r,a] of [[R+60,'09'],[R+30,'14'],[R+10,'26']]) {
      const g=ctx.createRadialGradient(x,y,0,x,y,r);
      g.addColorStop(0,col+a); g.addColorStop(1,'transparent');
      ctx.fillStyle=g; ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fill();
    }
    const hpL = 1-hpR;
    for (let i=0;i<64;i++) {
      const sd=this.segDmg[i]||0, hash=((i*31+Math.floor(hpL*64))%64)/64;
      if (hash<hpL*.72||sd>.44) { if(Math.random()<.008){const ga=(i/64)*Math.PI*2;ctx.beginPath();ctx.arc(x+Math.cos(ga)*R,y+Math.sin(ga)*R,2,0,Math.PI*2);ctx.fillStyle=col+'44';ctx.fill();}continue; }
      const sr=R-sd*12, a1=(i/64)*Math.PI*2, a2=((i+.74)/64)*Math.PI*2;
      ctx.beginPath();ctx.arc(x,y,sr+3,a1,a2);ctx.strokeStyle=gc+'30';ctx.lineWidth=8;ctx.shadowColor=gc;ctx.shadowBlur=fl?28:11;ctx.stroke();ctx.shadowBlur=0;
      ctx.beginPath();ctx.arc(x,y,sr,a1,a2);ctx.strokeStyle=fl?'#fff':col;ctx.lineWidth=2.5;ctx.shadowColor=gc;ctx.shadowBlur=fl?16:5;ctx.stroke();ctx.shadowBlur=0;
    }
    if (hpR>0) {
      const hc=hpR>.6?col:hpR>.3?'#ffaa33':'#ff3333';
      ctx.beginPath(); ctx.arc(x,y,R-11,-Math.PI/2,-Math.PI/2+Math.PI*2*hpR);
      ctx.strokeStyle=hc; ctx.lineWidth=5; ctx.shadowColor=hc; ctx.shadowBlur=16; ctx.stroke(); ctx.shadowBlur=0;
    }
    for (let ri=0;ri<2;ri++) {
      const off=ri*Math.PI+this.ringA*(ri?1.8:1.1);
      ctx.beginPath(); ctx.arc(x,y,36+ri*7,off,off+Math.PI*(1.3-ri*.4));
      ctx.strokeStyle=col+(ri?'44':'bb'); ctx.lineWidth=ri?1:2;
      ctx.shadowColor=col; ctx.shadowBlur=ri?3:8; ctx.stroke(); ctx.shadowBlur=0;
    }
    for (let oi=0;oi<3;oi++) {
      const oa=this.orbitA+(oi/3)*Math.PI*2, or=R-17;
      ctx.beginPath(); ctx.arc(x+Math.cos(oa)*or, y+Math.sin(oa)*or, 3.5, 0, Math.PI*2);
      ctx.fillStyle=col; ctx.shadowColor=col; ctx.shadowBlur=14; ctx.fill(); ctx.shadowBlur=0;
    }
    if (this.pulseT>0) {
      const f=Math.max(0,this.pulseT/80), pr=R+22*(1-f);
      ctx.beginPath(); ctx.arc(x,y,pr,0,Math.PI*2);
      ctx.strokeStyle=col+Math.floor(f*200).toString(16).padStart(2,'0');
      ctx.lineWidth=2; ctx.shadowColor=col; ctx.shadowBlur=8; ctx.stroke(); ctx.shadowBlur=0;
    }
    const cr=ctx.createRadialGradient(x,y,0,x,y,22);
    cr.addColorStop(0,'#fff'); cr.addColorStop(.3,col); cr.addColorStop(1,col+'00');
    ctx.beginPath(); ctx.arc(x,y,21,0,Math.PI*2);
    ctx.fillStyle=cr; ctx.shadowColor=col; ctx.shadowBlur=36; ctx.fill(); ctx.shadowBlur=0;
    const ty2 = this.isPlayer ? y+R+22 : y-R-9;
    ctx.fillStyle=fl?'#fff':col+'dd'; ctx.font='bold 11px "Courier New",monospace';
    ctx.textAlign='center'; ctx.shadowColor=col; ctx.shadowBlur=6;
    ctx.fillText(Math.ceil(Math.max(0,this.hp))+' / '+Math.ceil(this.maxHp)+'  HP', x, ty2);
    ctx.shadowBlur=0;
  }
}

// ── BULLET DRAW ───────────────────────────────────────────────────────
function drawBullets(bullets) {
  for (const b of bullets) {
    if (b.type==='laser') {
      const a=b.life/b.ml; ctx.globalAlpha=a;
      ctx.beginPath(); ctx.moveTo(b.x1,b.y1); ctx.lineTo(b.x2,b.y2);
      ctx.strokeStyle=b.col+'26'; ctx.lineWidth=22; ctx.shadowColor=b.col; ctx.shadowBlur=28; ctx.stroke();
      ctx.beginPath(); ctx.moveTo(b.x1,b.y1); ctx.lineTo(b.x2,b.y2);
      ctx.strokeStyle=b.col; ctx.lineWidth=4; ctx.shadowBlur=13; ctx.stroke();
      ctx.beginPath(); ctx.moveTo(b.x1,b.y1); ctx.lineTo(b.x2,b.y2);
      ctx.strokeStyle='#fff'; ctx.lineWidth=1.2; ctx.shadowBlur=4; ctx.stroke();
      ctx.globalAlpha=1; ctx.shadowBlur=0;
    } else {
      if (b.trail.length>1) {
        for (let j=1;j<b.trail.length;j++) {
          const ta=j/b.trail.length;
          ctx.beginPath(); ctx.moveTo(b.trail[j-1].x,b.trail[j-1].y); ctx.lineTo(b.trail[j].x,b.trail[j].y);
          ctx.strokeStyle=b.col; ctx.lineWidth=(b.type==='missile'?7:b.type==='drone'?5:3.5)*ta;
          ctx.globalAlpha=ta*.5; ctx.shadowColor=b.col; ctx.shadowBlur=8; ctx.stroke();
        }
        ctx.globalAlpha=1; ctx.shadowBlur=0;
      }
      const sz = b.sz || 4.5;
      ctx.beginPath(); ctx.arc(b.x,b.y,sz+5,0,Math.PI*2); ctx.fillStyle=b.col+'22'; ctx.fill();
      ctx.beginPath(); ctx.arc(b.x,b.y,sz,0,Math.PI*2);
      ctx.fillStyle=b.col; ctx.shadowColor=b.col; ctx.shadowBlur=b.type==='drone'?24:(b.type==='missile'?30:17); ctx.fill();
      ctx.beginPath(); ctx.arc(b.x,b.y,sz*.35,0,Math.PI*2); ctx.fillStyle='#fff'; ctx.fill(); ctx.shadowBlur=0;
      if (b.type==='drone') {
        const aa=Math.atan2(b.vy,b.vx);
        ctx.save(); ctx.translate(b.x,b.y); ctx.rotate(aa);
        ctx.beginPath(); ctx.moveTo(8,0); ctx.lineTo(-5,4); ctx.lineTo(-5,-4); ctx.closePath();
        ctx.fillStyle=b.col; ctx.shadowColor=b.col; ctx.shadowBlur=14; ctx.fill(); ctx.shadowBlur=0;
        ctx.restore();
      }
    }
  }
}

// ── RUN ───────────────────────────────────────────────────────────────
let RUN = null;
class Run {
  constructor() {
    this.player = new Entity(W/2, H*.74, '#22aaff', true);
    this.enemy  = new Entity(W/2, H*.26, '#ff8822', false);
    applyPerms(this.player);
    this.bullets = [];
    this.wave    = 1;
    this.wavePts = 0;  // pts from wave clears (tracked separately for results screen)
    this.dmgPts  = 0;  // pts from damage dealt
    this.pickCounts = {};
    this.regenPicks = 0;
    this.runOpts = [];
    this.state   = 'wave_in';
    this.waveInT = 2400;
    this.sx=0; this.sy=0; this.sAmt=0; this.sT=0;
    this.chrT=0; this.t=0; this.lastTime=null;
    this.startWave();
  }
  get runPts() { return this.wavePts + this.dmgPts; }
  shake(a) { this.sAmt=a; this.sT=260; }
  chroma(a) { this.chrT=a; }

  startWave() {
    const s = enemyForWave(this.wave);
    const e = this.enemy;
    e.hp=e.maxHp=s.hp; e._bFr=s.fr; e._bDmg=s.dmg; e.weapon=s.weapon;
    e.weaponMult={gun:s.multi,missile:s.multi,laser:s.multi,swarm:s.multi};
    e.segDmg.fill(0); e.lastFire=1200;
    this.bullets=[]; this.state='wave_in'; this.waveInT=2200;
  }

  buildUpgPool() {
    const p = this.player;
    const wCards   = RDEF.filter(d => d.wt);
    const statCards= RDEF.filter(d => !d.wt && !(d.id==='regen' && this.regenPicks>=3));
    // 60% chance to offer current weapon enhancement, 40% chance for a different weapon
    const sameWep  = wCards.find(d => d.wt===p.weapon);
    const diffWeps = wCards.filter(d => d.wt!==p.weapon);
    const wCard    = Math.random()<.6 ? sameWep : (diffWeps[Math.floor(Math.random()*diffWeps.length)]||sameWep);
    const shuffled = [...statCards].sort(()=>Math.random()-.5).slice(0,2);
    this.runOpts   = [wCard, ...shuffled].sort(()=>Math.random()-.5);
  }

  pickUpg(opt) {
    const p=this.player, id=opt.id;
    this.pickCounts[id] = (this.pickCounts[id]||0)+1;
    if (opt.wt) {
      if (p.weapon === opt.wt) p.enhanceWeapon();
      else p.switchWeapon(opt.wt);
    } else {
      if (id==='rapid')  p.runRateMult *= 0.82;
      if (id==='power')  p.runDmgMult  *= 1.22;
      if (id==='repair') p.hp = Math.min(p.maxHp, p.hp + p.maxHp*.35);
      if (id==='regen'  && this.regenPicks<3) { p.regen += 2; this.regenPicks++; }
      if (id==='speed')  p.projSpd = Math.min(3.2, p.projSpd+.25);
      if (id==='barrier'){ p.maxHp+=50; p.hp=Math.min(p.maxHp,p.hp+50); }
    }
    snd('upg'); this.wave++; this.startWave();
  }

  update(dt) {
    // f normalises physics to 60fps — fixes Safari (120fps) running twice as fast
    const f = dt / 16.667;
    this.t += dt;

    if (this.sT>0) { this.sT-=dt; this.sx=(Math.random()-.5)*this.sAmt; this.sy=(Math.random()-.5)*this.sAmt; }
    else           { this.sx=this.sy=0; }
    if (this.chrT>0) this.chrT-=dt;

    if (this.state==='wave_in') { this.waveInT-=dt; if(this.waveInT<=0) this.state='playing'; return; }
    if (this.state!=='playing') return;

    this.player.update(dt, this.enemy, this.bullets);
    this.enemy.update(dt, this.player, this.bullets);

    for (let i=this.bullets.length-1; i>=0; i--) {
      const b = this.bullets[i];
      b.life -= dt;
      if (b.life<=0) { this.bullets.splice(i,1); continue; }

      if (b.type==='laser') {
        if (!b.done) {
          b.done = true;
          if (b.beam===0) {  // damage applied once per shot (beam:0 carries total count)
            const d = b.tgt.hit(b.owner.damage * b.total);
            _sp(b.x2,b.y2,b.col,26,2,12,700); _db(b.x2,b.y2,b.col,16); _sw(b.x2,b.y2,b.col); _bst(b.x2,b.y2,b.col);
            if (b.tgt===this.enemy) this.dmgPts += Math.round(d*.4);
            this.shake(8); this.chroma(280); snd('hit');
          }
        }

      } else if (b.type==='missile' || b.type==='drone') {
        const dx=b.tgt.x-b.x, dy=b.tgt.y-b.y, dd=Math.hypot(dx,dy);
        if (b.type==='drone') {
          b.pTime -= dt;
          if (b.pTime<=0) b.phase=1;
          if (b.phase===0) {  // scatter/swirl phase — frame-rate scaled
            const ang = Math.atan2(b.vy,b.vx) + 0.07*f;
            const sp  = Math.hypot(b.vx,b.vy);
            b.vx = Math.cos(ang)*sp; b.vy = Math.sin(ang)*sp;
          }
        }
        if (b.type==='missile' || b.phase===1) {  // homing phase
          const homing = b.type==='drone' ? .35 : .55;
          b.vx += (dx/dd)*homing*f; b.vy += (dy/dd)*homing*f;
          const sp=Math.hypot(b.vx,b.vy), maxSp=b.type==='drone'?5.5:9;
          if (sp>maxSp) { b.vx=b.vx/sp*maxSp; b.vy=b.vy/sp*maxSp; }
        }
        b.trail.push({x:b.x,y:b.y}); if(b.trail.length>20) b.trail.shift();
        b.x += b.vx*f; b.y += b.vy*f;  // frame-rate scaled movement
        const dx2=b.tgt.x-b.x, dy2=b.tgt.y-b.y, d2=Math.hypot(dx2,dy2);
        if (d2 < b.tgt.R+(b.sz||5)) {
          const dd2 = b.tgt.hit(b.dmg);
          _sp(b.x,b.y,b.col,30,2,12,750); _db(b.x,b.y,b.col,18); _sw(b.x,b.y,b.col); _bst(b.x,b.y,b.col);
          if (b.tgt===this.enemy) this.dmgPts += Math.round(dd2*.4);
          this.shake(11); this.chroma(400); snd('big');
          this.bullets.splice(i,1);
        } else if (b.x<-100||b.x>W+100||b.y<-100||b.y>H+100) this.bullets.splice(i,1);

      } else {  // bullet — frame-rate scaled movement
        b.trail.push({x:b.x,y:b.y}); if(b.trail.length>10) b.trail.shift();
        b.x += b.vx*f; b.y += b.vy*f;
        const dx=b.tgt.x-b.x, dy=b.tgt.y-b.y, d=Math.hypot(dx,dy);
        if (d < b.tgt.R+b.sz) {
          const dd = b.tgt.hit(b.dmg);
          _sp(b.x,b.y,b.col,14,1.5,7,480); _rg(b.x,b.y,b.col,82);
          if (b.tgt===this.enemy) this.dmgPts += Math.round(dd*.4);
          this.shake(5); this.chroma(110); snd('hit');
          this.bullets.splice(i,1);
        } else if (b.x<-80||b.x>W+80||b.y<-80||b.y>H+80) this.bullets.splice(i,1);
      }
    }

    upParts(dt);
    this.player.hp = Math.max(0, Math.min(this.player.maxHp, this.player.hp));
    this.enemy.hp  = Math.max(0, Math.min(this.enemy.maxHp,  this.enemy.hp));

    if (!this.player.alive) {
      _sw(this.player.x,this.player.y,'#22aaff');
      _sp(this.player.x,this.player.y,'#22aaff',60,3,16,1400);
      _db(this.player.x,this.player.y,'#22aaff',28);
      this.wavePts += this.wave * 150;
      snd('over'); this.state='dead';

    } else if (!this.enemy.alive) {
      _sw(this.enemy.x,this.enemy.y,'#ff8822');
      _sp(this.enemy.x,this.enemy.y,'#ff8822',70,3,18,1500);
      _sp(this.enemy.x,this.enemy.y,'#ffdd44',32,2,10,900);
      _db(this.enemy.x,this.enemy.y,'#ff8822',28);
      _bst(this.enemy.x,this.enemy.y,'#ffaa44');
      this.wavePts += this.wave * 150;
      this.shake(18); this.chroma(600); snd('clear');
      this.buildUpgPool(); this.state='run_upg';
    }
  }

  drawHUD() {
    const p = this.player;
    ctx.font='bold 13px "Courier New",monospace';
    ctx.textAlign='left'; ctx.fillStyle='#ffffff55'; ctx.shadowColor='#88aaff'; ctx.shadowBlur=7;
    ctx.fillText('WAVE '+this.wave, 12, 24);
    ctx.textAlign='right'; ctx.fillText('◈ '+this.runPts.toLocaleString(), W-12, 24);
    ctx.shadowBlur=0;

    // Enemy HP bar (top)
    if (this.enemy.hp>0) {
      const bw=W*.62, bh=6, bx=W/2-bw/2, by=34;
      ctx.fillStyle='#0a0a0a'; ctx.fillRect(bx,by,bw,bh);
      const r=Math.max(0,this.enemy.hp/this.enemy.maxHp);
      const eg=ctx.createLinearGradient(bx,0,bx+bw,0);
      eg.addColorStop(0,'#ff3300'); eg.addColorStop(.5,'#ff8822'); eg.addColorStop(1,'#ffdd44');
      ctx.fillStyle=eg; ctx.shadowColor='#ff6600'; ctx.shadowBlur=9; ctx.fillRect(bx,by,bw*r,bh);
      ctx.shadowBlur=0; ctx.strokeStyle='#ff882222'; ctx.lineWidth=1; ctx.strokeRect(bx,by,bw,bh);
    }

    // Player HP bar (bottom)
    const bw2=W*.62, bh2=6, bx2=W/2-bw2/2, by2=H-56;
    ctx.fillStyle='#0a0a0a'; ctx.fillRect(bx2,by2,bw2,bh2);
    const pr=Math.max(0,p.hp/p.maxHp);
    const pc=pr>.55?'#22aaff':pr>.28?'#aa44ff':'#ff3344';
    const pg=ctx.createLinearGradient(bx2,0,bx2+bw2,0); pg.addColorStop(0,pc); pg.addColorStop(1,'#88ddff');
    ctx.fillStyle=pg; ctx.shadowColor=pc; ctx.shadowBlur=9; ctx.fillRect(bx2,by2,bw2*pr,bh2); ctx.shadowBlur=0;

    // Weapon line
    const wc={gun:'#22aaff',missile:'#cc44ff',laser:'#44ffff',swarm:'#ffee88'}[p.weapon]||'#fff';
    ctx.textAlign='center'; ctx.font='bold 11px "Courier New",monospace';
    ctx.fillStyle=wc; ctx.shadowColor=wc; ctx.shadowBlur=10;
    const mLabel = p.weapon==='swarm' ? `×${p.multi} DRONES` : (p.multi>1 ? `×${p.multi} VOLLEY` : '');
    const frSec  = (Math.round(p.fireRate/100)/10).toFixed(1);
    ctx.fillText('■ '+p.weapon.toUpperCase()+(mLabel?' '+mLabel:'')+'   DMG '+Math.round(p.damage)+'   '+frSec+'s', W/2, H-18);
    ctx.shadowBlur=0;
    if (p.regen>0) {
      ctx.font='10px "Courier New",monospace'; ctx.fillStyle='#44ffcc55';
      ctx.fillText('+'+p.regen.toFixed(2)+' HP/s regen', W/2, H-5);
    }
  }

  drawWaveIn() {
    const a = Math.min(1, this.waveInT/500);
    ctx.fillStyle=`rgba(0,0,0,${a*.65})`; ctx.fillRect(0,0,W,H);
    ctx.textAlign='center'; ctx.globalAlpha=a;
    const wc = this.wave<=4?'#ff8822':this.wave<=8?'#dd44ff':'#ff3344';
    ctx.font='bold 44px "Courier New",monospace';
    ctx.fillStyle=wc; ctx.shadowColor=wc; ctx.shadowBlur=40; ctx.fillText('WAVE '+this.wave, W/2, H/2-16); ctx.shadowBlur=0;
    ctx.font='13px "Courier New",monospace'; ctx.fillStyle='#ffffff88';
    const msgs = ['INCOMING...','ESCALATING...','THREAT LEVEL: HIGH','CRITICAL ALERT!','MAXIMUM THREAT!','OVERWHELMING FORCE!'];
    ctx.fillText(msgs[Math.min(5, Math.floor((this.wave-1)/2))], W/2, H/2+26);
    ctx.font='10px "Courier New",monospace'; ctx.fillStyle='#ff882266';
    const eWep = this.enemy.weapon.toUpperCase();
    const eMulti = this.enemy.multi>1 ? '  ×'+this.enemy.multi+' volley' : '';
    ctx.fillText('Enemy HP: '+Math.round(this.enemy.maxHp)+'  ·  Weapon: '+eWep+eMulti, W/2, H/2+52);
    ctx.globalAlpha=1;
  }

  drawRunUpg() {
    ctx.fillStyle='rgba(0,0,8,.87)'; ctx.fillRect(0,0,W,H);
    ctx.textAlign='center';
    ctx.font='bold 20px "Courier New",monospace'; ctx.fillStyle='#ffcc44';
    ctx.shadowColor='#ffcc44'; ctx.shadowBlur=26;
    ctx.fillText('WAVE '+(this.wave-1)+' CLEARED', W/2, H*.11); ctx.shadowBlur=0;
    ctx.font='10px "Courier New",monospace'; ctx.fillStyle='#ffffff44';
    ctx.fillText('Run upgrades are lost on death — choose wisely', W/2, H*.11+22);

    const cW=W*.88, cH=90, gap=10, sY=H*.19;
    this.runOpts.forEach((o,i) => {
      const cx=W/2-cW/2, cy=sY+i*(cH+gap);
      const picks = this.pickCounts[o.id]||0;
      const isWep = !!o.wt;
      const wStacks = isWep && o.wt===this.player.weapon
        ? (this.player.weaponMult[o.wt] - (o.wt==='swarm'?3:1)) : 0;
      const label = isWep ? (typeof o.label==='function' ? o.label(wStacks>0?wStacks:0) : o.label) : o.label;
      const desc  = isWep ? (typeof o.desc==='function'  ? o.desc(wStacks>0?wStacks:0)  : o.desc)
                           : (typeof o.desc==='function'  ? o.desc() : o.desc);
      const note  = typeof o.note==='string' ? o.note : (o.note ? o.note() : '');

      const bg=ctx.createLinearGradient(cx,cy,cx+cW,cy+cH);
      bg.addColorStop(0,o.col+'1c'); bg.addColorStop(1,o.col+'06');
      ctx.beginPath(); ctx.roundRect(cx,cy,cW,cH,12);
      ctx.fillStyle=bg; ctx.fill();
      ctx.strokeStyle=o.col; ctx.lineWidth=1.5; ctx.shadowColor=o.col; ctx.shadowBlur=14; ctx.stroke(); ctx.shadowBlur=0;

      // Pick count badge (top right)
      if (picks>0) {
        ctx.textAlign='right'; ctx.font='bold 10px "Courier New",monospace';
        ctx.fillStyle=o.col+'99'; ctx.fillText('×'+picks+' TAKEN', cx+cW-14, cy+16);
      }

      ctx.textAlign='left';
      ctx.font='bold 15px "Courier New",monospace'; ctx.fillStyle=o.col;
      ctx.fillText(label, cx+14, cy+26);
      ctx.font='12px "Courier New",monospace'; ctx.fillStyle='#ddd'; ctx.fillText(desc, cx+14, cy+47);
      ctx.font='9px "Courier New",monospace';  ctx.fillStyle='#888'; ctx.fillText(note, cx+14, cy+65);

      // Weapon enhancement stars
      if (isWep && o.wt===this.player.weapon && wStacks>0) {
        ctx.textAlign='right'; ctx.font='10px "Courier New",monospace';
        ctx.fillStyle=o.col+'77';
        ctx.fillText('★'.repeat(Math.min(wStacks,6)), cx+cW-14, cy+65);
      }
      o._b = {x:cx, y:cy, w:cW, h:cH};
    });

    ctx.textAlign='center'; ctx.font='9px "Courier New",monospace'; ctx.fillStyle='#ffffff22';
    ctx.fillText('TAP A CARD TO SELECT', W/2, sY+3*(cH+gap)+14);
  }

  draw() {
    drawBG(this.t);
    if (this.chrT>0) {
      const s=Math.min(1,this.chrT/300);
      ctx.fillStyle=`rgba(255,20,20,${s*.08})`; ctx.fillRect(0,0,W,H);
      ctx.fillStyle=`rgba(20,90,255,${s*.06})`;  ctx.fillRect(0,0,W,H);
    }
    ctx.save(); ctx.translate(this.sx,this.sy);
    ctx.beginPath(); ctx.moveTo(0,H/2); ctx.lineTo(W,H/2);
    ctx.strokeStyle='rgba(255,255,255,.04)'; ctx.lineWidth=1; ctx.stroke();
    if (this.enemy.hp>0) this.enemy.draw();
    this.player.draw();
    drawBullets(this.bullets);
    drParts();
    ctx.restore();
    this.drawHUD();
    if (this.state==='wave_in') this.drawWaveIn();
    if (this.state==='run_upg') this.drawRunUpg();
  }

  handleTap(mx,my) {
    if (this.state==='run_upg') {
      for (const o of this.runOpts) {
        if (o._b) { const{x,y,w,h}=o._b; if(mx>=x&&mx<=x+w&&my>=y&&my<=y+h){this.pickUpg(o);return;} }
      }
    }
  }
}

// ── MENU / RESULTS ────────────────────────────────────────────────────
let MENU_STATE='menu', LAST_RUN=null, menuT=0, menuScroll=0;

function drawMenu(t) {
  drawBG(t);
  // Title
  ctx.textAlign='center';
  const gp = .7+.3*Math.sin(t*.0016);
  ctx.font='bold 34px "Courier New",monospace';
  ctx.fillStyle='#22aaff'; ctx.shadowColor='#22aaff'; ctx.shadowBlur=52*gp;
  ctx.fillText('DUAL SHIELD', W/2, 72); ctx.shadowBlur=0;
  ctx.font='10px "Courier New",monospace'; ctx.fillStyle='#ffffff2a';
  ctx.fillText('INFINITE ARENA  ·  PERMANENT UPGRADES', W/2, 91);

  // Points and best wave
  ctx.font='bold 20px "Courier New",monospace'; ctx.fillStyle='#ffee44';
  ctx.shadowColor='#ffee44'; ctx.shadowBlur=18;
  ctx.fillText('◈ '+SV.pts.toLocaleString()+' pts', W/2, 120); ctx.shadowBlur=0;
  if (SV.best>0) {
    ctx.font='10px "Courier New",monospace'; ctx.fillStyle='#ffffff33';
    ctx.fillText('BEST WAVE: '+SV.best, W/2, 136);
  }
  ctx.font='bold 11px "Courier New",monospace'; ctx.fillStyle='#ffffff33';
  ctx.fillText('─── PERMANENT UPGRADES ───', W/2, 156);

  // Scrollable upgrade card area
  const cH=88, gap=8, cW=W-28, cx=14;
  const totalH = PDEF.length*(cH+gap)+gap;
  const viewH  = H - 280;
  const maxScroll = Math.max(0, totalH-viewH);
  ctx.save();
  ctx.beginPath(); ctx.rect(0,162,W,viewH); ctx.clip();  // fixed: added beginPath()
  PDEF.forEach((def,i) => {
    const cy = 162+i*(cH+gap)-menuScroll;
    if (cy > H+cH || cy < 150) return;
    const l=lvl(def.id), cost=permCost(def.id), canBuy=cost!==null&&SV.pts>=cost, maxed=l>=100;
    const bg=ctx.createLinearGradient(cx,cy,cx+cW,cy+cH);
    bg.addColorStop(0,def.col+(maxed?'28':'16')); bg.addColorStop(1,def.col+'07');
    ctx.beginPath(); ctx.roundRect(cx,cy,cW,cH,12); ctx.fillStyle=bg; ctx.fill();
    ctx.strokeStyle=def.col+(canBuy?'bb':maxed?'44':'38'); ctx.lineWidth=1.3;
    if (canBuy) { ctx.shadowColor=def.col; ctx.shadowBlur=12; }
    ctx.stroke(); ctx.shadowBlur=0;

    ctx.textAlign='left';
    ctx.font='bold 15px "Courier New",monospace'; ctx.fillStyle=def.col;
    ctx.fillText(def.icon+' '+def.label, cx+12, cy+22);
    ctx.font='11px "Courier New",monospace'; ctx.fillStyle='#999';
    ctx.fillText(def.desc, cx+12, cy+38);
    ctx.font='bold 11px "Courier New",monospace'; ctx.fillStyle=def.col+'cc';
    ctx.fillText(def.stat(l), cx+12, cy+55);

    ctx.textAlign='right';
    ctx.font='bold 11px "Courier New",monospace'; ctx.fillStyle=def.col+(maxed?'55':'88');
    ctx.fillText('LVL '+l+' / 100', cx+cW-12, cy+22);

    // Log-scale progress bar
    const barW=cW-24, bx2=cx+12, by2=cy+62, bh=5;
    ctx.fillStyle='#111'; ctx.fillRect(bx2,by2,barW,bh);
    if (l>0) {
      const logFrac=Math.log(l+1)/Math.log(101);
      ctx.fillStyle=def.col+'88'; ctx.fillRect(bx2,by2,barW*logFrac,bh);
    }
    // Buy button
    if (!maxed) {
      const btnW=Math.min(130,cW-12), bx3=cx+cW-btnW-12, by3=cy+cH-30;
      ctx.beginPath(); ctx.roundRect(bx3,by3,btnW,24,7);
      ctx.fillStyle=canBuy?def.col+'dd':'#1a1a1a'; ctx.fill();
      ctx.strokeStyle=canBuy?def.col:'#333'; ctx.lineWidth=1; ctx.stroke();
      ctx.textAlign='center'; ctx.font='bold 11px "Courier New",monospace';
      ctx.fillStyle=canBuy?'#000':'#444';
      ctx.fillText((cost||0).toLocaleString()+' pts', bx3+btnW/2, by3+16);
      def._b = {x:bx3, y:by3, w:btnW, h:24};
    } else {
      ctx.textAlign='center'; ctx.font='bold 10px "Courier New",monospace';
      ctx.fillStyle=def.col+'77'; ctx.fillText('MAXED', cx+cW/2, cy+cH-14);
      def._b = null;
    }
  });
  ctx.restore();

  // Scroll indicator
  if (totalH>viewH) {
    const si=menuScroll/maxScroll, sh=Math.max(20,(viewH/totalH)*viewH);
    const sx2=W-8, sy2=162+si*(viewH-sh);
    ctx.fillStyle='#ffffff22'; ctx.fillRect(sx2,162,4,viewH);
    ctx.fillStyle='#22aaff55'; ctx.fillRect(sx2,sy2,4,sh);
    ctx.textAlign='center'; ctx.font='9px "Courier New",monospace'; ctx.fillStyle='#ffffff22';
    ctx.fillText('scroll for more upgrades', W/2, 162+viewH-4);
  }

  // Start button
  const sbY=H-100;
  const pulse=.8+.2*Math.sin(t*.002);
  ctx.beginPath(); ctx.roundRect(W*.1,sbY,W*.8,52,16);
  const sg=ctx.createLinearGradient(W*.1,sbY,W*.9,sbY+52);
  sg.addColorStop(0,'#003fbb'); sg.addColorStop(1,'#00aaff');
  ctx.fillStyle=sg; ctx.shadowColor='#22aaff'; ctx.shadowBlur=22*pulse; ctx.fill(); ctx.shadowBlur=0;
  ctx.strokeStyle='#44ccff'; ctx.lineWidth=1.5; ctx.stroke();
  ctx.textAlign='center'; ctx.font='bold 22px "Courier New",monospace';
  ctx.fillStyle='#fff'; ctx.shadowColor='#fff'; ctx.shadowBlur=14*pulse;
  ctx.fillText('▶  START RUN', W/2, sbY+35); ctx.shadowBlur=0;
  SV._startBtn = {x:W*.1, y:sbY, w:W*.8, h:52};

  drParts();
}

function drawResults(t) {
  drawBG(t);
  const r = LAST_RUN;
  const total = r.wavePts + r.dmgPts;

  ctx.textAlign='center';
  ctx.font='bold 28px "Courier New",monospace'; ctx.fillStyle='#ff3344';
  ctx.shadowColor='#ff3344'; ctx.shadowBlur=30; ctx.fillText('SHIELD DESTROYED', W/2, H*.2); ctx.shadowBlur=0;
  ctx.font='bold 16px "Courier New",monospace'; ctx.fillStyle='#ffffff';
  ctx.fillText('Reached Wave '+r.wave, W/2, H*.2+40);

  // Score box
  const bY=H*.36, bH=128;
  ctx.beginPath(); ctx.roundRect(W*.08,bY,W*.84,bH,16);
  ctx.fillStyle='rgba(8,16,42,.85)'; ctx.fill();
  ctx.strokeStyle='#22aaff33'; ctx.lineWidth=1; ctx.stroke();

  ctx.font='12px "Courier New",monospace'; ctx.fillStyle='#aaa';
  ctx.fillText('Waves cleared: '+(r.wave-1)+'  ×150 pts per wave', W/2, bY+32);
  ctx.fillText('Damage bonus:  '+r.dmgPts.toLocaleString()+' pts', W/2, bY+54);
  ctx.font='bold 22px "Courier New",monospace'; ctx.fillStyle='#ffee44';
  ctx.shadowColor='#ffee44'; ctx.shadowBlur=18;
  ctx.fillText('◈ '+total.toLocaleString()+' pts earned', W/2, bY+92); ctx.shadowBlur=0;

  ctx.font='13px "Courier New",monospace'; ctx.fillStyle='#44ff8877';
  ctx.fillText('Total bank: '+SV.pts.toLocaleString()+' pts', W/2, H*.73);
  if (r.isNewBest) {
    ctx.font='11px "Courier New",monospace'; ctx.fillStyle='#ffee4477';
    ctx.fillText('★  NEW PERSONAL BEST  ★', W/2, H*.78);
  }

  // Claim button
  const btnY=H*.83;
  const p2=.8+.2*Math.sin(t*.003);
  ctx.beginPath(); ctx.roundRect(W*.12,btnY,W*.76,52,14);
  const sg2=ctx.createLinearGradient(W*.12,btnY,W*.88,btnY+52);
  sg2.addColorStop(0,'#003a22'); sg2.addColorStop(1,'#00aa66');
  ctx.fillStyle=sg2; ctx.shadowColor='#44ff88'; ctx.shadowBlur=20*p2; ctx.fill(); ctx.shadowBlur=0;
  ctx.strokeStyle='#44ff88'; ctx.lineWidth=1.5; ctx.stroke();
  ctx.font='bold 18px "Courier New",monospace'; ctx.fillStyle='#fff';
  ctx.shadowColor='#44ff88'; ctx.shadowBlur=12*p2;
  ctx.fillText('CLAIM & RETURN TO BASE', W/2, btnY+34); ctx.shadowBlur=0;
  SV._claimBtn = {x:W*.12, y:btnY, w:W*.76, h:52};

  drParts();
}

function handleMenuTap(mx,my) {
  if (MENU_STATE==='results') {
    const cb=SV._claimBtn;
    if (cb&&mx>=cb.x&&mx<=cb.x+cb.w&&my>=cb.y&&my<=cb.y+cb.h) { MENU_STATE='menu'; snd('upg'); }
    return;
  }
  for (const def of PDEF) {
    if (def._b) {
      const{x,y,w,h}=def._b;
      if (mx>=x&&mx<=x+w&&my>=y&&my<=y+h) {
        const cost=permCost(def.id);
        if (cost!==null&&SV.pts>=cost) {
          SV.pts-=cost; SV.perm[def.id]=(SV.perm[def.id]||0)+1;
          writeSave(); snd('perm');
          _sp(mx,my,def.col,24,2,8,600); _rg(mx,my,def.col,60);
        }
        return;
      }
    }
  }
  const sb=SV._startBtn;
  if (sb&&mx>=sb.x&&mx<=sb.x+sb.w&&my>=sb.y&&my<=sb.y+sb.h) { parts.length=0; RUN=new Run(); }
}

// ── MAIN LOOP ─────────────────────────────────────────────────────────
let lastT = null;
function loop(ts) {
  if (!lastT) lastT=ts;
  const dt = Math.min(ts-lastT, 80); lastT=ts; menuT+=dt;
  if (RUN) {
    RUN.update(dt); RUN.draw();
    if (RUN.state==='dead') {
      const isNewBest = RUN.wave > SV.best;   // check BEFORE updating SV.best
      LAST_RUN = { wave:RUN.wave, wavePts:RUN.wavePts, dmgPts:RUN.dmgPts, isNewBest };
      SV.pts += RUN.runPts;
      if (isNewBest) SV.best = RUN.wave;
      writeSave(); MENU_STATE='results'; RUN=null;
    }
  } else {
    if (MENU_STATE==='menu') drawMenu(menuT); else drawResults(menuT);
  }
  requestAnimationFrame(loop);
}

function getXY(e) { const r=canvas.getBoundingClientRect(); return [e.clientX-r.left, e.clientY-r.top]; }

canvas.addEventListener('click', e => { initAudio(); const[mx,my]=getXY(e); if(RUN) RUN.handleTap(mx,my); else handleMenuTap(mx,my); });
canvas.addEventListener('touchend', e => {
  e.preventDefault(); initAudio();
  const t=e.changedTouches[0], r=canvas.getBoundingClientRect();
  const mx=t.clientX-r.left, my=t.clientY-r.top;
  if (RUN) RUN.handleTap(mx,my); else handleMenuTap(mx,my);
}, {passive:false});

// Menu scroll — mouse wheel
canvas.addEventListener('wheel', e => {
  if (!RUN) {
    const cH=88, gap=8, totalH=PDEF.length*(cH+gap)+gap, viewH=H-280, maxSc=Math.max(0,totalH-viewH);
    menuScroll = Math.max(0, Math.min(maxSc, menuScroll+e.deltaY));
  }
  e.preventDefault();
}, {passive:false});

// Menu scroll — touch drag
let touchY0 = 0;
canvas.addEventListener('touchstart', e => { touchY0=e.touches[0].clientY; }, {passive:true});
canvas.addEventListener('touchmove',  e => {
  if (!RUN) {
    e.preventDefault();
    const dy=touchY0-e.touches[0].clientY; touchY0=e.touches[0].clientY;
    const cH=88, gap=8, totalH=PDEF.length*(cH+gap)+gap, viewH=H-280, maxSc=Math.max(0,totalH-viewH);
    menuScroll = Math.max(0, Math.min(maxSc, menuScroll+dy));
  }
}, {passive:false});

loadSave(); resize();
requestAnimationFrame(loop);
</script>
