<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">
    <title>Snake: Final Build</title>
    <style>
        :root { --glow: #00ff41; --gold: #ffcc00; }
        body {
            display: flex; justify-content: center; align-items: center;
            height: 100vh; margin: 0; background: #000;
            font-family: 'Courier New', Courier, monospace; overflow: hidden; touch-action: none;
        }
        .game-container { position: relative; width: 100%; max-width: 400px; display: flex; flex-direction: column; align-items: center; }
        .header { width: 90%; display: flex; justify-content: space-between; margin-bottom: 10px; z-index: 5; }
        .stat { display: flex; flex-direction: column; }
        .label { font-size: 10px; color: #444; text-transform: uppercase; }
        #score, #highScore { font-size: 20px; font-weight: bold; color: var(--glow); transition: transform 0.2s; }
        #highScore { color: var(--gold); }
        
        .pulse { animation: pulse 0.4s ease-out; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.3); } 100% { transform: scale(1); } }

        canvas { 
            background: #000; border: 2px solid #111; border-radius: 4px; 
            max-width: 95vw; max-height: 95vw; cursor: crosshair; display: block;
        }

        #overlay {
            position: absolute; top: 40px; bottom: 0; left: 0; right: 0;
            background: rgba(0,0,0,0.85); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 10; pointer-events: none;
        }
        h2 { color: #fff; letter-spacing: 5px; margin: 0; text-shadow: 0 0 10px var(--glow); }
        p { color: #888; font-size: 12px; text-align: center; line-height: 1.5; padding: 10px; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="game-container">
        <div class="header">
            <div class="stat"><span class="label">Score</span><div id="score">0</div></div>
            <div class="stat" style="text-align:right"><span class="label">Best</span><div id="highScore">0</div></div>
        </div>
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        <div id="overlay">
            <h2 id="overlay-title">SNAKE</h2>
            <p><strong>WASD / ARROWS</strong><br>OR<br><strong>TAP / CLICK</strong> SIDES</p>
        </div>
    </div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const highEl = document.getElementById('highScore');
    const overlay = document.getElementById('overlay');
    const overlayTitle = document.getElementById('overlay-title');

    // State
    const grid = 20;
    let score, highScore, snake, food, particles, confetti, isPlaying, fps, lastTime, isNewRecord;

    highScore = parseInt(localStorage.getItem('snakeHigh')) || 0;
    highEl.innerText = highScore;

    function init() {
        snake = { x: 160, y: 160, dx: grid, dy: 0, cells: [], maxCells: 4 };
        food = { x: 300, y: 300 };
        particles = []; confetti = [];
        score = 0; fps = 10; isNewRecord = false;
        scoreEl.innerText = score;
        isPlaying = false;
        overlay.classList.remove('hidden');
        renderStatic();
    }

    function renderStatic() {
        ctx.clearRect(0,0,canvas.width,canvas.height);
        ctx.fillStyle = '#ff3333';
        ctx.beginPath(); ctx.arc(food.x+grid/2, food.y+grid/2, grid/2-4, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#00ff41';
        ctx.fillRect(snake.x+1, snake.y+1, grid-2, grid-2);
    }

    function burst(x, y, isConfetti) {
        const count = isConfetti ? 20 : 8;
        for(let i=0; i<count; i++) {
            const p = {
                x: x, y: y,
                vx: (Math.random() - 0.5) * (isConfetti ? 10 : 4),
                vy: (Math.random() - 0.5) * (isConfetti ? 10 : 4),
                life: 1.0,
                c: isConfetti ? `hsl(${Math.random()*360}, 70%, 60%)` : '#00ff41'
            };
            isConfetti ? confetti.push(p) : particles.push(p);
        }
    }

    function update(t) {
        if(!isPlaying) return;
        requestAnimationFrame(update);

        const delta = t - lastTime;
        if (delta < 1000 / fps) return;
        lastTime = t;

        ctx.clearRect(0,0,canvas.width,canvas.height);

        snake.x += snake.dx; snake.y += snake.dy;

        if (snake.x < 0) snake.x = canvas.width - grid;
        else if (snake.x >= canvas.width) snake.x = 0;
        if (snake.y < 0) snake.y = canvas.height - grid;
        else if (snake.y >= canvas.height) snake.y = 0;

        snake.cells.unshift({x: snake.x, y: snake.y});
        if (snake.cells.length > snake.maxCells) snake.cells.pop();

        // Food
        ctx.shadowBlur = 15; ctx.shadowColor = 'red';
        ctx.fillStyle = '#ff3333';
        ctx.beginPath(); ctx.arc(food.x+grid/2, food.y+grid/2, grid/2-4, 0, Math.PI*2); ctx.fill();

        // Snake
        snake.cells.forEach((cell, i) => {
            ctx.shadowBlur = i === 0 ? 15 : 0;
            ctx.shadowColor = '#00ff41';
            ctx.fillStyle = i === 0 ? '#00ff41' : '#008f11';
            ctx.fillRect(cell.x+1, cell.y+1, grid-2, grid-2);
            if (i > 0 && cell.x === snake.x && cell.y === snake.y) end();
        });

        // Logic
        if (snake.x === food.x && snake.y === food.y) {
            snake.maxCells++; score += 10;
            scoreEl.innerText = score; fps += 0.2;
            burst(food.x + 10, food.y + 10, false);
            if (score > highScore) {
                if(!isNewRecord && highScore > 0) {
                    burst(canvas.width/2, 0, true);
                    highEl.classList.add('pulse');
                    setTimeout(()=>highEl.classList.remove('pulse'), 400);
                }
                isNewRecord = true; highScore = score;
                highEl.innerText = highScore;
                localStorage.setItem('snakeHigh', highScore);
            }
            food.x = Math.floor(Math.random()*20)*grid;
            food.y = Math.floor(Math.random()*20)*grid;
        }

        // FX
        ctx.shadowBlur = 0;
        [particles, confetti].forEach(list => {
            for(let i = list.length-1; i >= 0; i--) {
                const p = list[i];
                p.x += p.vx; p.y += p.vy; p.life -= 0.03;
                if(p.life <= 0) { list.splice(i, 1); continue; }
                ctx.fillStyle = p.c;
                ctx.globalAlpha = p.life;
                ctx.fillRect(p.x, p.y, 3, 3);
            }
        });
        ctx.globalAlpha = 1;
    }

    function start() {
        if(isPlaying) return;
        isPlaying = true; overlay.classList.add('hidden');
        lastTime = performance.now(); requestAnimationFrame(update);
    }

    function end() {
        isPlaying = false; overlayTitle.innerText = "GAME OVER"; init();
    }

    function handleInput(dir) {
        if (!isPlaying) start();
        if (dir === 'l' && snake.dx === 0) { snake.dx = -grid; snake.dy = 0; }
        else if (dir === 'u' && snake.dy === 0) { snake.dy = -grid; snake.dx = 0; }
        else if (dir === 'r' && snake.dx === 0) { snake.dx = grid; snake.dy = 0; }
        else if (dir === 'd' && snake.dy === 0) { snake.dy = grid; snake.dx = 0; }
    }

    window.addEventListener('keydown', e => {
        const k = e.key.toLowerCase();
        if (k === 'arrowleft' || k === 'a') handleInput('l');
        else if (k === 'arrowup' || k === 'w') handleInput('u');
        else if (k === 'arrowright' || k === 'd') handleInput('r');
        else if (k === 'arrowdown' || k === 's') handleInput('d');
        if(k.includes('arrow')) e.preventDefault();
    });

    const ctrl = (clientX, clientY) => {
        const r = canvas.getBoundingClientRect();
        const x = clientX - r.left, y = clientY - r.top, s = r.width;
        if (y < x && y < (s - x)) handleInput('u');
        else if (y > x && y > (s - x)) handleInput('d');
        else if (x < y && x < (s - y)) handleInput('l');
        else if (x > y && x > (s - y)) handleInput('r');
    };

    canvas.addEventListener('mousedown', e => ctrl(e.clientX, e.clientY));
    canvas.addEventListener('touchstart', e => ctrl(e.touches[0].clientX, e.touches[0].clientY), {passive: false});

    init();
</script>
</body>
</html>
