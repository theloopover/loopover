<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">
    <title>Snake: Joystick Edition</title>
    <style>
        :root { --glow: #00ff41; --gold: #ffcc00; }
        body {
            display: flex; justify-content: center; align-items: center;
            height: 100vh; margin: 0; background: #000;
            font-family: 'Courier New', Courier, monospace; overflow: hidden; touch-action: none;
        }
        .game-container { position: relative; width: 100%; max-width: 400px; display: flex; flex-direction: column; align-items: center; }
        .header { width: 90%; display: flex; justify-content: space-between; margin-bottom: 10px; z-index: 5; }
        .stat { display: flex; flex-direction: column; }
        .label { font-size: 10px; color: #444; text-transform: uppercase; }
        #score, #highScore { font-size: 20px; font-weight: bold; color: var(--glow); transition: transform 0.2s; }
        #highScore { color: var(--gold); }
        
        canvas { 
            background: #000; border: 2px solid #111; border-radius: 4px; 
            max-width: 95vw; max-height: 95vw; cursor: crosshair; display: block;
        }

        /* Joystick Visuals */
        #joy-base {
            position: absolute; width: 80px; height: 80px; background: rgba(255,255,255,0.1);
            border: 2px solid rgba(255,255,255,0.2); border-radius: 50%;
            pointer-events: none; display: none; z-index: 20;
        }
        #joy-stick {
            position: absolute; width: 40px; height: 40px; background: var(--glow);
            border-radius: 50%; opacity: 0.6; pointer-events: none;
            box-shadow: 0 0 15px var(--glow);
        }

        #overlay {
            position: absolute; top: 40px; bottom: 0; left: 0; right: 0;
            background: rgba(0,0,0,0.85); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 10; pointer-events: none;
        }
        h2 { color: #fff; letter-spacing: 5px; margin: 0; text-shadow: 0 0 10px var(--glow); }
        p { color: #888; font-size: 11px; text-align: center; line-height: 1.5; padding: 10px; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="game-container">
        <div class="header">
            <div class="stat"><span class="label">Score</span><div id="score">0</div></div>
            <div class="stat" style="text-align:right"><span class="label">Best</span><div id="highScore">0</div></div>
        </div>
        
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        
        <div id="joy-base"><div id="joy-stick"></div></div>

        <div id="overlay">
            <h2 id="overlay-title">SNAKE</h2>
            <p><strong>WASD / ARROWS</strong><br>OR<br><strong>DRAG</strong> FOR JOYSTICK</p>
        </div>
    </div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const highEl = document.getElementById('highScore');
    const overlay = document.getElementById('overlay');
    const joyBase = document.getElementById('joy-base');
    const joyStick = document.getElementById('joy-stick');

    const grid = 20;
    let score, highScore, snake, food, fx, isPlaying, fps, lastTime;

    // Joystick Logic
    let joyActive = false;
    let startX, startY;
    const joyLimit = 40; // Max movement radius
    const threshold = 15; // Minimum movement to trigger turn

    highScore = parseInt(localStorage.getItem('snakeHigh')) || 0;
    highEl.innerText = highScore;

    function init() {
        snake = { x: 160, y: 160, dx: grid, dy: 0, cells: [], maxCells: 4 };
        food = { x: 300, y: 300 };
        fx = []; score = 0; fps = 10;
        scoreEl.innerText = score;
        isPlaying = false;
        overlay.classList.remove('hidden');
        renderStatic();
    }

    function renderStatic() {
        ctx.clearRect(0,0,canvas.width,canvas.height);
        ctx.fillStyle = '#ff3333';
        ctx.beginPath(); ctx.arc(food.x+grid/2, food.y+grid/2, grid/2-4, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#00ff41';
        ctx.fillRect(snake.x+1, snake.y+1, grid-2, grid-2);
    }

    function burst(x, y, color, count, speed, size) {
        for(let i=0; i<count; i++) {
            fx.push({ x, y, vx: (Math.random() - 0.5) * speed, vy: (Math.random() - 0.5) * speed, life: 1.0, color, size: Math.random() * size + 2 });
        }
    }

    function update(t) {
        if(!isPlaying) return;
        requestAnimationFrame(update);
        const delta = t - lastTime;
        if (delta < 1000 / fps) return;
        lastTime = t;

        ctx.clearRect(0,0,canvas.width,canvas.height);
        snake.x += snake.dx; snake.y += snake.dy;

        if (snake.x < 0) snake.x = canvas.width - grid;
        else if (snake.x >= canvas.width) snake.x = 0;
        if (snake.y < 0) snake.y = canvas.height - grid;
        else if (snake.y >= canvas.height) snake.y = 0;

        snake.cells.unshift({x: snake.x, y: snake.y});
        if (snake.cells.length > snake.maxCells) snake.cells.pop();

        // Food
        ctx.shadowBlur = 15; ctx.shadowColor = 'red';
        ctx.fillStyle = '#ff3333';
        ctx.beginPath(); ctx.arc(food.x+grid/2, food.y+grid/2, grid/2-4, 0, Math.PI*2); ctx.fill();

        // Snake
        snake.cells.forEach((cell, i) => {
            ctx.shadowBlur = i === 0 ? 15 : 0; ctx.shadowColor = '#00ff41';
            ctx.fillStyle = i === 0 ? '#00ff41' : '#008f11';
            ctx.fillRect(cell.x+1, cell.y+1, grid-2, grid-2);
            if (i > 0 && cell.x === snake.x && cell.y === snake.y) end();
        });

        // Scoring
        if (snake.x === food.x && snake.y === food.y) {
            snake.maxCells++; score += 10;
            scoreEl.innerText = score; fps += 0.2;
            burst(food.x+10, food.y+10, '#00ff41', 8, 4, 2);
            if (score > highScore) {
                highScore = score; highEl.innerText = highScore;
                localStorage.setItem('snakeHigh', highScore);
                burst(food.x+10, food.y+10, `hsl(${Math.random()*360}, 100%, 50%)`, 20, 10, 4);
            }
            food.x = Math.floor(Math.random()*20)*grid;
            food.y = Math.floor(Math.random()*20)*grid;
        }

        ctx.shadowBlur = 0;
        for(let i = fx.length-1; i >= 0; i--) {
            const p = fx[i]; p.x += p.vx; p.y += p.vy; p.life -= 0.02;
            if(p.life <= 0) { fx.splice(i, 1); continue; }
            ctx.globalAlpha = p.life; ctx.fillStyle = p.color;
            ctx.fillRect(p.x, p.y, p.size, p.size);
        }
        ctx.globalAlpha = 1;
    }

    function handleInput(dir) {
        if (!isPlaying) { isPlaying = true; overlay.classList.add('hidden'); lastTime = performance.now(); requestAnimationFrame(update); }
        if (dir === 'l' && snake.dx === 0) { snake.dx = -grid; snake.dy = 0; }
        else if (dir === 'u' && snake.dy === 0) { snake.dy = -grid; snake.dx = 0; }
        else if (dir === 'r' && snake.dx === 0) { snake.dx = grid; snake.dy = 0; }
        else if (dir === 'd' && snake.dy === 0) { snake.dy = grid; snake.dx = 0; }
    }

    function end() { isPlaying = false; init(); }

    // Desktop Keys
    window.addEventListener('keydown', e => {
        const k = e.key.toLowerCase();
        if (k === 'arrowleft' || k === 'a') handleInput('l');
        else if (k === 'arrowup' || k === 'w') handleInput('u');
        else if (k === 'arrowright' || k === 'd') handleInput('r');
        else if (k === 'arrowdown' || k === 's') handleInput('d');
        if(k.includes('arrow')) e.preventDefault();
    });

    // Joystick Event Listeners
    window.addEventListener('touchstart', e => {
        joyActive = true;
        startX = e.touches[0].clientX;
        startY = e.touches[0].clientY;
        joyBase.style.display = 'block';
        joyBase.style.left = `${startX - 40}px`;
        joyBase.style.top = `${startY - 40}px`;
        joyStick.style.left = '20px';
        joyStick.style.top = '20px';
    }, {passive: false});

    window.addEventListener('touchmove', e => {
        if (!joyActive) return;
        e.preventDefault();
        const touchX = e.touches[0].clientX;
        const touchY = e.touches[0].clientY;
        let deltaX = touchX - startX;
        let deltaY = touchY - startY;

        // Clamp stick movement
        const dist = Math.sqrt(deltaX*deltaX + deltaY*deltaY);
        if (dist > joyLimit) {
            deltaX = (deltaX / dist) * joyLimit;
            deltaY = (deltaY / dist) * joyLimit;
        }

        joyStick.style.transform = `translate(${deltaX}px, ${deltaY}px)`;

        // Trigger Direction
        if (Math.abs(deltaX) > threshold || Math.abs(deltaY) > threshold) {
            if (Math.abs(deltaX) > Math.abs(deltaY)) {
                handleInput(deltaX > 0 ? 'r' : 'l');
            } else {
                handleInput(deltaY > 0 ? 'd' : 'u');
            }
        }
    }, {passive: false});

    window.addEventListener('touchend', () => {
        joyActive = false;
        joyBase.style.display = 'none';
    });

    init();
</script>
</body>
</html>
