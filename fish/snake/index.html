<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Classic Snake Glow</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #000000; /* Pure Black Background */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #ececec;
            overflow: hidden;
            touch-action: none;
        }

        .game-container {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 400px;
        }

        .header {
            width: 90%;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 15px;
        }

        .score-box { display: flex; flex-direction: column; }
        .score-label { font-size: 10px; color: #555; text-transform: uppercase; letter-spacing: 1px; }
        #score, #highScore { font-size: 24px; font-weight: bold; color: #008f11; } /* Muted Matrix Green for Base */
        #highScore { color: #ccac00; } /* Muted Gold for Base */

        canvas {
            background-color: #000000;
            border: 1px solid #1a1a1a;
            border-radius: 4px;
            /* subtle background shadow just for the box */
            box-shadow: 0 0 10px rgba(0, 255, 65, 0.05);
            max-width: 90vw;
            max-height: 90vw;
            cursor: pointer;
        }

        #overlay {
            position: absolute;
            top: 56px; 
            left: 5%;
            width: 90%;
            height: calc(100% - 56px);
            background: rgba(0, 0, 0, 0.95);
            border-radius: 4px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            z-index: 10;
            pointer-events: none;
        }

        #overlay h2 { margin: 0 0 10px 0; font-size: 28px; color: #fff; letter-spacing: 4px; text-shadow: 0 0 10px rgba(255, 255, 255, 0.5); }
        #overlay p { margin: 0; font-size: 14px; color: #888; line-height: 1.6; padding: 0 20px; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="game-container">
        <div class="header">
            <div class="score-box">
                <span class="score-label">Score</span>
                <div id="score">0</div>
            </div>
            <div class="score-box" style="text-align: right;">
                <span class="score-label">Best</span>
                <div id="highScore">0</div>
            </div>
        </div>
        
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        
        <div id="overlay">
            <h2 id="overlay-title">SNAKE</h2>
            <p><strong>WASD / Arrows</strong><br>or<br><strong>Tap / Click</strong> sides to move</p>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const highScoreElement = document.getElementById('highScore');
        const overlay = document.getElementById('overlay');
        const overlayTitle = document.getElementById('overlay-title');

        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx;

        function playSound(type) {
            if (!audioCtx) audioCtx = new AudioContext();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            if (type === 'eat') {
                osc.type = 'square';
                osc.frequency.setValueAtTime(500, audioCtx.currentTime); 
                osc.frequency.exponentialRampToValueAtTime(850, audioCtx.currentTime + 0.08);
                gain.gain.setValueAtTime(0.04, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.005, audioCtx.currentTime + 0.08);
                osc.start(); osc.stop(audioCtx.currentTime + 0.08);
            } else if (type === 'die') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(150, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(30, audioCtx.currentTime + 0.5);
                gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.005, audioCtx.currentTime + 0.5);
                osc.start(); osc.stop(audioCtx.currentTime + 0.5);
            }
        }

        const grid = 20;
        let fps = 10;
        let score = 0;
        let highScore = localStorage.getItem('snakeHighScore') || 0;
        highScoreElement.innerText = highScore;

        let isPlaying = false;
        let gameLoopTimeout;

        let snake = { x: 160, y: 160, dx: grid, dy: 0, cells: [], maxCells: 4 };
        let food = { x: 320, y: 320 };

        function getRandomInt(min, max) { return Math.floor(Math.random() * (max - min)) + min; }

        function resetGame() {
            snake.x = 160; snake.y = 160; snake.cells = []; snake.maxCells = 4;
            snake.dx = grid; snake.dy = 0; score = 0;
            scoreElement.innerText = score;
            placeFood();
        }

        function placeFood() {
            food.x = getRandomInt(0, 20) * grid;
            food.y = getRandomInt(0, 20) * grid;
            snake.cells.forEach(cell => { if (cell.x === food.x && cell.y === food.y) placeFood(); });
        }

        // Helper to draw with glow
        function drawGlowRect(x, y, w, h, baseColor, glowColor, glowBlur) {
            ctx.shadowColor = glowColor;
            ctx.shadowBlur = glowBlur;
            ctx.fillStyle = baseColor;
            ctx.fillRect(x, y, w, h);
            // Reset shadows right after
            ctx.shadowBlur = 0;
        }

        function drawGlowCircle(x, y, r, baseColor, glowColor, glowBlur) {
            ctx.shadowColor = glowColor;
            ctx.shadowBlur = glowBlur;
            ctx.fillStyle = baseColor;
            ctx.beginPath();
            ctx.arc(x, y, r, 0, Math.PI * 2);
            ctx.fill();
            // Reset shadows right after
            ctx.shadowBlur = 0;
        }

        function loop() {
            if (!isPlaying) return;
            gameLoopTimeout = setTimeout(() => { requestAnimationFrame(loop); }, 1000 / fps);
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            snake.x += snake.dx; snake.y += snake.dy;

            if (snake.x < 0) snake.x = canvas.width - grid;
            else if (snake.x >= canvas.width) snake.x = 0;
            if (snake.y < 0) snake.y = canvas.height - grid;
            else if (snake.y >= canvas.height) snake.y = 0;

            snake.cells.unshift({ x: snake.x, y: snake.y });
            if (snake.cells.length > snake.maxCells) snake.cells.pop();

            // Food with Neon Red Glow
            drawGlowCircle(food.x + grid / 2, food.y + grid / 2, grid / 2 - 4, '#ff1a1a', 'rgba(255, 0, 0, 0.9)', 15);

            // Snake
            snake.cells.forEach(function (cell, index) {
                // Muted base colors, allowing the glow bloom to do the work
                const baseColor = (index === 0) ? '#00e600' : '#008f11';
                const glowColor = (index === 0) ? 'rgba(0, 255, 65, 0.9)' : 'rgba(0, 255, 65, 0.5)';
                const blurAmount = (index === 0) ? 15 : 10;
                
                drawGlowRect(cell.x + 1, cell.y + 1, grid - 2, grid - 2, baseColor, glowColor, blurAmount);

                for (let i = index + 1; i < snake.cells.length; i++) {
                    if (cell.x === snake.cells[i].x && cell.y === snake.cells[i].y) gameOver();
                }
            });

            if (snake.x === food.x && snake.y === food.y) {
                snake.maxCells++;
                score += 10;
                scoreElement.innerText = score;
                playSound('eat');
                if (score > highScore) {
                    highScore = score;
                    highScoreElement.innerText = highScore;
                    localStorage.setItem('snakeHighScore', highScore);
                }
                placeFood();
            }
        }

        function startGame() {
            if (!isPlaying) {
                overlay.classList.add('hidden');
                isPlaying = true;
                resetGame();
                requestAnimationFrame(loop);
            }
        }

        function gameOver() {
            if (isPlaying) playSound('die');
            isPlaying = false;
            clearTimeout(gameLoopTimeout);
            overlayTitle.innerText = "GAME OVER";
            overlay.classList.remove('hidden');
        }

        document.addEventListener('keydown', function (e) {
            if(["ArrowUp","ArrowDown","ArrowLeft","ArrowRight"," "].indexOf(e.key) > -1) e.preventDefault();
            handleInput(e.key.toLowerCase());
        });

        function handlePointer(e) {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const clientX = e.clientX || (e.touches ? e.touches[0].clientX : 0);
            const clientY = e.clientY || (e.touches ? e.touches[0].clientY : 0);
            
            const x = clientX - rect.left;
            const y = clientY - rect.top;
            const w = rect.width;

            if (y < x && y < (w - x)) handleInput('arrowup');
            else if (y > x && y > (w - x)) handleInput('arrowdown');
            else if (x < y && x < (w - y)) handleInput('arrowleft');
            else if (x > y && x > (w - y)) handleInput('arrowright');
        }

        canvas.addEventListener('mousedown', handlePointer);
        canvas.addEventListener('touchstart', handlePointer, {passive: false});

        function handleInput(key) {
            if (!isPlaying && (key.includes('arrow') || ['w','a','s','d'].includes(key))) {
                startGame();
            }
            if ((key === 'arrowleft' || key === 'a') && snake.dx === 0) { snake.dx = -grid; snake.dy = 0; }
            else if ((key === 'arrowup' || key === 'w') && snake.dy === 0) { snake.dy = -grid; snake.dx = 0; }
            else if ((key === 'arrowright' || key === 'd') && snake.dx === 0) { snake.dx = grid; snake.dy = 0; }
            else if ((key === 'arrowdown' || key === 's') && snake.dy === 0) { snake.dy = grid; snake.dx = 0; }
        }
    </script>
</body>
</html>
