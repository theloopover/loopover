                                    ? caps
                                    : moves;
                            mv = pool[Math.floor(Math.random() * pool.length)];
                        } else {
                            const depth = G.diff === "hard" ? 4 : 3;
                            mv = getBestMove(
                                G.board,
                                depth,
                                G.cpuC,
                                G.ep,
                                G.cr,
                            );
                        }
                        G.thinking = false;
                        if (mv) {
                            const { from, to } = mv;
                            doMove(from[0], from[1], to[0], to[1], to[2], "Q");
                        }
                    }
                    // ── Human input ──
                    function handleSq(r, c) {
                        if (
                            G.status === "checkmate" ||
                            G.status === "stalemate"
                        )
                            return;
                        if (G.thinking) return;
                        if (ANIM.active) return;
                        if (G.mode === "cpu" && G.turn === G.cpuC) return;
                        const p = G.board[r][c];
                        if (G.selected) {
                            const [sr, sc] = G.selected;
                            const hit = G.legal.find(
                                ([nr, nc]) => nr === r && nc === c,
                            );
                            if (hit) {
                                const [, , flag] = hit;
                                if (
                                    pt(G.board[sr][sc]) === "P" &&
                                    (r === 0 || r === 7)
                                ) {
                                    askPromo(pc(G.board[sr][sc]), (pt) =>
                                        doMove(sr, sc, r, c, flag, pt),
                                    );
                                } else doMove(sr, sc, r, c, flag, null);
                                return;
                            }
                            if (p && pc(p) === G.turn) {
                                G.selected = [r, c];
                                G.legal = legalMoves(G.board, r, c, G.ep, G.cr);
                                render();
                                return;
                            }
                            G.selected = null;
                            G.legal = [];
                            render();
                            return;
                        }
                        if (p && pc(p) === G.turn) {
                            G.selected = [r, c];
                            G.legal = legalMoves(G.board, r, c, G.ep, G.cr);
                            render();
                        }
                    }
                    // ── Promotion UI ──
                    // Only Queen is available for promotion (as per user request)
                    function askPromo(cu, cb) {
                        const opts =
                            cu === W
                                ? [{ t: "Q", s: "♕" }]
                                : [{ t: "Q", s: "♛" }];
                        const grid = document.getElementById("pgrid");
                        grid.innerHTML = "";
                        for (const { t, s } of opts) {
                            const btn = document.createElement("button");
                            btn.className = "pbtn";
                            btn.textContent = s;
                            btn.onclick = () => {
                                document
                                    .getElementById("promoModal")
                                    .classList.remove("show");
                                cb(t);
                            };
                            grid.appendChild(btn);
                        }
                        document
                            .getElementById("promoModal")
                            .classList.add("show");
                    }
                    // ── Move notation ──
                    const FILES = "abcdefgh";
                    function sqN(r, c) {
                        return FILES[c] + (8 - r);
                    }
                    function buildNote(board, r1, c1, r2, c2, flag, promo) {
                        if (flag === "ck") return "O-O";
                        if (flag === "cq") return "O-O-O";
                        const p = board[r1][c1],
                            t = pt(p);
                        const cap = !!board[r2][c2] || flag === true;
                        let n = t === "P" ? "" : t;
                        if (cap) n += (t === "P" ? FILES[c1] : "") + "x";
                        n += sqN(r2, c2);
                        if (promo && t === "P" && (r2 === 0 || r2 === 7))
                            n += "=" + promo;
                        return n;
                    }

                    }
                    // Pre-load all 12 piece images from SVG data URLs
                    const PIECE_IMGS = {};
                    function loadPieces(cb) {
                        const keys = [
                            "wP",
                            "wN",
                            "wB",
                            "wR",
                            "wQ",
                            "wK",
                            "bP",
                            "bN",
                            "bB",
                            "bR",
                            "bQ",
                            "bK",
                        ];
                        let total = keys.length,
                            done = 0;
                        for (const k of keys) {
                            const svg = pieceSVG(k[1], k[0] === "w");
                            const url =
                                "data:image/svg+xml;charset=utf-8," +
                                encodeURIComponent(svg);
                            const img = new Image();
                            img.onload = img.onerror = () => {
                                if (++done === total) cb();
                            };
                            img.src = url;
                            PIECE_IMGS[k] = img;
                        }
                    }
                    // ═══════════════════════════════════════════════════════════
                    //  CANVAS RENDERING
                    // ═══════════════════════════════════════════════════════════
                    const canvas = document.getElementById("board");
                    const ctx = canvas.getContext("2d");
                    let SQ = 64;
                    // ── Piece slide animation ──
                    let ANIM = { active: false };
                    const ANIM_MS = 155;
                    function easeInOut(t) {
                        return t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t;
                    }
                    function animFrame(ts) {
                        if (!ANIM.active) return;
                        const raw = (ts - ANIM.t0) / ANIM_MS;
                        const t = easeInOut(Math.min(raw, 1));
                        renderWithAnim(t);
                        if (raw < 1) requestAnimationFrame(animFrame);
                        else finishAnim();
                    }
                    function finishAnim() {
                        ANIM.active = false;
                        render();
                        if (ANIM.onDone) ANIM.onDone();
                    }
                    function startAnim(piece, r1, c1, r2, c2, onDone, anim2) {
                        ANIM = {
                            active: true,
                            piece,
                            r1,
                            c1,
                            r2,
                            c2,
                            anim2: anim2 || null,
                            t0: performance.now(),
                            onDone,
                        };
                        requestAnimationFrame(animFrame);
                    }
                    // ── Coordinate helpers (respect board flip) ──
                    // Returns pixel center {x,y} for logical board position (r,c)
                    function toScreenXY(r, c) {
                        const sr = G.flipped ? 7 - r : r;
                        const sc = G.flipped ? 7 - c : c;
                        return { x: sc * SQ + SQ / 2, y: sr * SQ + SQ / 2 };
                    }
                    // Converts raw screen grid position back to logical (r,c)
                    function toLogical(sr, sc) {
                        return G.flipped ? [7 - sr, 7 - sc] : [sr, sc];
                    }
                    // ── resize: DPR-aware so pieces are crisp on retina / mobile ──
                    function resize() {
                        const avail = Math.min(
                            window.innerWidth - 56,
                            window.innerHeight - 220,
                            480,
                        );
                        SQ = Math.floor(avail / 8);
                        const size = SQ * 8;
                        const dpr = Math.min(window.devicePixelRatio || 1, 3);
                        canvas.width = canvas.height = Math.round(size * dpr);
                        canvas.style.width = canvas.style.height = size + "px";
                        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
                        const cont = document.getElementById("bcont");
                        cont.style.width = size + "px";
                        cont.style.height = size + "px";
                        // Rank labels: top=8 when normal, top=1 when flipped
                        const ranks = G.flipped
                            ? "12345678".split("")
                            : "87654321".split("");
                        const files = G.flipped
                            ? "hgfedcba".split("")
                            : "abcdefgh".split("");
                        document.getElementById("ccoords").innerHTML = ranks
                            .map((n) => `<span>${n}</span>`)
                            .join("");
                        document.getElementById("rcoords").innerHTML = files
                            .map((l) => `<span>${l}</span>`)
                            .join("");
                        render();
                    }
                    // ── Draw a piece image centered at (cx,cy) ──
                    function drawPiece(pieceCode, cx, cy) {
                        const img = PIECE_IMGS[pieceCode];
                        if (!img || !img.complete || !img.naturalWidth) return;
                        const pad = SQ * 0.055;
                        const sz = SQ - pad * 2;
                        ctx.drawImage(img, cx - sz / 2, cy - sz / 2, sz, sz);
                    }
                    // ── Board + static pieces (skipSet = Set of "r,c" to skip) ──
                    function drawBoard(skipSet) {
                        ctx.clearRect(0, 0, canvas.width, canvas.height);
                        for (let r = 0; r < 8; r++)
                            for (let c = 0; c < 8; c++) {
                                const { x, y } = toScreenXY(r, c);
                                const px = x - SQ / 2,
                                    py = y - SQ / 2;
                                const light = (r + c) % 2 === 0;
                                let sq = light ? "#f0d9b5" : "#b58863";
                                if (G.lastMove) {
                                    const { r1, c1, r2, c2 } = G.lastMove;
                                    if (
                                        (r === r1 && c === c1) ||
                                        (r === r2 && c === c2)
                                    )
                                        sq = light ? "#cdd36a" : "#aaa23a";
                                }
                                ctx.fillStyle = sq;
                                ctx.fillRect(px, py, SQ, SQ);
                                if (
                                    G.selected &&
                                    G.selected[0] === r &&
                                    G.selected[1] === c
                                ) {
                                    ctx.fillStyle = "rgba(20,100,200,0.42)";
                                    ctx.fillRect(px, py, SQ, SQ);
                                }
                                const p = G.board[r][c];
                                if (
                                    p &&
                                    pt(p) === "K" &&
                                    pc(p) === G.turn &&
                                    (G.status === "check" ||
                                        G.status === "checkmate")
                                ) {
                                    ctx.fillStyle = "rgba(210,28,28,0.72)";
                                    ctx.fillRect(px, py, SQ, SQ);
                                }
                            }
                        // Legal move indicators
                        for (const [nr, nc] of G.legal) {
                            const { x, y } = toScreenXY(nr, nc);
                            const target = G.board[nr][nc];
                            if (target && pc(target) !== G.turn) {
                                const lw = Math.max(3, SQ * 0.078);
                                ctx.strokeStyle = "rgba(165,22,22,0.72)";
                                ctx.lineWidth = lw;
                                ctx.beginPath();
                                ctx.arc(x, y, SQ / 2 - lw / 2, 0, Math.PI * 2);
                                ctx.stroke();
                            } else {
                                ctx.fillStyle = "rgba(0,0,0,0.20)";
                                ctx.beginPath();
                                ctx.arc(x, y, SQ * 0.15, 0, Math.PI * 2);
                                ctx.fill();
                            }
                        }
                        // Static pieces
                        for (let r = 0; r < 8; r++)
                            for (let c = 0; c < 8; c++) {
                                if (skipSet && skipSet.has(r + "," + c))
                                    continue;
                                const p = G.board[r][c];
                                if (!p) continue;
                                const { x, y } = toScreenXY(r, c);
                                drawPiece(p, x, y);
                            }
                    }
                    function render() {
                        drawBoard(null);
                    }
                    // ── Animation frame renderer ──
                    function renderWithAnim(t) {
                        const a = ANIM;
                        const skip = new Set();
                        skip.add(a.r2 + "," + a.c2);
                        if (a.anim2) skip.add(a.anim2.r2 + "," + a.anim2.c2);
                        drawBoard(skip);
                        const s1 = toScreenXY(a.r1, a.c1),
                            s2 = toScreenXY(a.r2, a.c2);
                        drawPiece(
                            a.piece,
                            s1.x + (s2.x - s1.x) * t,
                            s1.y + (s2.y - s1.y) * t,
                        );
                        if (a.anim2) {
                            const b = a.anim2;
                            const b1 = toScreenXY(b.r1, b.c1),
                                b2 = toScreenXY(b.r2, b.c2);
                            drawPiece(
                                b.piece,
                                b1.x + (b2.x - b1.x) * t,
                                b1.y + (b2.y - b1.y) * t,
                            );
                        }
                    }
                    // ═══════════════════════════════════════════════════════════
                    //  UI UPDATES
                    // ═══════════════════════════════════════════════════════════
                    function updateUI() {
                        const notOver =
                            G.status !== "checkmate" &&
                            G.status !== "stalemate";
                        // Determine which color is in topRow vs botRow
                        // topRow = opponent/CPU, botRow = player
                        // In 2P: top=Black, bot=White. In CPU: top=cpuC, bot=opp(cpuC)
                        const topC = G.mode === "cpu" ? G.cpuC : B;
                        const botC = op(topC);
                        const topTurn =
                            G.turn === topC && notOver && !G.thinking;
                        const botTurn =
                            G.turn === botC && notOver && !G.thinking;
                        const topCheck =
                            (G.status === "check" ||
                                G.status === "checkmate") &&
                            G.turn === topC;
                        const botCheck =
                            (G.status === "check" ||
                                G.status === "checkmate") &&
                            G.turn === botC;

                        document
                            .getElementById("cardTop")
                            .classList.toggle("active", topTurn);
                        document
                            .getElementById("cardBot")
                            .classList.toggle("active", botTurn);
                        document
                            .getElementById("cardTop")
                            .classList.toggle("incheck", topCheck);
                        document
                            .getElementById("cardBot")
                            .classList.toggle("incheck", botCheck);

                        // Show "Transformed!" badge on the card of the player who just moved
                        document
                            .getElementById("cardTop")
                            .classList.toggle(
                                "lastMovedCard",
                                lastMovedColor === topC,
                            );
                        document
                            .getElementById("cardBot")
                            .classList.toggle(
                                "lastMovedCard",
                                lastMovedColor === botC,
                            );

                        // CPU / thinking badges — only in top row (CPU is always top)
                        document.getElementById("cpuBadge").style.display =
                            G.mode === "cpu" ? "inline-block" : "none";
                        document.getElementById("thinkBadge").style.display =
                            G.mode === "cpu" && G.thinking
                                ? "inline-block"
                                : "none";

                        // Captured pieces: capW = pieces White has captured (black pieces shown on White's card)
                        //   topC's card shows pieces captured BY topC
                        const fmtCap = (arr) =>
                            [...arr]
                                .sort((a, b) => DVAL[pt(b)] - DVAL[pt(a)])
                                .map((p) => SYMS[p])
                                .join("");
                        const topCaptured = topC === W ? G.capW : G.capB;
                        const botCaptured = botC === W ? G.capW : G.capB;
                        document.getElementById("capTop").textContent =
                            fmtCap(topCaptured);
                        document.getElementById("capBot").textContent =
                            fmtCap(botCaptured);
                        const topMat = topCaptured.reduce(
                            (s, p) => s + DVAL[pt(p)],
                            0,
                        );
                        const botMat = botCaptured.reduce(
                            (s, p) => s + DVAL[pt(p)],
                            0,
                        );
                        document.getElementById("scoreTop").textContent =
                            topMat > botMat ? "+" + (topMat - botMat) : "";
                        document.getElementById("scoreBot").textContent =
                            botMat > topMat ? "+" + (botMat - topMat) : "";
                        // Status bar
                        const bar = document.getElementById("sbar");
                        if (G.thinking)
                            bar.innerHTML =
                                'CPU is <span class="ac">thinking…</span>';
                        else if (G.status === "checkmate")
                            bar.innerHTML = `<span class="ck">Checkmate</span> — ${G.turn === W ? "Black" : "White"} wins!`;
                        else if (G.status === "stalemate")
                            bar.innerHTML =
                                '<span class="ac">Stalemate</span> — Draw';
                        else if (G.status === "check")
                            bar.innerHTML = `<span class="ck">Check!</span> — ${G.turn === W ? "White" : "Black"} to move`;
                        else
                            bar.innerHTML = `${G.turn === W ? "White" : "Black"} to move`;
                        // Move history
                        const ml = document.getElementById("mlist");
                        ml.innerHTML = "";
                        for (let i = 0; i < G.notation.length; i += 2) {
                            const div = document.createElement("div");
                            div.className =
                                "mrow" +
                                (i >= G.notation.length - 2 ? " lat" : "");
                            div.innerHTML =
                                `<span class="mn">${Math.floor(i / 2) + 1}.</span>` +
                                `<span class="mw">${G.notation[i] || ""}</span>` +
                                `<span class="mb">${G.notation[i + 1] || ""}</span>`;
                            ml.appendChild(div);
                        }
                        ml.scrollTop = ml.scrollHeight;
                    }
                    function showGameOver() {
                        document.getElementById("goTitle").textContent =
                            G.status === "checkmate"
                                ? "Checkmate!"
                                : "Stalemate";
                        document.getElementById("goMsg").textContent =
                            G.status === "checkmate"
                                ? G.turn === W
                                    ? "Black wins!"
                                    : "White wins!"
                                : "It's a draw!";
                        document
                            .getElementById("goModal")
                            .classList.add("show");
                    }
                    // ═══════════════════════════════════════════════════════════
                    //  MENU
                    // ═══════════════════════════════════════════════════════════
                    function selMode(mode) {
                        menuSel.mode = mode;
                        document
                            .querySelectorAll("[data-mode]")
                            .forEach((b) =>
                                b.classList.toggle(
                                    "on",
                                    b.dataset.mode === mode,
                                ),
                            );
                        const ds = document.getElementById("diffsec");
                        if (mode === "cpu") {
                            ds.classList.add("open");
                            menuSel.diff = null;
                            menuSel.playerColor = null;
                            document
                                .querySelectorAll("[data-diff]")
                                .forEach((b) => b.classList.remove("on"));
                            document
                                .querySelectorAll("[data-color]")
                                .forEach((b) => b.classList.remove("on"));
                            document.getElementById("startBtn").disabled = true;
                        } else {
                            ds.classList.remove("open");
                            menuSel.diff = null;
                            menuSel.playerColor = null;
                            document.getElementById("startBtn").disabled =
                                false;
                        }
                    }
                    function selColor(c) {
                        menuSel.playerColor = c;
                        document
                            .querySelectorAll("[data-color]")
                            .forEach((b) =>
                                b.classList.toggle("on", b.dataset.color === c),
                            );
                        checkStartReady();
                    }
                    function selDiff(d) {
                        menuSel.diff = d;
                        document
                            .querySelectorAll("[data-diff]")
                            .forEach((b) =>
                                b.classList.toggle("on", b.dataset.diff === d),
                            );
                        checkStartReady();
                    }
                    function checkStartReady() {
                        // For CPU mode, need both color and difficulty chosen
                        const ready =
                            menuSel.mode === "cpu"
                                ? !!(menuSel.diff && menuSel.playerColor)
                                : !!menuSel.mode;
                        document.getElementById("startBtn").disabled = !ready;
                    }
                    function startGame() {
                        document.getElementById("menuScreen").style.display =
                            "none";
                        document.getElementById("gameScreen").style.display =
                            "flex";
                        newGame();
                        resize();
                    }
                    function goMenu() {
                        document
                            .getElementById("goModal")
                            .classList.remove("show");
                        document.getElementById("gameScreen").style.display =
                            "none";
                        document.getElementById("menuScreen").style.display =
                            "flex";
                    }
                    // ═══════════════════════════════════════════════════════════
                    //  INPUT
                    // ═══════════════════════════════════════════════════════════
                    function sqFromEvt(evt) {
                        const rect = canvas.getBoundingClientRect();
                        const cx =
                            (evt.clientX ?? evt.touches[0].clientX) - rect.left;
                        const cy =
                            (evt.clientY ?? evt.touches[0].clientY) - rect.top;
                        const sr = Math.floor((cy / rect.height) * 8);
                        const sc = Math.floor((cx / rect.width) * 8);
                        return toLogical(sr, sc);
                    }
                    canvas.addEventListener("click", (e) => {
                        const [r, c] = sqFromEvt(e);
                        handleSq(r, c);
                    });
                    canvas.addEventListener(
                        "touchend",
                        (e) => {
                            e.preventDefault();
                            const [r, c] = sqFromEvt(e.changedTouches[0]);
                            handleSq(r, c);
                        },
                        { passive: false },
                    );
                    window.addEventListener("resize", () => {
                        if (
                            document.getElementById("gameScreen").style
                                .display !== "none"
                        )
                            resize();
                    });
                    // ── Boot: load all piece images, then init ──
                    G = makeState();
                    loadPieces(() => {
                        // Pieces ready — if game screen is already visible (shouldn't be on boot
                        // but handles hot-reloads / edge cases), re-render
                        if (
                            document.getElementById("gameScreen").style
                                .display !== "none"
                        )
                            resize();
                    });
                </script>
            </body>
        </html>

        <script>
            // Check if the newly transformed piece is a pawn on promotion rank
            const newPiece = G.board[r2][c2];
            if (pt(newPiece) === "P" && (r2 === 0 || r2 === 7)) {
                needsPromotion = true;
            }

            if (needsPromotion) {
                const pieceColor = pc(G.board[r2][c2]);
                askPromo(pieceColor, (promoPiece) => {
                    // Apply promotion
                    G.board[r2][c2] = pieceColor + promoPiece;
                    render();
                    finishTurn();
                });
                return; // Don't call finishTurn yet
            }
        </script>
    </body>
</html>
