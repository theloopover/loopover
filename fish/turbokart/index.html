<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Turbo Kart Dash</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
canvas { display: block; width: 100%; height: 100%; }
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<script>
// ============================================================
// TURBO KART DASH - Arcade Racing Game
// ============================================================

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// --- Resize handling ---
function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

// ============================================================
// CONSTANTS
// ============================================================
const TOTAL_LAPS = 3;
const ROAD_WIDTH = 180;
const KART_SIZE = 18;
const MAX_SPEED = 6;
const ACCEL = 0.12;
const BRAKE = 0.15;
const REVERSE_MAX = 2;
const FRICTION = 0.03;
const OFF_ROAD_FRICTION = 0.08;
const OFF_ROAD_MAX = 2.5;
const TURN_SPEED = 0.045;
const DRIFT_TURN_BONUS = 0.025;
const DRIFT_FRICTION = 0.015;
const BOOST_SPEED = 9;
const BOOST_DURATION = 90;
const AI_COUNT = 3;

// ============================================================
// AUDIO SYSTEM (Web Audio API)
// ============================================================
let audioCtx = null;
let muted = false;

function initAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}

function playTone(freq, duration, type = 'square', vol = 0.1) {
    if (muted || !audioCtx) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    gain.gain.setValueAtTime(vol, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + duration);
}

function playCountdownBeep() { playTone(600, 0.15, 'square', 0.12); }
function playGoBeep() { playTone(900, 0.3, 'square', 0.15); }
function playCoinPickup() { playTone(1200, 0.1, 'sine', 0.1); setTimeout(() => playTone(1600, 0.15, 'sine', 0.1), 80); }
function playBoostSound() { playTone(300, 0.4, 'sawtooth', 0.08); }
function playCollisionSound() { playTone(150, 0.2, 'sawtooth', 0.12); }
function playLapSound() { playTone(800, 0.15, 'sine', 0.12); setTimeout(() => playTone(1000, 0.15, 'sine', 0.12), 120); setTimeout(() => playTone(1200, 0.2, 'sine', 0.12), 240); }
function playFinishSound() { [0,150,300,450].forEach((d,i) => setTimeout(() => playTone(600+i*200, 0.25, 'sine', 0.12), d)); }
function playItemSound() { playTone(500, 0.1, 'triangle', 0.1); setTimeout(() => playTone(700, 0.1, 'triangle', 0.1), 60); setTimeout(() => playTone(900, 0.15, 'triangle', 0.1), 120); }
function playEngineSound(speed) {
    if (muted || !audioCtx) return;
    // subtle engine hum - only play occasionally
}

// ============================================================
// TRACK DEFINITION
// ============================================================
// Track center waypoints (closed loop)
const trackWaypoints = [
    {x: 400, y: 300},
    {x: 800, y: 250},
    {x: 1200, y: 280},
    {x: 1500, y: 400},
    {x: 1650, y: 600},
    {x: 1600, y: 850},
    {x: 1450, y: 1050},
    {x: 1200, y: 1150},
    {x: 900, y: 1100},
    {x: 650, y: 950},
    {x: 500, y: 750},
    {x: 350, y: 600},
    {x: 250, y: 450},
    {x: 300, y: 350},
];

// Compute smooth track using Catmull-Rom spline interpolation
function catmullRom(p0, p1, p2, p3, t) {
    const t2 = t * t, t3 = t2 * t;
    return {
        x: 0.5 * ((2*p1.x) + (-p0.x+p2.x)*t + (2*p0.x-5*p1.x+4*p2.x-p3.x)*t2 + (-p0.x+3*p1.x-3*p2.x+p3.x)*t3),
        y: 0.5 * ((2*p1.y) + (-p0.y+p2.y)*t + (2*p0.y-5*p1.y+4*p2.y-p3.y)*t2 + (-p0.y+3*p1.y-3*p2.y+p3.y)*t3)
    };
}

function generateSmoothTrack(waypoints, segmentsPerPoint = 20) {
    const pts = [];
    const n = waypoints.length;
    for (let i = 0; i < n; i++) {
        const p0 = waypoints[(i - 1 + n) % n];
        const p1 = waypoints[i];
        const p2 = waypoints[(i + 1) % n];
        const p3 = waypoints[(i + 2) % n];
        for (let j = 0; j < segmentsPerPoint; j++) {
            pts.push(catmullRom(p0, p1, p2, p3, j / segmentsPerPoint));
        }
    }
    return pts;
}

const trackPoints = generateSmoothTrack(trackWaypoints, 25);

// Compute track edges
function computeTrackEdges(points, width) {
    const left = [], right = [];
    const n = points.length;
    for (let i = 0; i < n; i++) {
        const next = points[(i + 1) % n];
        const prev = points[(i - 1 + n) % n];
        const dx = next.x - prev.x;
        const dy = next.y - prev.y;
        const len = Math.sqrt(dx*dx + dy*dy) || 1;
        const nx = -dy / len * width / 2;
        const ny = dx / len * width / 2;
        left.push({x: points[i].x + nx, y: points[i].y + ny});
        right.push({x: points[i].x - nx, y: points[i].y - ny});
    }
    return {left, right};
}

const trackEdges = computeTrackEdges(trackPoints, ROAD_WIDTH);

// Narrow section: reduce width for a segment
for (let i = 150; i < 200; i++) {
    const idx = i % trackPoints.length;
    const next = trackPoints[(idx + 1) % trackPoints.length];
    const prev = trackPoints[(idx - 1 + trackPoints.length) % trackPoints.length];
    const dx = next.x - prev.x, dy = next.y - prev.y;
    const len = Math.sqrt(dx*dx + dy*dy) || 1;
    const narrowWidth = 110;
    const nx = -dy / len * narrowWidth / 2, ny = dx / len * narrowWidth / 2;
    trackEdges.left[idx] = {x: trackPoints[idx].x + nx, y: trackPoints[idx].y + ny};
    trackEdges.right[idx] = {x: trackPoints[idx].x - nx, y: trackPoints[idx].y - ny};
}

// Checkpoints (indices along track)
const checkpointIndices = [0, Math.floor(trackPoints.length * 0.25), Math.floor(trackPoints.length * 0.5), Math.floor(trackPoints.length * 0.75)];
const startLineIndex = 0;

// Get track width at index
function getTrackWidthAt(idx) {
    const l = trackEdges.left[idx], r = trackEdges.right[idx];
    return Math.sqrt((l.x-r.x)**2 + (l.y-r.y)**2);
}

// Check if point is on track
function isOnTrack(x, y) {
    // Check against all track segments
    const n = trackPoints.length;
    for (let i = 0; i < n; i++) {
        const l = trackEdges.left[i], r = trackEdges.right[i];
        const l2 = trackEdges.left[(i+1)%n], r2 = trackEdges.right[(i+1)%n];
        if (pointInQuad(x, y, l, r, r2, l2)) return true;
    }
    return false;
}

function pointInQuad(px, py, a, b, c, d) {
    // Simple check: point in convex quad using cross products
    function cross(ox, oy, ax, ay, bx, by) {
        return (ax-ox)*(by-oy) - (ay-oy)*(bx-ox);
    }
    const c1 = cross(px, py, a.x, a.y, b.x, b.y);
    const c2 = cross(px, py, b.x, b.y, c.x, c.y);
    const c3 = cross(px, py, c.x, c.y, d.x, d.y);
    const c4 = cross(px, py, d.x, d.y, a.x, a.y);
    return (c1 >= 0 && c2 >= 0 && c3 >= 0 && c4 >= 0) || (c1 <= 0 && c2 <= 0 && c3 <= 0 && c4 <= 0);
}

// Find closest track point index
function closestTrackIndex(x, y) {
    let minDist = Infinity, minIdx = 0;
    for (let i = 0; i < trackPoints.length; i++) {
        const d = (x - trackPoints[i].x)**2 + (y - trackPoints[i].y)**2;
        if (d < minDist) { minDist = d; minIdx = i; }
    }
    return minIdx;
}

// Push kart back onto track if out of bounds
function constrainToTrack(kart) {
    const idx = closestTrackIndex(kart.x, kart.y);
    const l = trackEdges.left[idx], r = trackEdges.right[idx];
    const cx = (l.x + r.x) / 2, cy = (l.y + r.y) / 2;
    const hw = getTrackWidthAt(idx) / 2 - KART_SIZE;

    // Project kart position onto the track normal
    const next = trackPoints[(idx + 1) % trackPoints.length];
    const prev = trackPoints[(idx - 1 + trackPoints.length) % trackPoints.length];
    const dx = next.x - prev.x, dy = next.y - prev.y;
    const len = Math.sqrt(dx*dx + dy*dy) || 1;
    const nx = -dy / len, ny = dx / len;

    const toKartX = kart.x - cx, toKartY = kart.y - cy;
    const dot = toKartX * nx + toKartY * ny;

    if (Math.abs(dot) > hw) {
        const push = (Math.abs(dot) - hw) * Math.sign(dot);
        kart.x -= nx * push;
        kart.y -= ny * push;
        kart.speed *= 0.7;
        playCollisionSound();
    }
}

// ============================================================
// ITEMS / POWERUPS
// ============================================================
class Item {
    constructor(x, y, type) {
        this.x = x; this.y = y; this.type = type;
        this.collected = false; this.respawnTimer = 0;
        this.animTimer = Math.random() * Math.PI * 2;
    }
}

// Place items on track
const items = [];
const coins = [];
const boostPads = [];

// Place coins along track
for (let i = 0; i < 30; i++) {
    const idx = Math.floor(i * trackPoints.length / 30);
    const p = trackPoints[idx];
    const next = trackPoints[(idx+1)%trackPoints.length];
    const dx = next.x - p.x, dy = next.y - p.y;
    const len = Math.sqrt(dx*dx+dy*dy)||1;
    const nx = -dy/len, ny = dx/len;
    const offset = (Math.random() - 0.5) * ROAD_WIDTH * 0.5;
    coins.push(new Item(p.x + nx*offset, p.y + ny*offset, 'coin'));
}

// Place boost pads
const boostPadIndices = [Math.floor(trackPoints.length*0.15), Math.floor(trackPoints.length*0.45), Math.floor(trackPoints.length*0.75)];
boostPadIndices.forEach(idx => {
    const p = trackPoints[idx];
    boostPads.push(new Item(p.x, p.y, 'boost'));
});

// Place mystery boxes
const mysteryIndices = [Math.floor(trackPoints.length*0.1), Math.floor(trackPoints.length*0.35), Math.floor(trackPoints.length*0.6), Math.floor(trackPoints.length*0.85)];
mysteryIndices.forEach(idx => {
    const p = trackPoints[idx];
    const next = trackPoints[(idx+1)%trackPoints.length];
    const dx = next.x - p.x, dy = next.y - p.y;
    const len = Math.sqrt(dx*dx+dy*dy)||1;
    const nx = -dy/len, ny = dx/len;
    items.push(new Item(p.x + nx*40, p.y + ny*40, 'mystery'));
    items.push(new Item(p.x - nx*40, p.y - ny*40, 'mystery'));
});

// ============================================================
// PARTICLE SYSTEM
// ============================================================
class Particle {
    constructor(x, y, vx, vy, life, color, size) {
        this.x = x; this.y = y; this.vx = vx; this.vy = vy;
        this.life = life; this.maxLife = life;
        this.color = color; this.size = size;
    }
    update() {
        this.x += this.vx; this.y += this.vy;
        this.life--;
        this.vx *= 0.98; this.vy *= 0.98;
    }
    draw(ctx, camX, camY) {
        const alpha = this.life / this.maxLife;
        ctx.globalAlpha = alpha;
        ctx.fillStyle = this.color;
        ctx.fillRect(this.x - camX - this.size/2, this.y - camY - this.size/2, this.size, this.size);
        ctx.globalAlpha = 1;
    }
}

const particles = [];

function spawnParticles(x, y, count, color, speed = 2, life = 20, size = 3) {
    for (let i = 0; i < count; i++) {
        const angle = Math.random() * Math.PI * 2;
        const spd = Math.random() * speed;
        particles.push(new Particle(x, y, Math.cos(angle)*spd, Math.sin(angle)*spd, life + Math.random()*10, color, size));
    }
}

// Skid marks
const skidMarks = [];
class SkidMark {
    constructor(x, y, alpha) {
        this.x = x; this.y = y; this.alpha = alpha; this.life = 120;
    }
}

// ============================================================
// KART BASE CLASS
// ============================================================
class Kart {
    constructor(x, y, angle, color, name) {
        this.x = x; this.y = y;
        this.angle = angle;
        this.speed = 0;
        this.color = color;
        this.name = name;
        this.width = KART_SIZE;
        this.height = KART_SIZE * 1.4;
        this.lap = 0;
        this.checkpoint = 0;
        this.totalProgress = 0;
        this.coins = 0;
        this.score = 0;
        this.boostTimer = 0;
        this.shieldTimer = 0;
        this.handlingTimer = 0;
        this.drifting = false;
        this.driftAngle = 0;
        this.position = 1;
        this.finished = false;
        this.finishTime = 0;
        this.itemType = null;
        this.itemTimer = 0;
        this.flashTimer = 0;
        this.lastTrackIndex = 0;
    }

    get maxSpeed() {
        let ms = MAX_SPEED;
        if (this.boostTimer > 0) ms = BOOST_SPEED;
        if (!isOnTrack(this.x, this.y)) ms = OFF_ROAD_MAX;
        return ms;
    }

    get accel() {
        let a = ACCEL;
        if (this.handlingTimer > 0) a *= 1.2;
        return a;
    }

    get turnSpeed() {
        let ts = TURN_SPEED;
        if (this.drifting) ts += DRIFT_TURN_BONUS;
        if (this.handlingTimer > 0) ts *= 1.3;
        return ts;
    }

    updatePhysics() {
        // Friction
        let fric = FRICTION;
        if (!isOnTrack(this.x, this.y)) fric = OFF_ROAD_FRICTION;
        if (this.drifting) fric = DRIFT_FRICTION;

        if (this.speed > 0) {
            this.speed -= fric;
            if (this.speed < 0) this.speed = 0;
        } else if (this.speed < 0) {
            this.speed += fric;
            if (this.speed > 0) this.speed = 0;
        }

        // Clamp speed
        this.speed = Math.max(-REVERSE_MAX, Math.min(this.maxSpeed, this.speed));

        // Move
        const moveAngle = this.angle + this.driftAngle;
        this.x += Math.cos(moveAngle) * this.speed;
        this.y += Math.sin(moveAngle) * this.speed;

        // Timers
        if (this.boostTimer > 0) this.boostTimer--;
        if (this.shieldTimer > 0) this.shieldTimer--;
        if (this.handlingTimer > 0) this.handlingTimer--;
        if (this.flashTimer > 0) this.flashTimer--;

        // Constrain to track
        constrainToTrack(this);

        // Track progress
        this.lastTrackIndex = closestTrackIndex(this.x, this.y);

        // Checkpoints
        this.updateCheckpoints();

        // Drift particles
        if (this.drifting && Math.abs(this.speed) > 2) {
            const backX = this.x - Math.cos(this.angle) * this.height * 0.4;
            const backY = this.y - Math.sin(this.angle) * this.height * 0.4;
            if (Math.random() < 0.5) {
                particles.push(new Particle(backX + (Math.random()-0.5)*8, backY + (Math.random()-0.5)*8,
                    (Math.random()-0.5)*0.5, (Math.random()-0.5)*0.5, 30, '#555', 3));
            }
            skidMarks.push(new SkidMark(backX + (Math.random()-0.5)*6, backY + (Math.random()-0.5)*6, 0.4));
        }

        // Boost particles
        if (this.boostTimer > 0 && Math.abs(this.speed) > 3) {
            const backX = this.x - Math.cos(this.angle) * this.height * 0.5;
            const backY = this.y - Math.sin(this.angle) * this.height * 0.5;
            particles.push(new Particle(backX, backY,
                -Math.cos(this.angle)*3 + (Math.random()-0.5)*2,
                -Math.sin(this.angle)*3 + (Math.random()-0.5)*2,
                15, Math.random() < 0.5 ? '#f80' : '#ff0', 4));
        }
    }

    updateCheckpoints() {
        const idx = this.lastTrackIndex;
        const n = trackPoints.length;

        // Check if crossed next checkpoint
        const nextCp = checkpointIndices[this.checkpoint % checkpointIndices.length];
        const distToCp = Math.abs(idx - nextCp);
        const wrapDist = Math.abs(idx - nextCp + n);
        const wrapDist2 = Math.abs(idx - nextCp - n);
        const minDist = Math.min(distToCp, wrapDist, wrapDist2);

        if (minDist < 15) {
            this.checkpoint++;
            if (this.checkpoint > 0 && this.checkpoint % checkpointIndices.length === 0) {
                this.lap++;
                if (this === player) playLapSound();
            }
        }

        // Total progress for ranking
        this.totalProgress = this.lap * n + idx;
    }

    draw(ctx, camX, camY) {
        const sx = this.x - camX;
        const sy = this.y - camY;

        ctx.save();
        ctx.translate(sx, sy);
        ctx.rotate(this.angle + this.driftAngle);

        // Shadow
        ctx.fillStyle = 'rgba(0,0,0,0.3)';
        ctx.fillRect(-this.width/2 + 2, -this.height/2 + 2, this.width, this.height);

        // Kart body
        const flash = this.flashTimer > 0 && this.flashTimer % 4 < 2;
        if (this.shieldTimer > 0) {
            ctx.strokeStyle = `rgba(0,200,255,${0.5 + Math.sin(Date.now()*0.01)*0.3})`;
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.arc(0, 0, this.width + 4, 0, Math.PI * 2);
            ctx.stroke();
        }

        // Main body
        ctx.fillStyle = flash ? '#fff' : this.color;
        ctx.beginPath();
        ctx.roundRect(-this.width/2, -this.height/2, this.width, this.height, 4);
        ctx.fill();

        // Stripe
        ctx.fillStyle = 'rgba(255,255,255,0.4)';
        ctx.fillRect(-this.width/4, -this.height/2 + 2, this.width/2, this.height - 4);

        // Wheels
        ctx.fillStyle = '#222';
        ctx.fillRect(-this.width/2 - 3, -this.height/2 + 2, 4, 6);
        ctx.fillRect(this.width/2 - 1, -this.height/2 + 2, 4, 6);
        ctx.fillRect(-this.width/2 - 3, this.height/2 - 8, 4, 6);
        ctx.fillRect(this.width/2 - 1, this.height/2 - 8, 4, 6);

        // Driver head
        ctx.fillStyle = '#ffcc88';
        ctx.beginPath();
        ctx.arc(0, -2, 4, 0, Math.PI * 2);
        ctx.fill();

        // Helmet
        ctx.fillStyle = this.color;
        ctx.beginPath();
        ctx.arc(0, -3, 4, Math.PI, 0);
        ctx.fill();

        ctx.restore();

        // Name tag
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 10px monospace';
        ctx.textAlign = 'center';
        ctx.fillText(this.name, sx, sy - this.height - 6);
    }
}

// ============================================================
// PLAYER
// ============================================================
const keys = {};
window.addEventListener('keydown', e => {
    keys[e.code] = true;
    if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space'].includes(e.code)) e.preventDefault();
});
window.addEventListener('keyup', e => { keys[e.code] = false; });

class Player extends Kart {
    constructor() {
        const startPos = trackPoints[startLineIndex];
        const next = trackPoints[(startLineIndex + 1) % trackPoints.length];
        const angle = Math.atan2(next.y - startPos.y, next.x - startPos.x);
        super(startPos.x, startPos.y - 30, angle, '#e03030', 'YOU');
    }

    update() {
        if (this.finished) return;

        const up = keys['ArrowUp'] || keys['KeyW'];
        const down = keys['ArrowDown'] || keys['KeyS'];
        const left = keys['ArrowLeft'] || keys['KeyA'];
        const right = keys['ArrowRight'] || keys['KeyD'];
        const drift = keys['Space'];
        const boost = keys['ShiftLeft'] || keys['ShiftRight'];

        // Accelerate / brake
        if (up) {
            this.speed += this.accel;
        }
        if (down) {
            if (this.speed > 0) {
                this.speed -= BRAKE;
            } else {
                this.speed -= ACCEL * 0.5;
            }
        }

        // Steering
        const speedFactor = Math.min(1, Math.abs(this.speed) / 3);
        if (left) this.angle -= this.turnSpeed * speedFactor;
        if (right) this.angle += this.turnSpeed * speedFactor;

        // Drift
        this.drifting = drift && Math.abs(this.speed) > 2;
        if (this.drifting) {
            if (left) this.driftAngle -= DRIFT_TURN_BONUS * speedFactor;
            if (right) this.driftAngle += DRIFT_TURN_BONUS * speedFactor;
            this.driftAngle = Math.max(-0.5, Math.min(0.5, this.driftAngle));
        } else {
            this.driftAngle *= 0.9;
        }

        // Use boost item
        if (boost && this.itemType === 'boost') {
            this.boostTimer = BOOST_DURATION;
            this.itemType = null;
            playBoostSound();
            screenShake = 8;
        }

        // Use shield item
        if (boost && this.itemType === 'shield') {
            this.shieldTimer = 300;
            this.itemType = null;
            playItemSound();
        }

        this.updatePhysics();
        this.collectItems();
    }

    collectItems() {
        // Coins
        coins.forEach(c => {
            if (!c.collected) {
                const d = (this.x - c.x)**2 + (this.y - c.y)**2;
                if (d < (KART_SIZE + 10)**2) {
                    c.collected = true;
                    c.respawnTimer = 600;
                    this.coins++;
                    this.score += 10;
                    playCoinPickup();
                    spawnParticles(c.x, c.y, 8, '#ffd700', 3, 20, 3);
                }
            }
        });

        // Boost pads
        boostPads.forEach(b => {
            const d = (this.x - b.x)**2 + (this.y - b.y)**2;
            if (d < (KART_SIZE + 25)**2 && this.boostTimer <= 0) {
                this.boostTimer = 45;
                playBoostSound();
                spawnParticles(this.x, this.y, 12, '#f80', 4, 15, 4);
            }
        });

        // Mystery boxes
        items.forEach(it => {
            if (!it.collected) {
                const d = (this.x - it.x)**2 + (this.y - it.y)**2;
                if (d < (KART_SIZE + 12)**2) {
                    it.collected = true;
                    it.respawnTimer = 900;
                    this.grantRandomItem();
                    playItemSound();
                    spawnParticles(it.x, it.y, 15, '#f0f', 4, 25, 3);
                }
            }
        });
    }

    grantRandomItem() {
        const r = Math.random();
        if (r < 0.35) {
            this.itemType = 'boost';
        } else if (r < 0.6) {
            this.itemType = 'shield';
        } else if (r < 0.8) {
            this.score += 50;
        } else {
            this.handlingTimer = 300;
        }
    }
}

// ============================================================
// AI RACER
// ============================================================
class AIKart extends Kart {
    constructor(startIdx, color, name, speedMod) {
        const startPos = trackPoints[startIdx];
        const next = trackPoints[(startIdx + 1) % trackPoints.length];
        const angle = Math.atan2(next.y - startPos.y, next.x - startPos.x);
        super(startPos.x, startPos.y, angle, color, name);
        this.targetIdx = (startIdx + 20) % trackPoints.length;
        this.speedMod = speedMod;
        this.wobble = Math.random() * Math.PI * 2;
    }

    update() {
        if (this.finished) return;

        // Follow track waypoints
        const target = trackPoints[this.targetIdx];
        const dx = target.x - this.x;
        const dy = target.y - this.y;
        const dist = Math.sqrt(dx*dx + dy*dy);
        const targetAngle = Math.atan2(dy, dx);

        // Smooth angle turning
        let angleDiff = targetAngle - this.angle;
        while (angleDiff > Math.PI) angleDiff -= Math.PI * 2;
        while (angleDiff < -Math.PI) angleDiff += Math.PI * 2;

        const turnAmt = Math.min(Math.abs(angleDiff), this.turnSpeed * 1.5) * Math.sign(angleDiff);
        this.angle += turnAmt;

        // Speed control
        const targetSpeed = (MAX_SPEED * 0.75 + this.speedMod) * (1 - Math.abs(turnAmt) * 3);
        if (this.speed < targetSpeed) {
            this.speed += this.accel * 0.8;
        } else {
            this.speed -= FRICTION * 2;
        }

        // Advance target
        if (dist < 60) {
            this.targetIdx = (this.targetIdx + 10) % trackPoints.length;
        }

        // Add slight wobble for variety
        this.wobble += 0.02;
        this.x += Math.sin(this.wobble) * 0.3;

        this.drifting = false;
        this.updatePhysics();

        // Check if finished
        if (this.lap >= TOTAL_LAPS && !this.finished) {
            this.finished = true;
            this.finishTime = raceTimer;
        }
    }
}

let player;

let gameState = 'title'; // title, countdown, racing, paused, finished

let countdownTimer = 0;
let countdownValue = 3;
let screenShake = 0;
let cameraX = 0, cameraY = 0;
let targetCamX = 0, targetCamY = 0;
let raceStartTime = 0;
let finishPlace = 0;
let aiFinishCount = 0;

function initGame() {
    player = new Player();
    aiRacers = [
        new AIKart(5, '#3080e0', 'BLU', 0.3),
        new AIKart(10, '#30c030', 'GRN', 0.1),
        new AIKart(15, '#e0c030', 'YLW', -0.1),
    ];
    // Offset AI start positions
    aiRacers.forEach((ai, i) => {
        const idx = (startLineIndex + 3 + i * 5) % trackPoints.length;
        const p = trackPoints[idx];
        ai.x = p.x;
        ai.y = p.y;
        ai.lastTrackIndex = idx;
        ai.targetIdx = (idx + 20) % trackPoints.length;
    });

    raceTimer = 0;
    countdownTimer = 0;
    countdownValue = 3;
    screenShake = 0;
    finishPlace = 0;
    aiFinishCount = 0;
    particles.length = 0;
    skidMarks.length = 0;

    // Reset items
    coins.forEach(c => { c.collected = false; c.respawnTimer = 0; });
    items.forEach(it => { it.collected = false; it.respawnTimer = 0; });
}

// ============================================================
// CAMERA
// ============================================================
function updateCamera() {
    targetCamX = player.x - canvas.width / 2;
    targetCamY = player.y - canvas.height / 2;
    cameraX += (targetCamX - cameraX) * 0.08;
    cameraY += (targetCamY - cameraY) * 0.08;

    if (screenShake > 0) {
        cameraX += (Math.random() - 0.5) * screenShake;
        cameraY += (Math.random() - 0.5) * screenShake;
        screenShake *= 0.85;
        if (screenShake < 0.5) screenShake = 0;
    }
}

// ============================================================
// COLLISION BETWEEN KARTS
// ============================================================
function checkKartCollisions() {
    const allKarts = [player, ...aiRacers];
    for (let i = 0; i < allKarts.length; i++) {
        for (let j = i + 1; j < allKarts.length; j++) {
            const a = allKarts[i], b = allKarts[j];
            const dx = b.x - a.x, dy = b.y - a.y;
            const dist = Math.sqrt(dx*dx + dy*dy);
            const minDist = KART_SIZE * 2;
            if (dist < minDist && dist > 0) {
                const overlap = minDist - dist;
                const nx = dx / dist, ny = dy / dist;
                a.x -= nx * overlap * 0.5;
                a.y -= ny * overlap * 0.5;
                b.x += nx * overlap * 0.5;
                b.y += ny * overlap * 0.5;

                // Bounce speeds
                const relSpeed = (a.speed - b.speed) * 0.3;
                a.speed -= relSpeed;
                b.speed += relSpeed;

                if (a.shieldTimer <= 0 && b.shieldTimer <= 0) {
                    if (a === player || b === player) {
                        playCollisionSound();
                        screenShake = 5;
                    }
                }

                if (a === player) a.flashTimer = 10;
                if (b === player) b.flashTimer = 10;
            }
        }
    }
}

// ============================================================
// RANKING
// ============================================================
function updateRankings() {
    const allKarts = [player, ...aiRacers];
    allKarts.sort((a, b) => b.totalProgress - a.totalProgress);
    allKarts.forEach((k, i) => k.position = i + 1);
}

function drawTrack() {
    const n = trackPoints.length;

    // Grass background
    ctx.fillStyle = '#2a7a2a';
    ctx.fillRect(cameraX, cameraY, canvas.width, canvas.height);

    // Grass texture
    ctx.fillStyle = '#257025';
    for (let gx = Math.floor(cameraX/50)*50; gx < cameraX + canvas.width + 50; gx += 50) {
        for (let gy = Math.floor(cameraY/50)*50; gy < cameraY + canvas.height + 50; gy += 50) {
            if ((Math.floor(gx/50) + Math.floor(gy/50)) % 2 === 0) {
                ctx.fillRect(gx - cameraX, gy - cameraY, 50, 50);
            }
        }
    }

    // Draw track road
    ctx.beginPath();
    ctx.moveTo(trackEdges.left[0].x - cameraX, trackEdges.left[0].y - cameraY);
    for (let i = 1; i < n; i++) {
        ctx.lineTo(trackEdges.left[i].x - cameraX, trackEdges.left[i].y - cameraY);
    }
    for (let i = n - 1; i >= 0; i--) {
        ctx.lineTo(trackEdges.right[i].x - cameraX, trackEdges.right[i].y - cameraY);
    }
    ctx.closePath();
    ctx.fillStyle = '#555';
    ctx.fill();

    // Road surface detail - lighter center
    ctx.beginPath();
    const centerL = [], centerR = [];
    for (let i = 0; i < n; i++) {
        const l = trackEdges.left[i], r = trackEdges.right[i];
        const cx = (l.x+r.x)/2, cy = (l.y+r.y)/2;
        const dx = l.x - cx, dy = l.y - cy;
        centerL.push({x: cx + dx*0.3, y: cy + dy*0.3});
        centerR.push({x: cx - dx*0.3, y: cy - dy*0.3});
    }
    ctx.moveTo(centerL[0].x - cameraX, centerL[0].y - cameraY);
    for (let i = 1; i < n; i++) ctx.lineTo(centerL[i].x - cameraX, centerL[i].y - cameraY);
    for (let i = n-1; i >= 0; i--) ctx.lineTo(centerR[i].x - cameraX, centerR[i].y - cameraY);
    ctx.closePath();
    ctx.fillStyle = '#666';
    ctx.fill();

    // Track border (rumble strips)
    for (let i = 0; i < n; i += 2) {
        const l = trackEdges.left[i], l2 = trackEdges.left[(i+1)%n];
        const r = trackEdges.right[i], r2 = trackEdges.right[(i+1)%n];
        ctx.strokeStyle = (Math.floor(i/2) % 2 === 0) ? '#e03030' : '#fff';
        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.moveTo(l.x - cameraX, l.y - cameraY);
        ctx.lineTo(l2.x - cameraX, l2.y - cameraY);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(r.x - cameraX, r.y - cameraY);
        ctx.lineTo(r2.x - cameraX, r2.y - cameraY);
        ctx.stroke();
    }

    // Center line dashes
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 2;
    ctx.setLineDash([15, 15]);
    ctx.beginPath();
    ctx.moveTo(trackPoints[0].x - cameraX, trackPoints[0].y - cameraY);
    for (let i = 1; i < n; i++) {
        ctx.lineTo(trackPoints[i].x - cameraX, trackPoints[i].y - cameraY);
    }
    ctx.closePath();
    ctx.stroke();
    ctx.setLineDash([]);

    // Start/finish line
    const sl = trackEdges.left[startLineIndex], sr = trackEdges.right[startLineIndex];
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 6;
    ctx.beginPath();
    ctx.moveTo(sl.x - cameraX, sl.y - cameraY);
    ctx.lineTo(sr.x - cameraX, sr.y - cameraY);
    ctx.stroke();

    // Checkerboard pattern on start line
    const slDx = sr.x - sl.x, slDy = sr.y - sl.y;
    const slLen = Math.sqrt(slDx*slDx + slDy*slDy);
    const slNx = slDx/slLen, slNy = slDy/slLen;
    const perpX = -slNy, perpY = slNx;
    for (let c = 0; c < 10; c++) {
        const t = c / 10;
        const bx = sl.x + slDx * t;
        const by = sl.y + slDy * t;
        ctx.fillStyle = c % 2 === 0 ? '#fff' : '#000';
        ctx.fillRect(bx - cameraX - 4 + perpX*3, by - cameraY - 4 + perpY*3, 8, 8);
        ctx.fillStyle = c % 2 === 0 ? '#000' : '#fff';
        ctx.fillRect(bx - cameraX - 4 - perpX*3, by - cameraY - 4 - perpY*3, 8, 8);
    }

    // Decorations - trees around the track
    drawDecorations();
}

function drawDecorations() {
    // Simple trees scattered around the outside of the track
    const treePositions = [
        {x: 100, y: 100}, {x: 200, y: 150}, {x: 1700, y: 200},
        {x: 1800, y: 500}, {x: 1750, y: 900}, {x: 1600, y: 1200},
        {x: 1300, y: 1300}, {x: 800, y: 1250}, {x: 400, y: 1100},
        {x: 100, y: 800}, {x: 50, y: 500}, {x: 150, y: 200},
        {x: 1000, y: 100}, {x: 1400, y: 150}, {x: 600, y: 1200},
        {x: 300, y: 900}, {x: 1700, y: 1100}, {x: 1100, y: 1350},
    ];

    treePositions.forEach(t => {
        const sx = t.x - cameraX, sy = t.y - cameraY;
        if (sx < -50 || sx > canvas.width + 50 || sy < -50 || sy > canvas.height + 50) return;

        // Tree shadow
        ctx.fillStyle = 'rgba(0,0,0,0.2)';
        ctx.beginPath();
        ctx.arc(sx + 3, sy + 3, 14, 0, Math.PI * 2);
        ctx.fill();

        // Tree trunk
        ctx.fillStyle = '#654321';
        ctx.fillRect(sx - 3, sy - 2, 6, 10);

        // Tree canopy
        ctx.fillStyle = '#1a6a1a';
        ctx.beginPath();
        ctx.arc(sx, sy - 6, 12, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#2a8a2a';
        ctx.beginPath();
        ctx.arc(sx - 2, sy - 8, 8, 0, Math.PI * 2);
        ctx.fill();
    });
}

function drawSkidMarks() {
    skidMarks.forEach(s => {
        ctx.fillStyle = `rgba(30,30,30,${s.alpha})`;
        ctx.fillRect(s.x - cameraX - 2, s.y - cameraY - 2, 4, 4);
    });
}

function drawItems() {
    const time = Date.now() * 0.003;

    // Coins
    coins.forEach(c => {
        if (c.collected) return;
        const sx = c.x - cameraX, sy = c.y - cameraY;
        if (sx < -30 || sx > canvas.width + 30 || sy < -30 || sy > canvas.height + 30) return;

        const sparkle = Math.sin(time + c.x) * 0.3 + 0.7;
        ctx.fillStyle = `rgba(255,215,0,${sparkle})`;
        ctx.beginPath();
        ctx.arc(sx, sy, 8, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#daa520';
        ctx.beginPath();
        ctx.arc(sx, sy, 5, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#ffd700';
        ctx.font = 'bold 8px monospace';
        ctx.textAlign = 'center';
        ctx.fillText('$', sx, sy + 3);
    });

    // Boost pads
    boostPads.forEach(b => {
        const sx = b.x - cameraX, sy = b.y - cameraY;
        if (sx < -40 || sx > canvas.width + 40 || sy < -40 || sy > canvas.height + 40) return;

        const pulse = Math.sin(time * 2) * 0.3 + 0.7;
        ctx.fillStyle = `rgba(255,100,0,${pulse * 0.6})`;
        ctx.beginPath();
        ctx.arc(sx, sy, 22, 0, Math.PI * 2);
        ctx.fill();

        // Arrow symbols
        ctx.fillStyle = '#ff8800';
        ctx.font = 'bold 16px monospace';
        ctx.textAlign = 'center';
        ctx.fillText('»', sx, sy + 5);

        // Glow ring
        ctx.strokeStyle = `rgba(255,200,0,${pulse * 0.5})`;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(sx, sy, 25 + Math.sin(time*3)*3, 0, Math.PI * 2);
        ctx.stroke();
    });

    // Mystery boxes
    items.forEach(it => {
        if (it.collected) return;
        const sx = it.x - cameraX, sy = it.y - cameraY;
        if (sx < -30 || sx > canvas.width + 30 || sy < -30 || sy > canvas.height + 30) return;

        const bob = Math.sin(time + it.x * 0.1) * 3;
        const glow = Math.sin(time * 2 + it.y * 0.1) * 0.3 + 0.7;

        // Glow
        ctx.fillStyle = `rgba(200,0,255,${glow * 0.3})`;
        ctx.beginPath();
        ctx.arc(sx, sy + bob, 16, 0, Math.PI * 2);
        ctx.fill();

        // Box
        ctx.fillStyle = '#a020f0';
        ctx.fillRect(sx - 8, sy - 8 + bob, 16, 16);
        ctx.strokeStyle = '#d080ff';
        ctx.lineWidth = 2;
        ctx.strokeRect(sx - 8, sy - 8 + bob, 16, 16);

        // Question mark
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 12px monospace';
        ctx.textAlign = 'center';
        ctx.fillText('?', sx, sy + 4 + bob);
    });
}

function drawHUD() {
    const pad = 15;
    const barW = 180;
    const barH = 14;

    // Semi-transparent HUD background
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.beginPath();
    ctx.roundRect(pad, pad, 220, 180, 10);
    ctx.fill();

    ctx.fillStyle = '#fff';
    ctx.font = 'bold 14px monospace';
    ctx.textAlign = 'left';

    let y = pad + 22;
    const lineHeight = 22;

    // Position
    const posSuffix = player.position === 1 ? 'st' : player.position === 2 ? 'nd' : player.position === 3 ? 'rd' : 'th';
    ctx.fillStyle = player.position === 1 ? '#ffd700' : '#fff';
    ctx.fillText(`Position: ${player.position}${posSuffix} / ${AI_COUNT + 1}`, pad + 10, y);
    y += lineHeight;

    // Lap
    ctx.fillStyle = '#fff';
    ctx.fillText(`Lap: ${Math.min(player.lap + 1, TOTAL_LAPS)} / ${TOTAL_LAPS}`, pad + 10, y);
    y += lineHeight;

    // Timer
    const mins = Math.floor(raceTimer / 3600);
    const secs = Math.floor((raceTimer % 3600) / 60);
    const frac = Math.floor((raceTimer % 60) * 10 / 6);
    ctx.fillText(`Time: ${mins}:${String(secs).padStart(2,'0')}.${String(frac).padStart(2,'0')}`, pad + 10, y);
    y += lineHeight;

    // Speed
    const speedPct = Math.abs(player.speed) / BOOST_SPEED;
    ctx.fillText('Speed:', pad + 10, y);
    ctx.fillStyle = '#333';
    ctx.fillRect(pad + 75, y - 10, barW - 60, barH);
    const speedColor = player.boostTimer > 0 ? '#f80' : speedPct > 0.7 ? '#0f0' : '#0af';
    ctx.fillStyle = speedColor;
    ctx.fillRect(pad + 75, y - 10, (barW - 60) * speedPct, barH);
    ctx.strokeStyle = '#888';
    ctx.lineWidth = 1;
    ctx.strokeRect(pad + 75, y - 10, barW - 60, barH);
    y += lineHeight;

    // Coins / Score
    ctx.fillStyle = '#ffd700';
    ctx.fillText(`Coins: ${player.coins}  Score: ${player.score}`, pad + 10, y);
    y += lineHeight;

    // Item
    if (player.itemType) {
        ctx.fillStyle = '#f0f';
        const itemLabel = player.itemType === 'boost' ? '🔥 BOOST (Shift)' : player.itemType === 'shield' ? '🛡️ SHIELD (Shift)' : '';
        ctx.fillText(`Item: ${itemLabel}`, pad + 10, y);
    } else if (player.boostTimer > 0) {
        ctx.fillStyle = '#f80';
        ctx.fillText(`BOOST ACTIVE!`, pad + 10, y);
    } else if (player.shieldTimer > 0) {
        ctx.fillStyle = '#0cf';
        ctx.fillText(`SHIELD ACTIVE`, pad + 10, y);
    } else if (player.handlingTimer > 0) {
        ctx.fillStyle = '#0f0';
        ctx.fillText(`HANDLING UP`, pad + 10, y);
    }
    y += lineHeight;

    // Mute indicator
    if (muted) {
        ctx.fillStyle = '#f55';
        ctx.font = '12px monospace';
        ctx.fillText('[MUTED]', pad + 10, y);
    }

    // --- Mini-map ---
    drawMiniMap();

    // --- Boost bar (bottom center) ---
    if (player.boostTimer > 0) {
        const bw = 200, bh = 10;
        const bx = canvas.width/2 - bw/2, by = canvas.height - 40;
        ctx.fillStyle = 'rgba(0,0,0,0.5)';
        ctx.fillRect(bx - 2, by - 2, bw + 4, bh + 4);
        ctx.fillStyle = '#f80';
        ctx.fillRect(bx, by, bw * (player.boostTimer / BOOST_DURATION), bh);
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 12px monospace';
        ctx.textAlign = 'center';
        ctx.fillText('BOOST', canvas.width/2, by - 5);
    }
}

function drawMiniMap() {
    const mapSize = 140;
    const mapX = canvas.width - mapSize - 15;
    const mapY = 15;

    // Background
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.beginPath();
    ctx.roundRect(mapX - 5, mapY - 5, mapSize + 10, mapSize + 10, 8);
    ctx.fill();

    // Find track bounds
    let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
    trackPoints.forEach(p => {
        minX = Math.min(minX, p.x); maxX = Math.max(maxX, p.x);
        minY = Math.min(minY, p.y); maxY = Math.max(maxY, p.y);
    });
    const rangeX = maxX - minX || 1;
    const rangeY = maxY - minY || 1;
    const scale = (mapSize - 20) / Math.max(rangeX, rangeY);
    const offX = mapX + (mapSize - rangeX * scale) / 2;
    const offY = mapY + (mapSize - rangeY * scale) / 2;

    // Draw track
    ctx.strokeStyle = '#666';
    ctx.lineWidth = 3;
    ctx.beginPath();
    trackPoints.forEach((p, i) => {
        const mx = offX + (p.x - minX) * scale;
        const my = offY + (p.y - minY) * scale;
        if (i === 0) ctx.moveTo(mx, my);
        else ctx.lineTo(mx, my);
    });
    ctx.closePath();
    ctx.stroke();

    // Draw karts
    const allKarts = [player, ...aiRacers];
    allKarts.forEach(k => {
        const mx = offX + (k.x - minX) * scale;
        const my = offY + (k.y - minY) * scale;
        ctx.fillStyle = k === player ? '#fff' : k.color;
        ctx.beginPath();
        ctx.arc(mx, my, k === player ? 4 : 3, 0, Math.PI * 2);
        ctx.fill();
    });
}

function drawCountdownScreen() {
    drawTrack();
    drawSkidMarks();
    drawItems();
    aiRacers.forEach(ai => ai.draw(ctx, cameraX, cameraY));
    player.draw(ctx, cameraX, cameraY);
    drawHUD();

    // Countdown overlay
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.textAlign = 'center';
    const scale = 1 + (countdownTimer % 60) / 60 * 0.3;
    ctx.save();
    ctx.translate(canvas.width/2, canvas.height/2);
    ctx.scale(scale, scale);

    if (countdownValue > 0) {
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 120px monospace';
        ctx.fillText(countdownValue, 0, 40);
    } else {
        ctx.fillStyle = '#0f0';
        ctx.font = 'bold 100px monospace';
        ctx.fillText('GO!', 0, 40);
    }
    ctx.restore();
}

function drawPauseScreen() {
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.textAlign = 'center';
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 48px monospace';
    ctx.fillText('PAUSED', canvas.width/2, canvas.height/2 - 20);
    ctx.font = '20px monospace';
    ctx.fillStyle = '#aaa';
    ctx.fillText('Press P to Resume', canvas.width/2, canvas.height/2 + 30);
}

function drawFinishScreen() {
    // Background
    ctx.fillStyle = 'rgba(0,0,0,0.8)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.textAlign = 'center';

    // Title
    ctx.fillStyle = '#ffd700';
    ctx.font = `bold ${Math.min(48, canvas.width * 0.06)}px monospace`;
    ctx.fillText('🏆 RACE COMPLETE! 🏆', canvas.width/2, canvas.height * 0.15);

    // Results box
    const boxW = 420, boxH = 300;
    const boxX = canvas.width/2 - boxW/2, boxY = canvas.height * 0.22;
    ctx.fillStyle = 'rgba(20,20,40,0.9)';
    ctx.beginPath();
    ctx.roundRect(boxX, boxY, boxW, boxH, 12);
    ctx.fill();
    ctx.strokeStyle = '#ffd700';
    ctx.lineWidth = 2;
    ctx.stroke();

    ctx.font = '18px monospace';
    let ry = boxY + 40;

    const placeStr = finishPlace === 1 ? '1st' : finishPlace === 2 ? '2nd' : finishPlace === 3 ? '3rd' : '4th';
    ctx.fillStyle = finishPlace === 1 ? '#ffd700' : '#fff';
    ctx.font = 'bold 28px monospace';
    ctx.fillText(`Finish: ${placeStr} Place`, canvas.width/2, ry);
    ry += 45;

    ctx.font = '18px monospace';
    ctx.fillStyle = '#fff';
    const mins = Math.floor(raceTimer / 3600);
    const secs = Math.floor((raceTimer % 3600) / 60);
    const frac = Math.floor((raceTimer % 60) * 10 / 6);
    ctx.fillText(`Time: ${mins}:${String(secs).padStart(2,'0')}.${String(frac).padStart(2,'0')}`, canvas.width/2, ry);
    ry += 30;

    ctx.fillStyle = '#ffd700';
    ctx.fillText(`Coins: ${player.coins}`, canvas.width/2, ry);
    ry += 30;

    ctx.fillStyle = '#0f0';
    ctx.fillText(`Score: ${player.score}`, canvas.width/2, ry);
    ry += 30;

    ctx.fillStyle = '#aaa';
    ctx.fillText(`Laps Completed: ${TOTAL_LAPS}`, canvas.width/2, ry);
    ry += 30;

    // AI results
    ctx.font = '14px monospace';
    ctx.fillStyle = '#888';
    ry += 10;
    const allKarts = [player, ...aiRacers].sort((a,b) => {
        if (a.finished && b.finished) return a.finishTime - b.finishTime;
        if (a.finished) return -1;
        if (b.finished) return 1;
        return b.totalProgress - a.totalProgress;
    });
    allKarts.forEach((k, i) => {
        const pStr = i === 0 ? '1st' : i === 1 ? '2nd' : i === 2 ? '3rd' : '4th';
        ctx.fillStyle = k === player ? '#fff' : k.color;
        ctx.fillText(`${pStr} — ${k.name}${k === player ? ' (YOU)' : ''}`, canvas.width/2, ry);
        ry += 20;
    });

    // Restart prompt
    const blink = Math.sin(Date.now() * 0.003 * 3) > 0;
    if (blink) {
        ctx.fillStyle = '#f80';
        ctx.font = 'bold 22px monospace';
        ctx.fillText('Press ENTER or R to Race Again', canvas.width/2, canvas.height * 0.88);
    }
}

// ============================================================
// GAME LOOP
// ============================================================
let lastTime = 0;
let frameCount = 0;

function gameLoop(timestamp) {
    requestAnimationFrame(gameLoop);

    const dt = Math.min(timestamp - lastTime, 33);
    lastTime = timestamp;
    frameCount++;

    // Handle global keys
    if (keys['KeyM'] && frameCount % 10 === 0) {
        muted = !muted;
    }

    if (keys['KeyR'] && frameCount % 15 === 0) {
        initGame();
        gameState = 'countdown';
        countdownTimer = 0;
        countdownValue = 3;
    }

    // State machine
    switch (gameState) {
        case 'title':
            drawTitleScreen();
            if (keys['Enter'] || keys['Space']) {
                initAudio();
                initGame();
                gameState = 'countdown';
                countdownTimer = 0;
                countdownValue = 3;
            }
            break;

        case 'countdown':
            updateCamera();
            drawCountdownScreen();
            countdownTimer++;
            if (countdownTimer % 60 === 0 && countdownTimer <= 180) {
                if (countdownValue > 0) playCountdownBeep();
                countdownValue--;
            }
            if (countdownTimer > 240) {
                gameState = 'racing';
                playGoBeep();
                raceStartTime = Date.now();
            }
            break;

        case 'racing':
            if (keys['KeyP'] && frameCount % 15 === 0) {
                gameState = 'paused';
                break;
            }

            // Update
            player.update();
            aiRacers.forEach(ai => ai.update());
            checkKartCollisions();
            updateRankings();
            updateCamera();

            // Update particles
            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update();
                if (particles[i].life <= 0) particles.splice(i, 1);
            }

            // Update skid marks
            for (let i = skidMarks.length - 1; i >= 0; i--) {
                skidMarks[i].life--;
                skidMarks[i].alpha *= 0.995;
                if (skidMarks[i].life <= 0) skidMarks.splice(i, 1);
            }

            // Respawn items
            coins.forEach(c => {
                if (c.collected) {
                    c.respawnTimer--;
                    if (c.respawnTimer <= 0) c.collected = false;
                }
            });
            items.forEach(it => {
                if (it.collected) {
                    it.respawnTimer--;
                    if (it.respawnTimer <= 0) it.collected = false;
                }
            });

            // Race timer
            raceTimer += 1; // ~60fps ticks

            // Check finish
            if (player.lap >= TOTAL_LAPS && !player.finished) {
                player.finished = true;
                player.finishTime = raceTimer;
                finishPlace = player.position;
                playFinishSound();
                setTimeout(() => { gameState = 'finished'; }, 1500);
            }

            // AI finish tracking
            aiRacers.forEach(ai => {
                if (ai.finished && ai.finishTime === raceTimer) {
                    aiFinishCount++;
                }
            });

            // Draw
            drawTrack();
            drawSkidMarks();
            drawItems();

            // Draw particles behind karts
            particles.forEach(p => p.draw(ctx, cameraX, cameraY));

            // Sort karts by Y for draw order
            const sortedKarts = [player, ...aiRacers].sort((a,b) => a.y - b.y);
            sortedKarts.forEach(k => k.draw(ctx, cameraX, cameraY));

            drawHUD();

            // Speed lines during boost
            if (player.boostTimer > 0) {
                ctx.strokeStyle = 'rgba(255,200,0,0.3)';
                ctx.lineWidth = 2;
                for (let i = 0; i < 8; i++) {
                    const lx = Math.random() * canvas.width;
                    const ly = Math.random() * canvas.height;
                    ctx.beginPath();
                    ctx.moveTo(lx, ly);
                    ctx.lineTo(lx - Math.cos(player.angle) * 40, ly - Math.sin(player.angle) * 40);
                    ctx.stroke();
                }
            }
            break;

        case 'paused':
            // Draw game frozen
            drawTrack();
            drawSkidMarks();
            drawItems();
            particles.forEach(p => p.draw(ctx, cameraX, cameraY));
            [player, ...aiRacers].sort((a,b) => a.y - b.y).forEach(k => k.draw(ctx, cameraX, cameraY));
            drawHUD();
            drawPauseScreen();

            if (keys['KeyP'] && frameCount % 15 === 0) {
                gameState = 'racing';
            }
            break;

        case 'finished':
            drawTrack();
            drawSkidMarks();
            drawItems();
            particles.forEach(p => p.draw(ctx, cameraX, cameraY));
            [player, ...aiRacers].sort((a,b) => a.y - b.y).forEach(k => k.draw(ctx, cameraX, cameraY));
            drawFinishScreen();

            if (keys['Enter'] || keys['KeyR']) {
                initGame();
                gameState = 'countdown';
                countdownTimer = 0;
                countdownValue = 3;
            }
            break;
    }
}

// ============================================================
// POLYFILL for roundRect if needed
// ============================================================
if (!CanvasRenderingContext2D.prototype.roundRect) {
    CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
        if (typeof r === 'number') r = [r, r, r, r];
        const [tl, tr, br, bl] = r;
        this.moveTo(x + tl, y);
        this.lineTo(x + w - tr, y);
        this.quadraticCurveTo(x + w, y, x + w, y + tr);
        this.lineTo(x + w, y + h - br);
        this.quadraticCurveTo(x + w, y + h, x + w - br, y + h);
        this.lineTo(x + bl, y + h);
        this.quadraticCurveTo(x, y + h, x, y + h - bl);
        this.lineTo(x, y + tl);
        this.quadraticCurveTo(x, y, x + tl, y);
        this.closePath();
        return this;
    };
}

// ============================================================
// START
// ============================================================
requestAnimationFrame(gameLoop);

</script>
