<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0, user-scalable=no"
        />
        <title>Paper Toss</title>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
            body {
                background: #1a120a;
                display: flex;
                justify-content: center;
                align-items: center;
                min-height: 100vh;
                overflow: hidden;
            }
            canvas {
                display: block;
                touch-action: none;
            }
        </style>
    </head>
    <body>
        <canvas id="c"></canvas>
        <script>
            const canvas = document.getElementById("c");
            const ctx = canvas.getContext("2d");
            const W = 400,
                H = 660;
            canvas.width = W;
            canvas.height = H;

            function resize() {
                const s = Math.min(
                    window.innerWidth / W,
                    window.innerHeight / H,
                );
                canvas.style.width = W * s + "px";
                canvas.style.height = H * s + "px";
            }
            resize();
            window.addEventListener("resize", resize);

            // ── Audio ──────────────────────────────────────────────────────────────────────
            let AC;
            function ac() {
                if (!AC)
                    AC = new (
                        window.AudioContext || window.webkitAudioContext
                    )();
                return AC;
            }

            function playHit() {
                const c = ac(),
                    t = c.currentTime;
                const o1 = c.createOscillator(),
                    g1 = c.createGain();
                o1.type = "sine";
                o1.frequency.setValueAtTime(220, t);
                o1.frequency.exponentialRampToValueAtTime(660, t + 0.07);
                g1.gain.setValueAtTime(0, t);
                g1.gain.linearRampToValueAtTime(0.2, t + 0.02);
                g1.gain.exponentialRampToValueAtTime(0.001, t + 0.28);
                o1.connect(g1);
                g1.connect(c.destination);
                o1.start(t);
                o1.stop(t + 0.28);
                const o2 = c.createOscillator(),
                    g2 = c.createGain();
                o2.type = "triangle";
                o2.frequency.value = 1318;
                g2.gain.setValueAtTime(0.13, t + 0.12);
                g2.gain.exponentialRampToValueAtTime(0.001, t + 0.65);
                o2.connect(g2);
                g2.connect(c.destination);
                o2.start(t + 0.12);
                o2.stop(t + 0.65);
            }

            function playMiss() {
                const c = ac(),
                    t = c.currentTime;
                const n = Math.floor(c.sampleRate * 0.2);
                const buf = c.createBuffer(1, n, c.sampleRate);
                const d = buf.getChannelData(0);
                for (let i = 0; i < n; i++)
                    d[i] =
                        (Math.random() * 2 - 1) *
                        Math.pow(1 - i / n, 1.8) *
                        0.65;
                const src = c.createBufferSource(),
                    f = c.createBiquadFilter(),
                    g = c.createGain();
                f.type = "lowpass";
                f.frequency.value = 230;
                src.buffer = buf;
                src.connect(f);
                f.connect(g);
                g.connect(c.destination);
                g.gain.value = 1.0;
                src.start(t);
            }

            // ── State ──────────────────────────────────────────────────────────────────────
            let streak = 0,
                best = 0,
                wind = 0;
            let state = "idle"; // idle | drag | flying | result
            let resultTimer = 0,
                resultText = "",
                resultOk = false;
            let trail = [],
                confetti = [],
                fanAngle = 0,
                binFlash = 0;
            let windFlash = 0;
            let idleBob = 0;
            let ballProg = 0;

            // Input
            let dragSX = 0,
                dragSY = 0,
                dragCX = 0,
                dragCY = 0,
                dragging = false;

            // Flight
            const FDUR = 870; // ms
            let ft = 0,
                fXVel = 0,
                fXOff = 0;

            // Scene constants
            const BACK_Y = 374; // floor/wall junction Y
            const BIN_X = 200;
            const BIN_Y = 328; // bin opening Y
            const BSX = 200; // ball start X
            const BSY = 513; // ball start Y (on desk)
            const BIN_MR = 24; // hit tolerance px
            const WACC = 0.000056; // wind acceleration px/ms² per unit

            let bx = BSX,
                by = BSY;

            // ── Logic ──────────────────────────────────────────────────────────────────────
            function newWind() {
                wind = Math.round((Math.random() * 8 - 4) * 10) / 10;
                windFlash = 500;
            }

            function resetBall() {
                bx = BSX;
                by = BSY;
                ft = 0;
                fXVel = 0;
                fXOff = 0;
                trail = [];
                ballProg = 0;
            }

            function ballR(p) {
                return 22 * (1 - p * 0.58);
            }

            function fireThrow() {
                const dx = dragCX - dragSX,
                    dy = dragCY - dragSY;
                const dist = Math.hypot(dx, dy);
                if (dist < 22 || dy > -12) return false;
                fXVel = dx / 600; // px/ms — calibrated so ~55px drag = full wind-4 comp
                ft = 0;
                fXOff = 0;
                trail = [];
                state = "flying";
                return true;
            }

            function updateFlight(dt) {
                ft += dt;
                const p = Math.min(ft / FDUR, 1);
                ballProg = p;
                fXVel += WACC * wind * dt;
                fXOff += fXVel * dt;
                const arc = 158 * Math.sin(Math.PI * p);
                bx = BSX + (BIN_X - BSX) * p + fXOff;
                by = BSY + (BIN_Y - BSY) * p - arc;
                // Trail — push every ~28ms
                if (trail.length === 0 || ft - trail[trail.length - 1].t > 28)
                    trail.push({ x: bx, y: by, t: ft, r: ballR(p) });
                if (trail.length > 32) trail.shift();
                if (p >= 1) {
                    const hit = Math.abs(fXOff) < BIN_MR;
                    if (hit) {
                        streak++;
                        if (streak > best) best = streak;
                        resultText =
                            streak > 2 ? `×${streak} STREAK!` : "NICE SHOT!";
                        resultOk = true;
                        binFlash = 420;
                        spawnConfetti();
                        playHit();
                    } else {
                        streak = 0;
                        resultText = "MISS!";
                        resultOk = false;
                        playMiss();
                    }
                    state = "result";
                    resultTimer = 0;
                }
            }

            function spawnConfetti() {
                const cols = [
                    "#FFD700",
                    "#FF6B35",
                    "#4ECDC4",
                    "#96CEB4",
                    "#F7DC6F",
                    "#AED6F1",
                    "#F1948A",
                    "#BB8FCE",
                ];
                for (let i = 0; i < 24; i++)
                    confetti.push({
                        x: BIN_X + (Math.random() - 0.5) * 54,
                        y: BIN_Y - 8,
                        vx: (Math.random() - 0.5) * 4.5,
                        vy: -(Math.random() * 5.5 + 1.5),
                        col: cols[i % cols.length],
                        life: 1,
                        r: Math.random() * 5.5 + 2.5,
                    });
            }

            // ── Drawing ───────────────────────────────────────────────────────────────────
            function rr(x, y, w, h, r) {
                // rounded rect path
                ctx.beginPath();
                ctx.moveTo(x + r, y);
                ctx.lineTo(x + w - r, y);
                ctx.quadraticCurveTo(x + w, y, x + w, y + r);
                ctx.lineTo(x + w, y + h - r);
                ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
                ctx.lineTo(x + r, y + h);
                ctx.quadraticCurveTo(x, y + h, x, y + h - r);
                ctx.lineTo(x, y + r);
                ctx.quadraticCurveTo(x, y, x + r, y);
                ctx.closePath();
            }

            function drawRoom() {
                // Ceiling
                let g = ctx.createLinearGradient(0, 0, 0, 94);
                g.addColorStop(0, "#cccaba");
                g.addColorStop(1, "#ddd5bc");
                ctx.fillStyle = g;
                ctx.fillRect(0, 0, W, 94);

                // Fluorescent light
                ctx.fillStyle = "#f4f2e0";
                ctx.fillRect(135, 7, 130, 14);
                ctx.fillStyle = "#fffbe8";
                ctx.fillRect(140, 8, 120, 10);
                g = ctx.createLinearGradient(0, 21, 0, 135);
                g.addColorStop(0, "rgba(255,252,215,0.22)");
                g.addColorStop(1, "rgba(255,252,215,0)");
                ctx.fillStyle = g;
                ctx.beginPath();
                ctx.moveTo(140, 21);
                ctx.lineTo(260, 21);
                ctx.lineTo(315, 135);
                ctx.lineTo(85, 135);
                ctx.closePath();
                ctx.fill();

                // Back wall
                g = ctx.createLinearGradient(0, 88, 0, BACK_Y);
                g.addColorStop(0, "#ede4c6");
                g.addColorStop(1, "#dfd3ad");
                ctx.fillStyle = g;
                ctx.fillRect(0, 88, W, BACK_Y - 88);

                // Left/right side walls (perspective)
                ctx.fillStyle = "#d5c89e";
                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.lineTo(62, 88);
                ctx.lineTo(0, BACK_Y);
                ctx.closePath();
                ctx.fill();
                ctx.beginPath();
                ctx.moveTo(W, 0);
                ctx.lineTo(W - 62, 88);
                ctx.lineTo(W, BACK_Y);
                ctx.closePath();
                ctx.fill();

                // Baseboard
                ctx.fillStyle = "#c2a86a";
                ctx.fillRect(0, BACK_Y - 9, W, 9);

                // Floor
                g = ctx.createLinearGradient(0, BACK_Y, 0, H);
                g.addColorStop(0, "#7d5530");
                g.addColorStop(0.35, "#8b6038");
                g.addColorStop(1, "#5a3b1c");
                ctx.fillStyle = g;
                ctx.fillRect(0, BACK_Y, W, H - BACK_Y);

                // Floor horizontal planks
                ctx.strokeStyle = "rgba(0,0,0,0.1)";
                ctx.lineWidth = 1;
                for (let i = 1; i < 9; i++) {
                    const y = BACK_Y + ((H - BACK_Y) * i) / 9;
                    ctx.beginPath();
                    ctx.moveTo(0, y);
                    ctx.lineTo(W, y);
                    ctx.stroke();
                }
                // Vertical plank lines (perspective vanish to back)
                ctx.strokeStyle = "rgba(0,0,0,0.06)";
                ctx.lineWidth = 1;
                for (let i = 1; i < 7; i++) {
                    const tx = (W * i) / 7;
                    ctx.beginPath();
                    ctx.moveTo(tx, BACK_Y);
                    ctx.lineTo(tx * 0.55 + W * 0.22, H);
                    ctx.stroke();
                }
            }

            function drawDecor() {
                // ─ Wall calendar ─
                ctx.fillStyle = "#fff";
                ctx.fillRect(292, 118, 74, 90);
                ctx.fillStyle = "#c0392b";
                ctx.fillRect(292, 118, 74, 24);
                ctx.fillStyle = "#fff";
                ctx.font = "bold 8px Courier New";
                ctx.textAlign = "center";
                ctx.fillText("MONDAY", 329, 134);
                ctx.fillStyle = "#2c3e50";
                ctx.font = "bold 34px Courier New";
                ctx.fillText("28", 329, 186);
                ctx.font = "7px Courier New";
                ctx.fillStyle = "#666";
                ctx.fillText("APRIL  2026", 329, 200);

                // ─ Loopover poster (easter egg) ─
                ctx.fillStyle = "#16213e";
                ctx.fillRect(34, 132, 84, 60);
                ctx.strokeStyle = "#4ECDC4";
                ctx.lineWidth = 1.5;
                ctx.strokeRect(35.5, 133.5, 81, 57);
                ctx.fillStyle = "#4ECDC4";
                ctx.font = "bold 8.5px Courier New";
                ctx.textAlign = "center";
                ctx.fillText("LOOPOVER", 76, 155);
                ctx.fillStyle = "#FFD700";
                ctx.font = "7px Courier New";
                ctx.fillText("loopover.co.uk", 76, 168);
                ctx.fillStyle = "rgba(78,205,196,0.5)";
                ctx.font = "22px sans-serif";
                ctx.fillText("⟳", 76, 186);

                // ─ Framed motivational print ─
                ctx.fillStyle = "#f5f0e8";
                ctx.fillRect(148, 130, 110, 70);
                ctx.strokeStyle = "#8B6914";
                ctx.lineWidth = 3;
                ctx.strokeRect(148, 130, 110, 70);
                ctx.fillStyle = "#c8b060";
                ctx.font = "bold 9px Courier New";
                ctx.textAlign = "center";
                ctx.fillText('"Aim for the', 203, 155);
                ctx.fillText("bin. Miss the", 203, 169);
                ctx.fillText('meeting."', 203, 183);
            }

            function drawFan() {
                const fx = 326,
                    fy = 285;
                // Base
                ctx.fillStyle = "#6a6a6a";
                ctx.beginPath();
                ctx.ellipse(fx, fy + 24, 15, 6, 0, 0, Math.PI * 2);
                ctx.fill();
                // Neck
                ctx.fillStyle = "#888";
                ctx.fillRect(fx - 5, fy - 12, 10, 36);
                // Outer guard ring
                ctx.strokeStyle = "#aaa";
                ctx.lineWidth = 3.5;
                ctx.beginPath();
                ctx.arc(fx, fy - 18, 22, 0, Math.PI * 2);
                ctx.stroke();
                ctx.strokeStyle = "#999";
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(fx, fy - 18, 25, 0, Math.PI * 2);
                ctx.stroke();
                // Blades
                ctx.save();
                ctx.translate(fx, fy - 18);
                ctx.rotate(fanAngle);
                for (let i = 0; i < 4; i++) {
                    ctx.rotate(Math.PI / 2);
                    ctx.fillStyle = "rgba(130,170,210,0.72)";
                    ctx.beginPath();
                    ctx.ellipse(0, -11, 4.5, 10, 0.4, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.restore();
                // Centre cap
                ctx.fillStyle = "#555";
                ctx.beginPath();
                ctx.arc(fx, fy - 18, 4, 0, Math.PI * 2);
                ctx.fill();
            }

            function drawBin() {
                const bsx = BIN_X,
                    bsy = BIN_Y;
                const bw = 46,
                    bh = 56;
                const fl = Math.min(1, binFlash / 420);
                const bump = Math.floor(fl * 55);

                // Body
                ctx.fillStyle = `rgb(${118 + bump},${132 + Math.floor(bump * 0.7)},${118 + bump})`;
                ctx.beginPath();
                ctx.moveTo(bsx - bw / 2, bsy);
                ctx.lineTo(bsx + bw / 2, bsy);
                ctx.lineTo(bsx + bw / 2 - 5, bsy + bh);
                ctx.lineTo(bsx - bw / 2 + 5, bsy + bh);
                ctx.closePath();
                ctx.fill();

                // Right-side shading
                ctx.fillStyle = "rgba(0,0,0,0.13)";
                ctx.beginPath();
                ctx.moveTo(bsx + 4, bsy);
                ctx.lineTo(bsx + bw / 2, bsy);
                ctx.lineTo(bsx + bw / 2 - 5, bsy + bh);
                ctx.lineTo(bsx + 1, bsy + bh);
                ctx.closePath();
                ctx.fill();

                // Horizontal ribs
                ctx.strokeStyle = "rgba(0,0,0,0.1)";
                ctx.lineWidth = 1;
                for (let i = 1; i < 4; i++) {
                    const ry = bsy + (bh * i) / 4,
                        rw = bw / 2 - 2 - i * 0.5;
                    ctx.beginPath();
                    ctx.moveTo(bsx - rw, ry);
                    ctx.lineTo(bsx + rw, ry);
                    ctx.stroke();
                }

                // Rim
                ctx.fillStyle = "#a8b8a0";
                ctx.beginPath();
                ctx.ellipse(bsx, bsy, bw / 2 + 3, 6.5, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = "#88a080";
                ctx.beginPath();
                ctx.ellipse(bsx, bsy, bw / 2, 5, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = "#101e10";
                ctx.beginPath();
                ctx.ellipse(bsx, bsy, bw / 2 - 4, 3.5, 0, 0, Math.PI * 2);
                ctx.fill();

                // Ground shadow
                ctx.fillStyle = "rgba(0,0,0,0.22)";
                ctx.beginPath();
                ctx.ellipse(
                    bsx,
                    bsy + bh + 4,
                    bw / 2 - 5,
                    4,
                    0,
                    0,
                    Math.PI * 2,
                );
                ctx.fill();
            }

            function drawBall(x, y, r, alpha) {
                if (alpha === undefined) alpha = 1;
                ctx.save();
                ctx.globalAlpha = alpha;
                const g = ctx.createRadialGradient(
                    x - r * 0.32,
                    y - r * 0.38,
                    r * 0.04,
                    x,
                    y,
                    r,
                );
                g.addColorStop(0, "#f9f7f1");
                g.addColorStop(0.55, "#ece4d4");
                g.addColorStop(1, "#c4baa0");
                ctx.fillStyle = g;
                ctx.beginPath();
                ctx.arc(x, y, r, 0, Math.PI * 2);
                ctx.fill();
                // Crumple marks
                ctx.strokeStyle = `rgba(85,75,55,${0.28 * alpha})`;
                ctx.lineWidth = Math.max(0.5, r * 0.07);
                ctx.lineCap = "round";
                [
                    [
                        [-0.45, -0.15],
                        [0.08, 0.42],
                    ],
                    [
                        [0.18, -0.5],
                        [-0.12, 0.12],
                    ],
                    [
                        [-0.22, 0.28],
                        [0.42, 0.04],
                    ],
                    [
                        [0.05, -0.06],
                        [0.44, 0.28],
                    ],
                ].forEach(([a, b]) => {
                    ctx.beginPath();
                    ctx.moveTo(x + a[0] * r, y + a[1] * r);
                    ctx.lineTo(x + b[0] * r, y + b[1] * r);
                    ctx.stroke();
                });
                ctx.restore();
            }

            function drawTrail() {
                trail.forEach((pt, i) => {
                    const a = (i / trail.length) * 0.32;
                    ctx.fillStyle = `rgba(218,208,180,${a})`;
                    ctx.beginPath();
                    ctx.arc(pt.x, pt.y, pt.r * 0.52, 0, Math.PI * 2);
                    ctx.fill();
                });
            }

            function drawDesk() {
                // Desk top surface
                let g = ctx.createLinearGradient(0, 534, 0, 568);
                g.addColorStop(0, "#c08840");
                g.addColorStop(1, "#8a5820");
                ctx.fillStyle = g;
                ctx.fillRect(0, 534, W, 36);
                ctx.fillStyle = "#d09850";
                ctx.fillRect(0, 532, W, 5);
                // Desk front face
                g = ctx.createLinearGradient(0, 570, 0, H);
                g.addColorStop(0, "#6a4018");
                g.addColorStop(1, "#4a2a0a");
                ctx.fillStyle = g;
                ctx.fillRect(0, 570, W, H - 570);

                // ─ Paper stack ─
                ctx.fillStyle = "#e0dace";
                ctx.fillRect(42, 514, 56, 24);
                ctx.fillStyle = "#ece8de";
                ctx.fillRect(40, 517, 56, 22);
                ctx.fillStyle = "#f2f0e6";
                ctx.fillRect(38, 520, 56, 18);
                ctx.strokeStyle = "rgba(80,80,80,0.22)";
                ctx.lineWidth = 1;
                for (let i = 0; i < 3; i++) {
                    ctx.beginPath();
                    ctx.moveTo(44, 524 + i * 5);
                    ctx.lineTo(88, 524 + i * 5);
                    ctx.stroke();
                }

                // ─ Coffee mug ─
                ctx.fillStyle = "#b83030";
                ctx.fillRect(317, 510, 23, 28);
                ctx.fillStyle = "#da4040";
                ctx.fillRect(315, 508, 27, 7);
                ctx.strokeStyle = "#b83030";
                ctx.lineWidth = 3.5;
                ctx.beginPath();
                ctx.arc(344, 523, 5.5, Math.PI * 0.25, Math.PI * 1.75);
                ctx.stroke();
                ctx.fillStyle = "#c8a060";
                ctx.fillRect(318, 514, 20, 2);
                // Steam
                ctx.strokeStyle = "rgba(200,200,190,0.45)";
                ctx.lineWidth = 1.8;
                ctx.lineCap = "round";
                [
                    [324, 507],
                    [330, 507],
                ].forEach(([sx, sy]) => {
                    ctx.beginPath();
                    ctx.moveTo(sx, sy);
                    ctx.bezierCurveTo(
                        sx - 4,
                        sy - 7,
                        sx + 4,
                        sy - 13,
                        sx,
                        sy - 19,
                    );
                    ctx.stroke();
                });

                // ─ Pencil cup ─
                ctx.fillStyle = "#2c4a6e";
                ctx.fillRect(358, 518, 24, 24);
                ctx.fillStyle = "rgba(0,0,0,0.25)";
                ctx.beginPath();
                ctx.ellipse(370, 518, 12, 4.5, 0, 0, Math.PI * 2);
                ctx.fill();
                ["#F1C40F", "#27AE60", "#E74C3C"].forEach((col, i) => {
                    ctx.fillStyle = col;
                    ctx.fillRect(361 + i * 5, 503, 3.5, 17);
                    ctx.fillStyle = "#f4d088";
                    ctx.fillRect(361 + i * 5, 500, 3.5, 4);
                });
            }

            function drawDragHint() {
                if (state !== "drag") return;
                const dx = dragCX - dragSX,
                    dy = dragCY - dragSY;
                const dist = Math.hypot(dx, dy);
                if (dist < 12) return;
                const valid = dy < -10,
                    pow = Math.min(dist / 165, 1);
                ctx.save();
                ctx.setLineDash([5, 8]);
                ctx.strokeStyle = valid
                    ? `rgba(255,200,45,${0.38 + pow * 0.52})`
                    : "rgba(200,80,60,0.4)";
                ctx.lineWidth = 2.5;
                ctx.beginPath();
                ctx.moveTo(dragSX, dragSY);
                ctx.lineTo(dragCX, dragCY);
                ctx.stroke();
                ctx.setLineDash([]);
                if (valid) {
                    const ang = Math.atan2(dy, dx);
                    ctx.translate(dragCX, dragCY);
                    ctx.rotate(ang);
                    ctx.fillStyle = `rgba(255,200,45,${0.62 + pow * 0.35})`;
                    ctx.beginPath();
                    ctx.moveTo(11, 0);
                    ctx.lineTo(-7, -5.5);
                    ctx.lineTo(-7, 5.5);
                    ctx.closePath();
                    ctx.fill();
                }
                ctx.restore();
            }

            function drawConfettiPieces(dt) {
                ctx.save();
                confetti.forEach((c) => {
                    c.x += c.vx;
                    c.y += c.vy;
                    c.vy += 0.14;
                    c.life -= dt / 1050;
                    const a = Math.max(0, c.life * 0.92);
                    ctx.globalAlpha = a;
                    ctx.fillStyle = c.col;
                    ctx.save();
                    ctx.translate(c.x, c.y);
                    ctx.rotate(c.life * 9);
                    ctx.fillRect(-c.r, -c.r * 0.55, c.r * 2, c.r * 1.1);
                    ctx.restore();
                });
                ctx.restore();
                confetti = confetti.filter((c) => c.life > 0);
            }

            function drawUI() {
                const wAbs = Math.abs(wind),
                    wDir = wind > 0 ? "→" : wind < 0 ? "←" : "—";
                const wCol = wAbs > 2.5 ? "#FF6B35" : "#4ECDC4";
                const wf = Math.min(1, windFlash / 500);

                // ─ Score panel ─
                ctx.fillStyle = "rgba(0,0,0,0.52)";
                rr(10, 10, 175, 52, 8);
                ctx.fill();
                ctx.font = "10px Courier New";
                ctx.fillStyle = "rgba(255,255,255,0.5)";
                ctx.textAlign = "left";
                ctx.fillText("STREAK", 22, 27);
                ctx.fillText("BEST", 116, 27);
                ctx.font = "bold 24px Courier New";
                ctx.fillStyle = streak > 0 ? "#FFD700" : "#eee";
                ctx.fillText(streak, 22, 52);
                ctx.fillStyle = "#ddd";
                ctx.fillText(best, 116, 52);

                // ─ Wind panel ─
                if (wf > 0) {
                    ctx.fillStyle = `rgba(255,200,50,${wf * 0.12})`;
                    rr(215, 10, 175, 52, 8);
                    ctx.fill();
                }
                ctx.fillStyle = "rgba(0,0,0,0.52)";
                rr(215, 10, 175, 52, 8);
                ctx.fill();
                ctx.font = "10px Courier New";
                ctx.fillStyle = "rgba(255,255,255,0.5)";
                ctx.textAlign = "left";
                ctx.fillText("WIND", 227, 27);

                // Wind bar track
                const bx0 = 266,
                    barW = 106,
                    midX = bx0 + barW / 2;
                ctx.fillStyle = "rgba(255,255,255,0.1)";
                ctx.fillRect(bx0, 34, barW, 10);
                const fill = (wind / 4) * (barW / 2);
                ctx.fillStyle = wCol;
                if (wind >= 0) ctx.fillRect(midX, 34, fill, 10);
                else ctx.fillRect(midX + fill, 34, -fill, 10);
                ctx.fillStyle = "rgba(255,255,255,0.85)";
                ctx.fillRect(midX - 1, 32, 2, 14);

                ctx.font = "bold 14px Courier New";
                ctx.fillStyle = wAbs > 0 ? wCol : "#aaa";
                ctx.textAlign = "center";
                ctx.fillText(`${wDir} ${wAbs.toFixed(1)}`, 302, 52);

                // ─ Swipe hint ─
                if (state === "idle") {
                    ctx.fillStyle = "rgba(0,0,0,0.45)";
                    rr(112, 482, 176, 36, 18);
                    ctx.fill();
                    ctx.font = "13px Courier New";
                    ctx.fillStyle = "rgba(255,255,255,0.72)";
                    ctx.textAlign = "center";
                    ctx.fillText("↑  SWIPE TO THROW", 200, 505);
                }

                // ─ Result text ─
                if (state === "result") {
                    const fade = 1 - Math.max(0, (resultTimer - 480) / 300);
                    if (fade > 0) {
                        ctx.save();
                        ctx.globalAlpha = Math.max(0, fade);
                        ctx.font = "bold 38px Courier New";
                        ctx.textAlign = "center";
                        ctx.shadowColor = "rgba(0,0,0,0.65)";
                        ctx.shadowBlur = 14;
                        ctx.fillStyle = resultOk ? "#FFD700" : "#FF6B35";
                        ctx.fillText(resultText, 200, 445);
                        ctx.restore();
                    }
                }

                ctx.textAlign = "left";
            }

            // ── Input ──────────────────────────────────────────────────────────────────────
            function getP(e) {
                const r = canvas.getBoundingClientRect(),
                    sx = W / r.width,
                    sy = H / r.height;
                const src = e.touches ? e.touches[0] : e;
                return {
                    x: (src.clientX - r.left) * sx,
                    y: (src.clientY - r.top) * sy,
                };
            }
            function onDown(e) {
                if (state !== "idle") return;
                const p = getP(e);
                if (p.y < 370) return;
                dragSX = p.x;
                dragSY = p.y;
                dragCX = p.x;
                dragCY = p.y;
                dragging = true;
                state = "drag";
                ac();
            }
            function onMove(e) {
                if (!dragging) return;
                const p = getP(e);
                dragCX = p.x;
                dragCY = p.y;
            }
            function onUp(e) {
                if (!dragging) return;
                dragging = false;
                if (state === "drag") {
                    if (!fireThrow()) state = "idle";
                }
            }

            canvas.addEventListener("mousedown", onDown);
            canvas.addEventListener("mousemove", onMove);
            canvas.addEventListener("mouseup", onUp);
            canvas.addEventListener(
                "touchstart",
                (e) => {
                    e.preventDefault();
                    onDown(e);
                },
                { passive: false },
            );
            canvas.addEventListener(
                "touchmove",
                (e) => {
                    e.preventDefault();
                    onMove(e);
                },
                { passive: false },
            );
            canvas.addEventListener(
                "touchend",
                (e) => {
                    e.preventDefault();
                    onUp(e);
                },
                { passive: false },
            );

            // ── Main Loop ─────────────────────────────────────────────────────────────────
            let lastT = 0;
            function loop(ts) {
                const dt = Math.min(ts - lastT, 50);
                lastT = ts;

                fanAngle += dt * 0.017;
                idleBob += dt * 0.0028;
                if (binFlash > 0) binFlash = Math.max(0, binFlash - dt);
                if (windFlash > 0) windFlash = Math.max(0, windFlash - dt);

                if (state === "flying") updateFlight(dt);
                if (state === "result") {
                    resultTimer += dt;
                    if (resultTimer > 820) {
                        state = "idle";
                        newWind();
                        resetBall();
                    }
                }

                // Apply idle bob to resting ball
                if (state === "idle" || state === "drag") {
                    bx = BSX;
                    by = BSY + Math.sin(idleBob) * 1.8;
                }

                ctx.clearRect(0, 0, W, H);
                drawRoom();
                drawDecor();
                drawFan();
                drawBin();
                drawTrail();

                const flying = state === "flying";
                const bsz = ballR(ballProg);

                // Ball in flight: draw before desk (it's airborne above desk)
                if (flying) drawBall(bx, by, bsz);

                drawDesk();

                // Ball at rest / result: draw on top of desk surface
                if (!flying) drawBall(bx, by, bsz);

                drawDragHint();
                drawConfettiPieces(dt);
                drawUI();

                requestAnimationFrame(loop);
            }

            // ── Init ──────────────────────────────────────────────────────────────────────
            newWind();
            resetBall();
            requestAnimationFrame((ts) => {
                lastT = ts;
                requestAnimationFrame(loop);
            });
        </script>
    </body>
</html>
