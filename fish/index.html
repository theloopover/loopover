<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>fish</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100%;background:#000;color:#fff;font-family:'DM Sans',sans-serif}
body{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 24px;gap:40px}

.title{font-family:'Bebas Neue',sans-serif;font-size:clamp(2rem,8vw,5rem);letter-spacing:0.04em;line-height:1;opacity:0;animation:fadeIn 0.6s 0.1s forwards;text-align:center}
.title span{color:#e8ff47}

.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;width:100%;max-width:720px;opacity:0;animation:fadeIn 0.5s 0.4s forwards}

.game{display:flex;align-items:center;justify-content:center;border:1px solid rgba(255,255,255,0.12);border-radius:12px;padding:20px 12px;text-decoration:none;color:#fff;font-family:'Bebas Neue',sans-serif;font-size:1.3rem;letter-spacing:0.1em;text-transform:uppercase;transition:border-color 0.2s,color 0.2s,background 0.2s;text-align:center;min-height:64px}
.game:hover{border-color:#e8ff47;color:#e8ff47;background:rgba(232,255,71,0.04)}

.back{opacity:0;animation:fadeIn 0.5s 0.6s forwards}
.back a{color:#fff;text-decoration:none;font-size:0.75rem;letter-spacing:0.25em;text-transform:uppercase;opacity:0.35;position:relative;transition:color 0.2s,opacity 0.2s}
.back a::after{content:'';position:absolute;bottom:-3px;left:0;width:0;height:1px;background:#e8ff47;transition:width 0.3s ease}
.back a:hover{color:#e8ff47;opacity:1}
.back a:hover::after{width:100%}

@media(min-width:520px){.grid{grid-template-columns:repeat(3,1fr)}}
@media(min-width:720px){.grid{grid-template-columns:repeat(4,1fr)}}

@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
  <h1 class="title">Welcome <span>Fish</span></h1>

  <div class="grid">
    <a class="game" href="https://loopover.co.uk/fish/snake/">Snake</a>
    <a class="game" href="https://loopover.co.uk/fish/blackjack/">Blackjack</a>
    <a class="game" href="https://loopover.co.uk/fish/rockpaperscissors/">Rock Paper Scissors</a>
    <a class="game" href="https://loopover.co.uk/fish/bowman/">Bowman</a>
    <a class="game" href="https://loopover.co.uk/fish/runner/">Runner</a>
    <a class="game" href="https://loopover.co.uk/fish/copter/">Copter</a>
    <a class="game" href="https://loopover.co.uk/fish/chess/">Chess</a>
  </div>

  <div class="back"><a href="https://loopover.co.uk">Back</a></div>
</body>
</html>
