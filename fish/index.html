<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>fish</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100%;background:#0a0a0f;color:#fff;font-family:'DM Sans',sans-serif}
body{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 24px 48px;gap:48px}

.title{font-family:'Bebas Neue',sans-serif;font-size:clamp(2rem,8vw,5rem);letter-spacing:0.04em;line-height:1;opacity:0;animation:fadeIn 0.6s 0.1s forwards;text-align:center}
.title span{color:#e8ff47}

.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;width:100%;max-width:640px;opacity:0;animation:fadeIn 0.5s 0.4s forwards}

.game{position:relative;display:flex;align-items:flex-end;justify-content:flex-start;border:1px solid rgba(255,255,255,0.04);border-radius:16px;padding:24px;text-decoration:none;color:#fff;font-family:'Bebas Neue',sans-serif;font-size:1.6rem;letter-spacing:0.06em;text-transform:uppercase;transition:border-color 0.25s,color 0.25s,background 0.25s;background:rgba(255,255,255,0.02);min-height:120px;overflow:hidden}
.game::after{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(232,255,71,0),transparent);opacity:0;transition:opacity 0.3s}
.game:hover{border-color:rgba(232,255,71,0.25);color:#e8ff47;background:rgba(232,255,71,0.02)}
.game:hover::after{opacity:1;background:linear-gradient(90deg,transparent,rgba(232,255,71,0.4),transparent)}

.num{position:absolute;top:16px;right:18px;font-family:'Bebas Neue',sans-serif;font-size:3.5rem;color:rgba(255,255,255,0.04);line-height:1;pointer-events:none;user-select:none}

.back{opacity:0;animation:fadeIn 0.5s 0.6s forwards}
.back a{color:#fff;text-decoration:none;font-size:0.75rem;letter-spacing:0.25em;text-transform:uppercase;opacity:0.3;position:relative;transition:color 0.2s,opacity 0.2s}
.back a::after{content:'';position:absolute;bottom:-3px;left:0;width:0;height:1px;background:#e8ff47;transition:width 0.3s ease}
.back a:hover{color:#e8ff47;opacity:1}
.back a:hover::after{width:100%}

@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
  <h1 class="title">Welcome <span>Fish</span></h1>

  <div class="grid">
    <a class="game" href="https://loopover.co.uk/fish/snake/"><span class="num">01</span>Snake</a>
    <a class="game" href="https://loopover.co.uk/fish/blackjack/"><span class="num">02</span>Blackjack</a>
    <a class="game" href="https://loopover.co.uk/fish/rockpaperscissors/"><span class="num">03</span>Rock Paper Scissors</a>
    <a class="game" href="https://loopover.co.uk/fish/bowman/"><span class="num">04</span>Bowman</a>
    <a class="game" href="https://loopover.co.uk/fish/runner/"><span class="num">05</span>Runner</a>
    <a class="game" href="https://loopover.co.uk/fish/copter/"><span class="num">06</span>Copter</a>
    <a class="game" href="https://loopover.co.uk/fish/chess/"><span class="num">07</span>Chess</a>
  </div>

  <div class="back"><a href="https://loopover.co.uk">Back</a></div>
</body>
</html>
