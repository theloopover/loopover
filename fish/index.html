<style>
  :root {
    /* Defaults — overridden by JS based on tweaks */
    --bg: #07090f; --surface: #0e1220; --line: #1d2238;

    --accent: #22d3ee; --accent2: #a78bfa; --ink: #07090f;

    --display: 'Bricolage Grotesque', system-ui, sans-serif;
    --body: 'DM Sans', system-ui, sans-serif;
    --mono: 'JetBrains Mono', ui-monospace, monospace;
    --display-weight: 800;
    --tight: -0.04em;
    --maxw: 1320px;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--fg);
    font-family: var(--body);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    text-rendering: optimizeLegibility;
    overflow-x: hidden;
    padding-left: env(safe-area-inset-left);
    padding-right: env(safe-area-inset-right);
  }

  a { color: inherit; }
  ::selection { background: var(--accent); color: var(--ink); }

  /* Subtle water-light overlay */
  body::before {
    content: ""; position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background:
      radial-gradient(60% 40% at 12% 8%,  color-mix(in oklab, var(--accent)  18%, transparent), transparent 70%),
      radial-gradient(50% 40% at 90% 14%, color-mix(in oklab, var(--accent2) 14%, transparent), transparent 70%);
  }

  /* Rising bubble animation */
  @keyframes rise {
    0%   { transform: translate(0, 0)   scale(.9); opacity: 0; }
    8%   { opacity: .6; }
    50%  { transform: translate(calc(var(--drift) * 0.5), -55vh) scale(1); }
    100% { transform: translate(var(--drift), -110vh) scale(1.05); opacity: 0; }
  }
  @media (prefers-reduced-motion: reduce) {
    [aria-hidden] span { animation: none !important; }
  }

  /* Mobile menu button & drawer */
  .nav-menu-btn { display: none; }
  .nav-menu-btn {
    width: 40px; height: 40px; border-radius: 999px; border: 1px solid var(--line);
    background: var(--surface); color: var(--fg);
    align-items: center; justify-content: center;
    cursor: pointer; padding: 0;
  }
  .nav-menu-btn svg { display: block; }
  .nav-drawer {
    position: fixed; left: 0; right: 0; top: 64px; z-index: 49;
    background: var(--bg); border-top: 1px solid var(--line); border-bottom: 1px solid var(--line);
    padding: 16px 20px 24px;
    display: flex; flex-direction: column; gap: 6px;
    transform: translateY(-8px); opacity: 0; pointer-events: none;
    transition: opacity .2s ease, transform .25s ease;
  }
  .nav-drawer.open { transform: translateY(0); opacity: 1; pointer-events: auto; }
  .nav-drawer a {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 4px; text-decoration: none; color: var(--fg);
    font-family: var(--mono); font-size: 13px; letter-spacing: .12em; text-transform: uppercase;
    border-bottom: 1px solid var(--line);
  }
  .nav-drawer a:last-child { border-bottom: none; }

  /* Responsive */
  @media (max-width: 1100px) {
    .fish-grid { grid-template-columns: repeat(4, minmax(0, 1fr)) !important; }
  }
  @media (max-width: 860px) {
    .fish-grid { grid-template-columns: repeat(3, minmax(0, 1fr)) !important; }
    .container { padding: 0 24px; }
  }
  @media (max-width: 768px) {
    .nav-links { display: none !important; }
    .nav-menu-btn { display: inline-flex; }
  }
  @media (max-width: 600px) {
    .fish-grid { grid-template-columns: repeat(2, minmax(0, 1fr)) !important; gap: 12px !important; }
    .container { padding: 0 20px; }
  }
  @media (max-width: 380px) {
    .container { padding: 0 16px; }
    .fish-grid { grid-template-columns: minmax(0, 1fr) !important; }
  }

  button { font-family: inherit; }
  select { font-family: inherit; -webkit-appearance: none; appearance: none; cursor: pointer; }
</style>
