<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Canabalt Web Clone</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #e0e0e0;
            overflow: hidden;
            font-family: 'Courier New', Courier, monospace;
            touch-action: none; /* Prevents mobile scrolling */
        }
        canvas {
            display: block;
        }
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .score-container {
            padding: 20px;
            display: flex;
            justify-content: space-between;
            font-size: 24px;
            font-weight: bold;
            color: #333;
        }
        #message {
            text-align: center;
            font-size: 28px;
            color: #111;
            margin-bottom: 20vh;
            text-transform: uppercase;
            font-weight: bold;
        }
        .blink {
            animation: blinker 1s linear infinite;
        }
        @keyframes blinker {
            50% { opacity: 0; }
        }
    </style>
</head>
<body>

    <canvas id="gameCanvas"></canvas>
    
    <div id="ui-layer">
        <div class="score-container">
            <div>Score: <span id="score">0</span>m</div>
            <div>High: <span id="highScore">0</span>m</div>
        </div>
        <div id="message" class="blink">Tap or Space to Start</div>
    </div>

    <script>
        // --- Setup & Configuration ---
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const highScoreEl = document.getElementById('highScore');
        const messageEl = document.getElementById('message');

        let width, height;
        let scale = 1;
        let isRunning = false;
        let animationId;

        // Game State
        let state = 'START'; // START, PLAYING, GAMEOVER
        let score = 0;
        let highScore = localStorage.getItem('canabaltHighScore') || 0;
        highScoreEl.innerText = Math.floor(highScore);

        // --- Audio Engine (Web Audio API) ---
        let audioCtx;
        let musicInterval;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function playJumpSound() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.type = 'square';
            osc.frequency.setValueAtTime(150, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(400, audioCtx.currentTime + 0.15);
            gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.15);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.15);
        }

        function playCrashSound() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(100, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(10, audioCtx.currentTime + 0.5);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.5);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.5);
        }

        function startMusic() {
            if (!audioCtx) return;
            let noteIndex = 0;
            // A driving, repetitive bassline typical of the genre
            const notes = [110, 110, 130, 110, 146.83, 110, 130, 98]; 
            
            musicInterval = setInterval(() => {
                if(state !== 'PLAYING') return;
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.type = 'square';
                osc.frequency.value = notes[noteIndex % notes.length];
                gain.gain.setValueAtTime(0.02, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.15);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.15);
                noteIndex++;
            }, 150); // 150ms per 16th note (~100 BPM)
        }

        function stopMusic() {
            clearInterval(musicInterval);
        }

        // --- Game Entities ---
        const player = {
            x: 100,
            y: 0,
            width: 24,
            height: 36,
            vy: 0,
            gravity: 0.6,
            jumpPower: -10,
            isGrounded: false,
            animFrame: 0
        };

        let buildings = [];
        let baseSpeed = 6;
        let speed = baseSpeed;
        const maxSpeed = 16;
        const buildingColors = ['#222', '#333', '#1a1a1a'];

        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
            
            // Re-adjust player if necessary, keeping relative scale
            player.y = height / 2;
        }
        window.addEventListener('resize', resize);
        resize();

        // --- Core Mechanics ---
        function resetGame() {
            score = 0;
            speed = baseSpeed;
            player.y = height / 2 - 100;
            player.vy = 0;
            buildings = [];
            
            // Create initial building under player
            buildings.push({
                x: 0,
                y: height / 2,
                width: width,
                height: height / 2,
                color: '#222'
            });
        }

        function generateBuildings() {
            const lastBuilding = buildings[buildings.length - 1];
            
            // If the last building is entering the screen, generate the next one
            if (lastBuilding.x + lastBuilding.width < width + 100) {
                // Gap correlates to current speed (faster = can jump further)
                const gap = Math.random() * (speed * 15) + 50; 
                const newWidth = Math.random() * 400 + 200;
                
                // Height changes moderately
                let newY = lastBuilding.y + (Math.random() * 160 - 80);
                
                // Keep it within screen bounds
                if (newY < height * 0.3) newY = height * 0.3;
                if (newY > height * 0.8) newY = height * 0.8;

                buildings.push({
                    x: lastBuilding.x + lastBuilding.width + gap,
                    y: newY,
                    width: newWidth,
                    height: height - newY,
                    color: buildingColors[Math.floor(Math.random() * buildingColors.length)]
                });
            }

            // Cleanup old buildings
            buildings = buildings.filter(b => b.x + b.width > 0);
        }

        function jump() {
            if (state === 'START' || state === 'GAMEOVER') {
                initAudio();
                if (state === 'GAMEOVER') stopMusic();
                state = 'PLAYING';
                messageEl.style.display = 'none';
                resetGame();
                startMusic();
                return;
            }

            if (state === 'PLAYING' && player.isGrounded) {
                player.vy = player.jumpPower;
                player.isGrounded = false;
                playJumpSound();
            }
        }

        // Inputs
        window.addEventListener('keydown', (e) => { if(e.code === 'Space') jump(); });
        window.addEventListener('touchstart', (e) => { e.preventDefault(); jump(); }, {passive: false});
        window.addEventListener('mousedown', jump);

        function update() {
            if (state !== 'PLAYING') return;

            // Physics
            player.vy += player.gravity;
            player.y += player.vy;
            player.isGrounded = false;

            // Speed up over time
            if (speed < maxSpeed) speed += 0.002;
            
            // Score
            score += speed / 60; // Meters based on speed
            scoreEl.innerText = Math.floor(score);

            generateBuildings();

            // Move buildings and Check Collisions
            let hitBuilding = false;
            
            for (let i = 0; i < buildings.length; i++) {
                let b = buildings[i];
                b.x -= speed;

                // AABB Collision check
                if (player.x < b.x + b.width &&
                    player.x + player.width > b.x &&
                    player.y + player.height > b.y &&
                    player.y < b.y + b.height) {
                    
                    // Did we land on top?
                    // Previous frame Y bottom <= building Y top
                    const prevBottom = (player.y - player.vy) + player.height;
                    if (prevBottom <= b.y + 10 && player.vy >= 0) {
                        player.y = b.y - player.height;
                        player.vy = 0;
                        player.isGrounded = true;
                        hitBuilding = true;
                    } else {
                        // Crashed into the side!
                        gameOver();
                    }
                }
            }

            // Death by falling
            if (player.y > height) {
                gameOver();
            }

            // Animation timing
            if (player.isGrounded) {
                player.animFrame += speed * 0.05;
            }
        }

        function gameOver() {
            state = 'GAMEOVER';
            playCrashSound();
            stopMusic();
            
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('canabaltHighScore', highScore);
                highScoreEl.innerText = Math.floor(highScore);
            }
            
            messageEl.innerHTML = "CRASHED!<br><br>Tap to Restart";
            messageEl.style.display = 'block';
        }

        function draw() {
            // Background
            ctx.fillStyle = '#e0e0e0';
            ctx.fillRect(0, 0, width, height);

            // Draw Background Parallax Buildings (Simple rectangles)
            ctx.fillStyle = '#bcbcbc';
            for(let i=0; i<5; i++) {
                let px = ((i * 300) - (score * 5 % 300));
                ctx.fillRect(px, height - 200, 200, 200);
            }

            // Draw Buildings
            for (let b of buildings) {
                ctx.fillStyle = b.color;
                ctx.fillRect(b.x, b.y, b.width, height - b.y);
                
                // Draw a simple ledge/trim at the top
                ctx.fillStyle = '#555';
                ctx.fillRect(b.x, b.y, b.width, 4);
                
                // Draw windows
                ctx.fillStyle = '#555';
                for(let wx = b.x + 20; wx < b.x + b.width - 20; wx += 40) {
                    for(let wy = b.y + 30; wy < height; wy += 50) {
                        ctx.fillRect(wx, wy, 15, 25);
                    }
                }
            }

            // Draw Player
            ctx.save();
            ctx.translate(player.x, player.y);
            
            // Simple animation
            let yOffset = 0;
            if (player.isGrounded) {
                yOffset = Math.sin(player.animFrame) * 2; // Bobbing up and down while running
            } else {
                yOffset = -3; // Jump pose
            }

            // Player body
            ctx.fillStyle = '#111';
            ctx.fillRect(0, yOffset, player.width, player.height);
            
            // Scarf / tie (Canabalt trademark flowing tie)
            ctx.fillStyle = '#fff';
            ctx.fillRect(-15, yOffset + 10, 20, 4); 

            // Head
            ctx.fillStyle = '#fff';
            ctx.fillRect(player.width - 10, yOffset - 5, 12, 10);

            ctx.restore();
        }

        function loop() {
            update();
            draw();
            animationId = requestAnimationFrame(loop);
        }

        // Start loop
        resetGame();
        loop();

    </script>
</body>
</html>
