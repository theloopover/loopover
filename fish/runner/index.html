<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Canabalt Web Clone - Extended</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #e0e0e0;
            overflow: hidden;
            font-family: 'Courier New', Courier, monospace;
            touch-action: none;
        }
        canvas {
            display: block;
        }
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .score-container {
            padding: 20px;
            display: flex;
            justify-content: space-between;
            font-size: 24px;
            font-weight: bold;
            color: #333;
            text-shadow: 1px 1px 0px #fff;
        }
        #message {
            text-align: center;
            font-size: 28px;
            color: #111;
            margin-bottom: 20vh;
            text-transform: uppercase;
            font-weight: bold;
            background: rgba(255,255,255,0.7);
            padding: 10px;
        }
        .blink {
            animation: blinker 1s linear infinite;
        }
        @keyframes blinker {
            50% { opacity: 0; }
        }
    </style>
</head>
<body>

    <canvas id="gameCanvas"></canvas>
    
    <div id="ui-layer">
        <div class="score-container">
            <div>Score: <span id="score">0</span>m</div>
            <div>High: <span id="highScore">0</span>m</div>
        </div>
        <div id="message" class="blink">Tap or Space to Start</div>
    </div>

    <script>
        // --- Setup & Configuration ---
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const highScoreEl = document.getElementById('highScore');
        const messageEl = document.getElementById('message');

        let width, height;
        let isRunning = false;
        let animationId;

        // Game State
        let state = 'START'; 
        let score = 0;
        let highScore = localStorage.getItem('canabaltHighScore') || 0;
        highScoreEl.innerText = Math.floor(highScore);

        // --- Audio Engine (Web Audio API) ---
        let audioCtx;
        let musicInterval;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function playJumpSound(isDoubleJump = false) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.type = 'square';
            const startFreq = isDoubleJump ? 250 : 150;
            const endFreq = isDoubleJump ? 600 : 400;
            osc.frequency.setValueAtTime(startFreq, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(endFreq, audioCtx.currentTime + 0.15);
            gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.15);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.15);
        }

        function playCrashSound() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(100, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(10, audioCtx.currentTime + 0.5);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.5);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.5);
        }

        function playGlassSound() {
            if (!audioCtx) return;
            // Generate white noise for glass shatter
            const bufferSize = audioCtx.sampleRate * 0.2;
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) {
                data[i] = Math.random() * 2 - 1;
            }
            const noise = audioCtx.createBufferSource();
            noise.buffer = buffer;
            
            const bandpass = audioCtx.createBiquadFilter();
            bandpass.type = 'highpass';
            bandpass.frequency.value = 4000;
            
            const gain = audioCtx.createGain();
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
            
            noise.connect(bandpass);
            bandpass.connect(gain);
            gain.connect(audioCtx.destination);
            noise.start();
        }

        function startMusic() {
            if (!audioCtx) return;
            let noteIndex = 0;
            const notes = [110, 110, 130, 110, 146.83, 110, 130, 98]; 
            
            musicInterval = setInterval(() => {
                if(state !== 'PLAYING') return;
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.type = 'square';
                osc.frequency.value = notes[noteIndex % notes.length];
                gain.gain.setValueAtTime(0.02, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.15);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.15);
                noteIndex++;
            }, 150);
        }

        function stopMusic() {
            clearInterval(musicInterval);
        }

        // --- Game Entities ---
        const player = {
            x: 100,
            y: 0,
            width: 24,
            height: 36,
            vy: 0,
            gravity: 0.6,
            jumpPower: -10,
            isGrounded: false,
            jumpCount: 0,
            maxJumps: 2,
            animFrame: 0
        };

        let buildings = [];
        let crates = [];
        let glasses = [];
        let particles = [];
        
        let baseSpeed = 6;
        let speed = baseSpeed;
        const maxSpeed = 18;
        const buildingColors = ['#222', '#333', '#1a1a1a'];

        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
        }
        window.addEventListener('resize', resize);
        resize();

        // --- Core Mechanics ---
        function resetGame() {
            score = 0;
            speed = baseSpeed;
            player.y = height / 2 - 100;
            player.vy = 0;
            player.jumpCount = 0;
            
            buildings = [];
            crates = [];
            glasses = [];
            particles = [];
            
            buildings.push({
                x: 0,
                y: height / 2,
                width: width,
                height: height / 2,
                color: '#222'
            });
        }

        function spawnParticles(x, y, type, count) {
            for (let i = 0; i < count; i++) {
                particles.push({
                    x: x,
                    y: y,
                    vx: type === 'dust' ? (Math.random() * -2 - speed/2) : (Math.random() * 6 - 3 + speed/3),
                    vy: type === 'dust' ? (Math.random() * -2) : (Math.random() * -6 - 2),
                    life: 1.0,
                    decay: Math.random() * 0.05 + 0.02,
                    type: type, // 'dust' or 'glass'
                    size: Math.random() * 4 + 2
                });
            }
        }

        function generateEnvironment() {
            const lastBuilding = buildings[buildings.length - 1];
            
            if (lastBuilding.x + lastBuilding.width < width + 100) {
                const gap = Math.random() * (speed * 15) + 50; 
                const newWidth = Math.random() * 400 + 300;
                
                let newY = lastBuilding.y + (Math.random() * 160 - 80);
                if (newY < height * 0.3) newY = height * 0.3;
                if (newY > height * 0.8) newY = height * 0.8;

                let b = {
                    x: lastBuilding.x + lastBuilding.width + gap,
                    y: newY,
                    width: newWidth,
                    height: height - newY,
                    color: buildingColors[Math.floor(Math.random() * buildingColors.length)]
                };
                buildings.push(b);

                // Spawn Crate or Glass
                const featureRand = Math.random();
                if (featureRand > 0.6) {
                    // Crate
                    crates.push({
                        x: b.x + b.width / 2 + (Math.random() * 100 - 50),
                        y: b.y - 40,
                        width: 40,
                        height: 40
                    });
                } else if (featureRand > 0.3) {
                    // Breakable Glass Panel
                    glasses.push({
                        x: b.x + 50,
                        y: b.y - 100,
                        width: 10,
                        height: 100,
                        broken: false
                    });
                }
            }

            // Cleanup
            buildings = buildings.filter(b => b.x + b.width > 0);
            crates = crates.filter(c => c.x + c.width > 0);
            glasses = glasses.filter(g => g.x + g.width > 0);
            particles = particles.filter(p => p.life > 0);
        }

        function jump() {
            if (state === 'START' || state === 'GAMEOVER') {
                initAudio();
                if (state === 'GAMEOVER') stopMusic();
                state = 'PLAYING';
                messageEl.style.display = 'none';
                resetGame();
                startMusic();
                return;
            }

            if (state === 'PLAYING' && player.jumpCount < player.maxJumps) {
                player.vy = player.jumpPower;
                player.isGrounded = false;
                player.jumpCount++;
                playJumpSound(player.jumpCount === 2);
                spawnParticles(player.x + player.width/2, player.y + player.height, 'dust', 5);
            }
        }

        // Inputs
        window.addEventListener('keydown', (e) => { if(e.code === 'Space') jump(); });
        window.addEventListener('touchstart', (e) => { e.preventDefault(); jump(); }, {passive: false});
        window.addEventListener('mousedown', jump);

        function checkCollision(r1, r2) {
            return (r1.x < r2.x + r2.width &&
                    r1.x + r1.width > r2.x &&
                    r1.y + r1.height > r2.y &&
                    r1.y < r2.y + r2.height);
        }

        function update() {
            if (state !== 'PLAYING') return;

            // Physics
            player.vy += player.gravity;
            player.y += player.vy;
            player.isGrounded = false;

            if (speed < maxSpeed) speed += 0.003;
            score += speed / 60; 
            scoreEl.innerText = Math.floor(score);

            generateEnvironment();

            // Particles Update
            for (let p of particles) {
                p.x += p.vx;
                p.y += p.vy;
                p.life -= p.decay;
                if (p.type === 'glass') p.vy += 0.5; // Gravity for glass
            }

            // Run dust effect
            if (player.isGrounded && Math.random() > 0.6) {
                spawnParticles(player.x, player.y + player.height, 'dust', 1);
            }

            // --- Collisions ---
            
            // Buildings
            for (let b of buildings) {
                b.x -= speed;
                if (checkCollision(player, b)) {
                    const prevBottom = (player.y - player.vy) + player.height;
                    if (prevBottom <= b.y + 10 && player.vy >= 0) {
                        player.y = b.y - player.height;
                        player.vy = 0;
                        player.isGrounded = true;
                        player.jumpCount = 0;
                    } else {
                        gameOver();
                    }
                }
            }

            // Crates (Act like solid mini-buildings)
            for (let c of crates) {
                c.x -= speed;
                if (checkCollision(player, c)) {
                    const prevBottom = (player.y - player.vy) + player.height;
                    if (prevBottom <= c.y + 10 && player.vy >= 0) {
                        player.y = c.y - player.height;
                        player.vy = 0;
                        player.isGrounded = true;
                        player.jumpCount = 0;
                    } else {
                        gameOver(); // Hit the side of a crate
                    }
                }
            }

            // Glass Panels (Break on impact)
            for (let g of glasses) {
                g.x -= speed;
                if (!g.broken && checkCollision(player, g)) {
                    g.broken = true;
                    playGlassSound();
                    spawnParticles(g.x, player.y + player.height/2, 'glass', 20);
                }
            }

            if (player.y > height) gameOver();

            if (player.isGrounded) {
                player.animFrame += speed * 0.05;
            }
        }

        function gameOver() {
            state = 'GAMEOVER';
            playCrashSound();
            stopMusic();
            
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('canabaltHighScore', highScore);
                highScoreEl.innerText = Math.floor(highScore);
            }
            
            messageEl.innerHTML = "CRASHED!<br><br>Tap to Restart";
            messageEl.style.display = 'block';
        }

        function draw() {
            ctx.fillStyle = '#e0e0e0';
            ctx.fillRect(0, 0, width, height);

            ctx.fillStyle = '#bcbcbc';
            for(let i=0; i<5; i++) {
                let px = ((i * 300) - (score * 5 % 300));
                ctx.fillRect(px, height - 200, 200, 200);
            }

            // Draw Buildings
            for (let b of buildings) {
                ctx.fillStyle = b.color;
                ctx.fillRect(b.x, b.y, b.width, height - b.y);
                
                ctx.fillStyle = '#555';
                ctx.fillRect(b.x, b.y, b.width, 4);
                
                for(let wx = b.x + 20; wx < b.x + b.width - 20; wx += 40) {
                    for(let wy = b.y + 30; wy < height; wy += 50) {
                        ctx.fillRect(wx, wy, 15, 25);
                    }
                }
            }

            // Draw Crates
            ctx.fillStyle = '#6b4c3a'; // Brown
            for (let c of crates) {
                ctx.fillRect(c.x, c.y, c.width, c.height);
                // Crate details
                ctx.strokeStyle = '#4a3325';
                ctx.lineWidth = 2;
                ctx.strokeRect(c.x, c.y, c.width, c.height);
                ctx.beginPath();
                ctx.moveTo(c.x, c.y);
                ctx.lineTo(c.x + c.width, c.y + c.height);
                ctx.moveTo(c.x + c.width, c.y);
                ctx.lineTo(c.x, c.y + c.height);
                ctx.stroke();
            }

            // Draw Glass
            for (let g of glasses) {
                if (!g.broken) {
                    ctx.fillStyle = 'rgba(150, 220, 255, 0.4)';
                    ctx.fillRect(g.x, g.y, g.width, g.height);
                    ctx.strokeStyle = 'rgba(255, 255, 255, 0.6)';
                    ctx.lineWidth = 1;
                    ctx.strokeRect(g.x, g.y, g.width, g.height);
                }
            }

            // Draw Particles
            for (let p of particles) {
                if (p.type === 'dust') {
                    ctx.fillStyle = `rgba(100, 100, 100, ${p.life})`;
                } else {
                    ctx.fillStyle = `rgba(180, 240, 255, ${p.life})`;
                }
                ctx.fillRect(p.x, p.y, p.size, p.size);
            }

            // Draw Player
            ctx.save();
            ctx.translate(player.x, player.y);
            
            let yOffset = player.isGrounded ? Math.sin(player.animFrame) * 2 : -3;

            ctx.fillStyle = '#111';
            ctx.fillRect(0, yOffset, player.width, player.height);
            
            ctx.fillStyle = '#fff';
            // Scarf length changes slightly based on speed
            ctx.fillRect(-15 - (speed/2), yOffset + 10, 20 + (speed/2), 4); 

            ctx.fillStyle = '#fff';
            ctx.fillRect(player.width - 10, yOffset - 5, 12, 10);

            ctx.restore();
        }

        function loop() {
            update();
            draw();
            animationId = requestAnimationFrame(loop);
        }

        resetGame();
        loop();

    </script>
</body>
</html>
