<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Ring Siege</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;background:#000;overflow:hidden;font-family:'Trebuchet MS',sans-serif;}
canvas{display:block;position:fixed;top:0;left:0;}
#ui{
  position:fixed;top:0;left:0;width:100%;height:100%;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  pointer-events:none;z-index:10;
}
#ui.active{pointer-events:all;}

.panel{
  text-align:center;padding:28px 24px;max-width:540px;width:92%;
  background:rgba(8,0,4,0.88);
  border:1px solid rgba(255,50,90,0.35);
  border-radius:16px;
  box-shadow:0 0 60px rgba(255,30,70,0.2),inset 0 0 40px rgba(255,30,70,0.04);
  backdrop-filter:blur(8px);
}

.title{
  font-size:clamp(38px,11vw,80px);
  font-weight:900;
  letter-spacing:6px;
  color:#ff2255;
  text-shadow:0 0 15px #ff2255,0 0 40px #ff225580,0 0 80px #ff225540;
  margin-bottom:4px;
  line-height:1;
}
.tagline{
  font-size:clamp(11px,2.8vw,16px);
  color:rgba(255,120,150,0.6);
  letter-spacing:3px;
  text-transform:uppercase;
  margin-bottom:28px;
}

.btn{
  display:inline-block;padding:14px 52px;
  background:rgba(30,0,10,0.95);
  border:2px solid #ff2255;
  color:#ff2255;
  font-size:clamp(16px,4vw,22px);
  font-weight:700;
  letter-spacing:3px;
  border-radius:10px;
  cursor:pointer;
  font-family:inherit;
  text-shadow:0 0 10px #ff2255;
  box-shadow:0 0 25px rgba(255,34,85,0.4),inset 0 0 15px rgba(255,34,85,0.08);
  transition:all 0.15s;
  outline:none;-webkit-appearance:none;
  pointer-events:all;
}
.btn:hover,.btn:active{
  background:rgba(60,0,20,0.95);
  box-shadow:0 0 45px rgba(255,34,85,0.7),inset 0 0 20px rgba(255,34,85,0.15);
}
.btn-ghost{
  background:transparent;
  border-color:rgba(255,34,85,0.4);
  color:rgba(255,34,85,0.6);
  font-size:clamp(13px,3vw,17px);
  padding:10px 36px;
  letter-spacing:2px;
}
.btn-ghost:hover,.btn-ghost:active{
  border-color:#ff2255;color:#ff2255;
  box-shadow:0 0 20px rgba(255,34,85,0.4);
}

.wave-title{
  font-size:clamp(22px,6vw,40px);
  font-weight:700;
  color:#ff2255;
  text-shadow:0 0 15px #ff2255;
  margin-bottom:6px;
  letter-spacing:2px;
}
.coins-label{
  font-size:clamp(14px,3.5vw,20px);
  color:#ffcc00;
  text-shadow:0 0 10px #ffcc0080;
  margin-bottom:22px;
  letter-spacing:1px;
}

.shop-grid{
  display:flex;gap:10px;justify-content:center;
  flex-wrap:wrap;margin-bottom:18px;
}
.ucard{
  background:rgba(30,4,12,0.95);
  border:2px solid rgba(255,50,90,0.5);
  border-radius:12px;
  padding:14px 10px;
  width:clamp(100px,28vw,130px);
  text-align:center;
  cursor:pointer;
  transition:all 0.13s;
  pointer-events:all;
}
.ucard:hover:not(.ucard-dim):not(.ucard-done){
  border-color:#ff2255;
  box-shadow:0 0 22px rgba(255,34,85,0.55);
  transform:translateY(-4px);
}
.ucard-done{
  border-color:#ffcc00;
  box-shadow:0 0 14px rgba(255,204,0,0.4);
  opacity:0.65;pointer-events:none;
}
.ucard-dim{opacity:0.35;pointer-events:none;}
.ucard .ic{font-size:clamp(28px,6vw,40px);display:block;margin-bottom:6px;}
.ucard .nm{font-size:clamp(11px,2.5vw,13px);font-weight:700;color:#fff;margin-bottom:3px;}
.ucard .ds{font-size:clamp(9px,2vw,11px);color:#999;margin-bottom:6px;line-height:1.35;}
.ucard .lv{font-size:10px;color:#666;margin-bottom:4px;}
.ucard .pr{font-size:clamp(13px,3vw,17px);font-weight:700;color:#ffcc00;text-shadow:0 0 8px #ffcc0080;}

.hs-row{font-size:clamp(12px,3vw,15px);color:#ffcc00;margin-bottom:18px;letter-spacing:1px;}
.stat-row{font-size:clamp(13px,3vw,16px);color:rgba(255,180,190,0.7);margin-bottom:5px;letter-spacing:1px;}
.stat-hi{color:#ffcc00;}

.hint{
  margin-top:18px;font-size:clamp(10px,2.3vw,13px);
  color:rgba(200,80,100,0.45);letter-spacing:1px;line-height:1.7;
}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui"></div>

<script>
'use strict';
// ═══════════════════════════════════════════════════════════
//  RING SIEGE  –  Neon dual-fire tower defence
// ═══════════════════════════════════════════════════════════

const CV  = document.getElementById('c');
const ctx = CV.getContext('2d');
const UI  = document.getElementById('ui');

let W, H, S;
function resize(){
  W = CV.width  = window.innerWidth;
  H = CV.height = window.innerHeight;
  S = Math.min(W, H);
}
resize();
window.addEventListener('resize', resize);

// ── Audio ────────────────────────────────────────────────
let AC = null;
function initAudio(){
  if(AC) return;
  try{ AC = new (window.AudioContext||window.webkitAudioContext)(); }catch(e){}
}

function tone(freq, freq2, type, vol, dur, delay=0){
  if(!AC) return;
  try{
    const o = AC.createOscillator(), g = AC.createGain();
    o.type = type;
    o.connect(g); g.connect(AC.destination);
    const t = AC.currentTime + delay;
    o.frequency.setValueAtTime(freq, t);
    if(freq2 !== freq) o.frequency.exponentialRampToValueAtTime(Math.max(1,freq2), t+dur);
    g.gain.setValueAtTime(vol, t);
    g.gain.exponentialRampToValueAtTime(0.0001, t+dur);
    o.start(t); o.stop(t+dur+0.02);
  }catch(e){}
}

function noise(vol, dur, cutoff){
  if(!AC) return;
  try{
    const n = AC.sampleRate*dur;
    const buf = AC.createBuffer(1, n, AC.sampleRate);
    const d = buf.getChannelData(0);
    for(let i=0;i<n;i++) d[i]=(Math.random()*2-1)*(1-i/n);
    const s = AC.createBufferSource();
    s.buffer = buf;
    const f = AC.createBiquadFilter(); f.type='lowpass'; f.frequency.value=cutoff;
    const g = AC.createGain(); g.gain.value=vol;
    s.connect(f); f.connect(g); g.connect(AC.destination);
    s.start(AC.currentTime);
  }catch(e){}
}

const SFX = {
  shoot:   ()=>{ tone(920,280,'square',0.14,0.08); },
  laser:   ()=>{ tone(1300,350,'sawtooth',0.12,0.11); },
  hit:     ()=>{ tone(550,250,'square',0.09,0.06); },
  death:   ()=>{ noise(0.4,0.22,900); tone(140,70,'sawtooth',0.18,0.18); },
  hurt:    ()=>{ tone(200,75,'sawtooth',0.55,0.22); noise(0.3,0.15,400); },
  clear:   ()=>{ [523,659,784,1047].forEach((f,i)=>tone(f,f,'sine',0.2,0.22,i*0.1)); },
  upgrade: ()=>{ [440,554,659,880].forEach((f,i)=>tone(f,f,'sine',0.18,0.18,i*0.07)); },
};

// ── Upgrade Definitions ───────────────────────────────────
const UPGRADES = [
  {id:'damage',   name:'Overcharge',  ic:'⚡', ds:'+25% bullet damage',          cost:3, max:10},
  {id:'firerate', name:'Rapid Fire',  ic:'🔥', ds:'+20% fire rate',               cost:4, max:8 },
  {id:'spread',   name:'Spread Shot', ic:'↔',  ds:'Fire 2 extra side bullets',    cost:5, max:3 },
  {id:'shield',   name:'Reinforce',   ic:'🛡', ds:'+2 maximum shield HP',         cost:3, max:10},
  {id:'repair',   name:'Field Repair',ic:'💚', ds:'Restore 1 shield HP now',      cost:4, max:999},
  {id:'velocity', name:'Velocity',    ic:'💨', ds:'+15% bullet speed',            cost:3, max:8 },
  {id:'pierce',   name:'Penetrator',  ic:'→',  ds:'Bullets pierce through enemies',cost:6,max:1 },
  {id:'range',    name:'Long Range',  ic:'📡', ds:'+20% targeting range',         cost:5, max:5 },
  {id:'salvage',  name:'Salvager',    ic:'💰', ds:'+25% coin rewards',            cost:3, max:5 },
  {id:'sprinkler',name:'Sprinkler',   ic:'✷',  ds:'Spray bullets in all 8 directions',cost:8,max:1},
  {id:'laser',    name:'Laser',       ic:'⟶',  ds:'Fire a piercing laser beam',   cost:5, max:1 },
];

// ── Game State ────────────────────────────────────────────
const G = {
  phase:'menu',
  wave:0, coins:0, score:0, highScore:0,
  upgrades:{},
  // derived
  dmg:1, fire:1, spd:1, maxHp:5, hp:5,
  spread:0, pierce:false, sprinkler:false, laserMode:false,
  rangeMult:1, coinMult:1,
};

function recalc(){
  const u = G.upgrades;
  G.dmg       = Math.pow(1.25, u.damage||0);
  G.fire      = Math.pow(1.20, u.firerate||0);
  G.spd       = Math.pow(1.15, u.velocity||0);
  G.maxHp     = 5 + (u.shield||0)*2;
  G.spread    = u.spread||0;
  G.pierce    = !!(u.pierce||0);
  G.sprinkler = !!(u.sprinkler||0);
  G.laserMode = !!(u.laser||0);
  G.rangeMult = Math.pow(1.20, u.range||0);
  G.coinMult  = 1 + (u.salvage||0)*0.25;
}

// ── Turret State ──────────────────────────────────────────
const T = {
  angle: -Math.PI/2,
  fireTimer: 0,
  shake: 0, shX: 0, shY: 0,
};

// ── Entity Pools ──────────────────────────────────────────
let enemies=[], bullets=[], particles=[], beams=[];
let waveTotal=0, waveSpawned=0, waveKilled=0, spawnT=0;

// ── Wave Scaling ──────────────────────────────────────────
const waveCount  = ()=> Math.floor(10 + G.wave*4 + G.wave*G.wave*0.15);
const baseHp     = ()=> 1.4 + G.wave*0.65 + G.wave*G.wave*0.05;
const baseSpeed  = ()=> S * Math.min(0.055 + G.wave*0.003, 0.12);

// ── Spawn Enemy ───────────────────────────────────────────
function spawnEnemy(type){
  const a = Math.random()*Math.PI*2;
  const r = S*0.56;
  const x = W/2 + Math.cos(a)*r;
  const y = H/2 + Math.sin(a)*r;
  const bh = baseHp(), bs = baseSpeed();
  const cfg = {
    basic:    {hp:bh,       spd:bs,      sz:S*.024, col:'#ff2255', val:1},
    fast:     {hp:bh*.45,   spd:bs*2.0,  sz:S*.016, col:'#ff9900', val:2},
    tank:     {hp:bh*6,     spd:bs*.4,   sz:S*.044, col:'#bb44ff', val:5},
    splitter: {hp:bh*2.2,   spd:bs*.75,  sz:S*.030, col:'#00ffcc', val:3},
    boss:     {hp:bh*25,    spd:bs*.28,  sz:S*.068, col:'#ff0088', val:25},
  }[type] || {hp:bh, spd:bs, sz:S*.024, col:'#ff2255', val:1};

  enemies.push({x,y,type,hp:cfg.hp,maxHp:cfg.hp,spd:cfg.spd,sz:cfg.sz,col:cfg.col,val:cfg.val,pt:Math.random()*Math.PI*2});
  waveSpawned++;
}

function enemyType(){
  const w = G.wave, r = Math.random();
  if(w%5===0 && waveSpawned===0) return 'boss';
  if(w>=7  && r<.08) return 'splitter';
  if(w>=5  && r<.13) return 'tank';
  if(w>=3  && r<.22) return 'fast';
  return 'basic';
}

// ── Firing ────────────────────────────────────────────────
function shoot(a){
  const spd = S*0.42*G.spd;
  bullets.push({
    x:W/2, y:H/2,
    vx:Math.cos(a)*spd, vy:Math.sin(a)*spd,
    dmg:G.dmg, life:2.8, sz:S*.013,
    pierce:G.pierce, hits:new Set(),
  });
}

function doFire(target){
  const a = Math.atan2(target.y - H/2, target.x - W/2);
  T.angle = a;

  if(G.sprinkler){
    for(let i=0;i<8;i++) shoot(i*Math.PI/4);
  } else if(G.laserMode){
    fireLaser(a); fireLaser(a+Math.PI);
    SFX.laser();
  } else {
    // Dual opposing shots – always both directions
    shoot(a); shoot(a+Math.PI);
    for(let s=1;s<=G.spread;s++){
      shoot(a + s*0.18); shoot(a - s*0.18);
      shoot(a+Math.PI + s*0.18); shoot(a+Math.PI - s*0.18);
    }
    SFX.shoot();
  }
  muzzle(a); muzzle(a+Math.PI);
}

function fireLaser(a){
  beams.push({a, life:.15, maxLife:.15});
  // Instant raycast damage
  const dx=Math.cos(a), dy=Math.sin(a);
  for(let j=enemies.length-1;j>=0;j--){
    const e=enemies[j];
    const ex=e.x-W/2, ey=e.y-H/2;
    const proj = ex*dx + ey*dy;
    const perp = Math.abs(ex*dy - ey*dx);
    if(proj>0 && proj<S && perp<e.sz+S*.012){
      e.hp -= G.dmg*2;
      spawnHitFX(e.x, e.y, e.col, 8);
      SFX.hit();
      if(e.hp<=0) killEnemy(j);
    }
  }
}

// ── Particles ─────────────────────────────────────────────
function muzzle(a){
  const ox=W/2+Math.cos(a)*S*.055, oy=H/2+Math.sin(a)*S*.055;
  for(let i=0;i<12;i++){
    const pa = a+(Math.random()-.5)*.7;
    const ps = S*(.04+Math.random()*.13);
    particles.push({x:ox,y:oy,vx:Math.cos(pa)*ps,vy:Math.sin(pa)*ps,
      life:.14+Math.random()*.1,maxLife:.24,col:'#ffffaa',sz:S*.007});
  }
}

function spawnHitFX(x,y,col,n=10){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2, sp=S*(.035+Math.random()*.1);
    particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,
      life:.22+Math.random()*.25,maxLife:.47,col,sz:S*(.004+Math.random()*.009)});
  }
}

function spawnDeathFX(x,y,col){
  for(let i=0;i<35;i++){
    const a=Math.random()*Math.PI*2, sp=S*(.05+Math.random()*.25);
    particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,
      life:.55+Math.random()*.65,maxLife:1.2,col,sz:S*(.007+Math.random()*.02)});
  }
  for(let i=0;i<18;i++){
    const a=Math.random()*Math.PI*2, sp=S*(.12+Math.random()*.32);
    particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,
      life:.18+Math.random()*.18,maxLife:.36,col:'#fff',sz:S*(.003+Math.random()*.007)});
  }
}

// ── Kill Enemy ────────────────────────────────────────────
function killEnemy(i){
  const e = enemies[i];
  spawnDeathFX(e.x, e.y, e.col);
  SFX.death();
  const c = Math.ceil(e.val * G.coinMult);
  G.coins += c; G.score += e.val*10; waveKilled++;

  // Splitter children
  if(e.type==='splitter'){
    for(let k=0;k<2;k++){
      const na=Math.random()*Math.PI*2;
      enemies.push({
        x:e.x+Math.cos(na)*e.sz*.5, y:e.y+Math.sin(na)*e.sz*.5,
        type:'basic', hp:e.maxHp*.3, maxHp:e.maxHp*.3,
        spd:e.spd*1.7, sz:e.sz*.55, col:e.col, val:1, pt:Math.random()*Math.PI*2
      });
      waveTotal++;
    }
  }
  enemies.splice(i,1);
}

// ── Game Flow ─────────────────────────────────────────────
function startGame(){
  G.phase='playing'; G.wave=0; G.coins=0; G.score=0; G.upgrades={};
  recalc(); G.hp=G.maxHp;
  enemies=[]; bullets=[]; particles=[]; beams=[];
  T.angle=-Math.PI/2; T.shake=0;
  UI.className=''; UI.innerHTML='';
  startWave();
}

function startWave(){
  G.wave++;
  waveTotal=waveCount(); waveSpawned=0; waveKilled=0; spawnT=0;
  G.phase='playing';
}

function playerHurt(){
  G.hp=Math.max(0, G.hp-1);
  T.shake=0.45;
  SFX.hurt();
  if(G.hp<=0) endGame();
}

function endGame(){
  G.phase='gameover';
  if(G.score>G.highScore){
    G.highScore=G.score;
    try{localStorage.setItem('rs2_hs',G.highScore);}catch(e){}
  }
  showGameOver();
}

// ── Update ────────────────────────────────────────────────
function update(dt){
  if(G.phase!=='playing') return;

  // Screen shake decay
  T.shake = Math.max(0, T.shake - dt*2.5);
  T.shX = (Math.random()-.5)*T.shake*S*.025;
  T.shY = (Math.random()-.5)*T.shake*S*.025;

  // Enemy spawning
  const si = Math.max(0.22, 1.5 - G.wave*.045);
  spawnT += dt;
  if(spawnT>=si && waveSpawned<waveTotal){
    spawnEnemy(enemyType());
    spawnT=0;
  }

  // Move enemies toward centre
  const cx=W/2, cy=H/2;
  for(let i=enemies.length-1;i>=0;i--){
    const e=enemies[i];
    const dx=cx-e.x, dy=cy-e.y, d=Math.hypot(dx,dy);
    if(d<S*.044){
      playerHurt();
      spawnHitFX(e.x,e.y,e.col,14);
      waveKilled++;
      enemies.splice(i,1);
      continue;
    }
    e.x+=(dx/d)*e.spd*dt;
    e.y+=(dy/d)*e.spd*dt;
    e.pt+=dt*3;
  }

  // Auto-aim
  const rl=S*.56*G.rangeMult;
  let near=null, nearD=Infinity;
  for(const e of enemies){
    const d=Math.hypot(e.x-cx, e.y-cy);
    if(d<nearD&&d<rl){near=e;nearD=d;}
  }

  // Fire
  const fi=0.5/G.fire;
  T.fireTimer+=dt;
  if(T.fireTimer>=fi && near){
    T.fireTimer=0;
    doFire(near);
  }

  // Move bullets
  for(let i=bullets.length-1;i>=0;i--){
    const b=bullets[i];
    b.x+=b.vx*dt; b.y+=b.vy*dt; b.life-=dt;
    if(b.life<=0||b.x<-60||b.x>W+60||b.y<-60||b.y>H+60){bullets.splice(i,1);continue;}
    let dead=false;
    for(let j=enemies.length-1;j>=0;j--){
      if(b.hits.has(j)) continue;
      const e=enemies[j];
      if(Math.hypot(b.x-e.x,b.y-e.y)<e.sz+b.sz){
        e.hp-=b.dmg; b.hits.add(j);
        spawnHitFX(b.x,b.y,e.col,6); SFX.hit();
        if(e.hp<=0) killEnemy(j);
        if(!b.pierce){dead=true;break;}
      }
    }
    if(dead) bullets.splice(i,1);
  }

  // Laser beams fade
  for(let i=beams.length-1;i>=0;i--){
    beams[i].life-=dt;
    if(beams[i].life<=0) beams.splice(i,1);
  }

  // Particles
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx*dt; p.y+=p.vy*dt;
    p.vx*=1-dt*3.5; p.vy*=1-dt*3.5;
    p.life-=dt;
    if(p.life<=0) particles.splice(i,1);
  }

  // Wave complete
  if(waveSpawned>=waveTotal && enemies.length===0 && G.phase==='playing'){
    G.phase='shop';
    SFX.clear();
    setTimeout(showShop, 400);
  }
}

// ── Render ────────────────────────────────────────────────
function render(t){
  ctx.clearRect(0,0,W,H);
  ctx.save();
  ctx.translate(T.shX, T.shY);

  drawBg();
  drawRings(t);
  drawBeams();
  for(const b of bullets) drawBullet(b);
  for(const p of particles) drawPart(p);
  for(const e of enemies) drawEnemy(e);
  drawTurret();

  ctx.restore();
  if(G.phase==='playing') drawHUD();
}

function drawBg(){
  const g=ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,S*.9);
  g.addColorStop(0,'#1e0009');
  g.addColorStop(.5,'#0e0004');
  g.addColorStop(1,'#000');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
}

function drawRings(t){
  const time=t*.001;
  ctx.save(); ctx.translate(W/2,H/2);
  for(let i=1;i<=6;i++){
    const r=S*.088*i;
    const dir = i%2===0?1:-1;
    const rot = time*.042*dir + i*(Math.PI/8);
    const alpha = .22 + (i/6)*.38;
    const gaps = 1+Math.floor(i/2);
    ctx.save(); ctx.rotate(rot);
    ctx.strokeStyle=`rgba(255,40,90,${alpha})`;
    ctx.lineWidth=1.8;
    ctx.shadowBlur=16; ctx.shadowColor='#ff2255';
    ctx.beginPath();
    for(let j=0;j<8;j++){
      const a0=(j/8)*Math.PI*2, a1=((j+1)/8)*Math.PI*2, mid=(a0+a1)/2;
      let skip=false;
      for(let g=0;g<gaps;g++){
        const ga=(g/gaps)*Math.PI*2;
        const diff=Math.abs(((mid-ga+Math.PI*3)%(Math.PI*2))-Math.PI);
        if(diff<.48){skip=true;break;}
      }
      if(!skip){
        const pad=.12, as=a0+(a1-a0)*pad, ae=a1-(a1-a0)*pad;
        ctx.moveTo(Math.cos(as)*r,Math.sin(as)*r);
        ctx.lineTo(Math.cos(ae)*r,Math.sin(ae)*r);
      }
    }
    ctx.stroke(); ctx.restore();
  }
  ctx.restore();
}

function drawTurret(){
  const x=W/2, y=H/2, r=S*.048;

  // Outer aura
  const aura=ctx.createRadialGradient(x,y,r*.4,x,y,r*2.8);
  aura.addColorStop(0,'rgba(255,40,90,.14)');
  aura.addColorStop(1,'rgba(255,40,90,0)');
  ctx.fillStyle=aura;
  ctx.beginPath(); ctx.arc(x,y,r*2.8,0,Math.PI*2); ctx.fill();

  // Shield HP ring
  const sr=r*1.68, frac=G.hp/G.maxHp;
  ctx.beginPath(); ctx.arc(x,y,sr,0,Math.PI*2);
  ctx.strokeStyle='rgba(255,40,90,.12)'; ctx.lineWidth=S*.009; ctx.stroke();

  if(frac>0){
    const col = frac>.6?'#00ff88':frac>.3?'#ffcc00':'#ff3333';
    ctx.save(); ctx.shadowBlur=20; ctx.shadowColor=col;
    ctx.beginPath(); ctx.arc(x,y,sr,-Math.PI/2,-Math.PI/2+Math.PI*2*frac);
    ctx.strokeStyle=col; ctx.lineWidth=S*.009; ctx.stroke(); ctx.restore();
  }

  // Base
  ctx.save(); ctx.shadowBlur=28; ctx.shadowColor='#ff2255';
  ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2);
  ctx.fillStyle='#180006'; ctx.fill();
  ctx.strokeStyle='#ff2255'; ctx.lineWidth=2.5; ctx.stroke(); ctx.restore();

  // Dual barrels (rotate with aim angle)
  ctx.save(); ctx.translate(x,y); ctx.rotate(T.angle);
  ctx.shadowBlur=22; ctx.shadowColor='#fff';
  const bl=r*1.55, bw=r*.22, bo=r*.3;
  ctx.fillStyle='#e0e0e0';
  // Front (forward direction)
  ctx.fillRect(r*.08, -bo-bw/2, bl, bw);
  ctx.fillRect(r*.08,  bo-bw/2, bl, bw);
  // Back (opposing direction)
  ctx.fillStyle='#b0b0b0';
  ctx.fillRect(-r*.08-bl, -bo-bw/2, bl, bw);
  ctx.fillRect(-r*.08-bl,  bo-bw/2, bl, bw);
  // Body
  const bs=r*.58;
  ctx.fillStyle='#ccc'; ctx.fillRect(-bs,-bs,bs*2,bs*2);
  ctx.fillStyle='#fff'; ctx.fillRect(-bs*.4,-bs*.4,bs*.8,bs*.8);
  ctx.restore();
}

function drawEnemy(e){
  const pulse=.85+Math.sin(e.pt)*.15, sz=e.sz*pulse;
  ctx.save(); ctx.translate(e.x,e.y);
  ctx.shadowBlur=24; ctx.shadowColor=e.col;

  ctx.beginPath();
  if(e.type==='tank'||e.type==='boss'){
    for(let i=0;i<6;i++){
      const a=(i/6)*Math.PI*2-Math.PI/6;
      i===0?ctx.moveTo(Math.cos(a)*sz,Math.sin(a)*sz):ctx.lineTo(Math.cos(a)*sz,Math.sin(a)*sz);
    }
  } else if(e.type==='fast'){
    const ta=Math.atan2(H/2-e.y,W/2-e.x);
    ctx.moveTo(Math.cos(ta)*sz,Math.sin(ta)*sz);
    ctx.lineTo(Math.cos(ta+2.5)*sz*.8,Math.sin(ta+2.5)*sz*.8);
    ctx.lineTo(Math.cos(ta-2.5)*sz*.8,Math.sin(ta-2.5)*sz*.8);
  } else {
    ctx.moveTo(0,-sz); ctx.lineTo(sz*.7,0);
    ctx.lineTo(0,sz); ctx.lineTo(-sz*.7,0);
  }
  ctx.closePath();
  ctx.fillStyle=e.col+'2a'; ctx.fill();
  ctx.strokeStyle=e.col; ctx.lineWidth=2.2; ctx.stroke();

  if(e.hp<e.maxHp){
    const bw=sz*2.5,bh=sz*.28,by=-sz*1.8;
    ctx.shadowBlur=0;
    ctx.fillStyle='#1a1a1a'; ctx.fillRect(-bw/2,by,bw,bh);
    ctx.fillStyle=e.col; ctx.fillRect(-bw/2,by,bw*(e.hp/e.maxHp),bh);
  }
  ctx.restore();
}

function drawBullet(b){
  ctx.save();
  ctx.shadowBlur=20; ctx.shadowColor='#ffee44';
  ctx.fillStyle='#ffffaa';
  ctx.beginPath(); ctx.arc(b.x,b.y,b.sz,0,Math.PI*2); ctx.fill();
  const sp=Math.hypot(b.vx,b.vy), nx=-b.vx/sp, ny=-b.vy/sp;
  for(let i=1;i<=5;i++){
    ctx.globalAlpha=(1-i/5)*.48;
    ctx.shadowBlur=8;
    ctx.fillStyle='#ffaa00';
    ctx.beginPath();
    ctx.arc(b.x+nx*b.sz*i*2, b.y+ny*b.sz*i*2, b.sz*(1-i/6), 0, Math.PI*2);
    ctx.fill();
  }
  ctx.globalAlpha=1; ctx.restore();
}

function drawBeams(){
  for(const lb of beams){
    const alpha=lb.life/lb.maxLife, len=S*.68;
    ctx.save(); ctx.globalAlpha=alpha;
    ctx.shadowBlur=35; ctx.shadowColor='#ff44ff';
    ctx.strokeStyle='#ff88ff'; ctx.lineWidth=S*.008; ctx.lineCap='round';
    ctx.beginPath();
    ctx.moveTo(W/2,H/2);
    ctx.lineTo(W/2+Math.cos(lb.a)*len, H/2+Math.sin(lb.a)*len);
    ctx.stroke();
    ctx.strokeStyle='#fff'; ctx.lineWidth=S*.002;
    ctx.beginPath();
    ctx.moveTo(W/2,H/2);
    ctx.lineTo(W/2+Math.cos(lb.a)*len, H/2+Math.sin(lb.a)*len);
    ctx.stroke();
    ctx.restore();
  }
}

function drawPart(p){
  const t=p.life/p.maxLife;
  ctx.save(); ctx.globalAlpha=t;
  ctx.shadowBlur=9; ctx.shadowColor=p.col;
  ctx.fillStyle=p.col;
  ctx.beginPath(); ctx.arc(p.x,p.y,p.sz*t,0,Math.PI*2); ctx.fill();
  ctx.restore();
}

function drawHUD(){
  const fs=Math.max(14, S*.036);
  ctx.save();
  ctx.font=`700 ${fs}px Trebuchet MS`; ctx.textBaseline='top';

  ctx.shadowBlur=12; ctx.shadowColor='#ff2255'; ctx.fillStyle='#ff2255';
  ctx.textAlign='left';  ctx.fillText(`Wave ${G.wave}`, 16, 16);
  ctx.textAlign='right'; ctx.fillText(`Score: ${G.score}`, W-16, 16);

  ctx.shadowColor='#ffcc00'; ctx.fillStyle='#ffcc00';
  ctx.textAlign='left'; ctx.fillText(`\u{1F4B0} ${G.coins}`, 16, 20+fs);

  ctx.shadowBlur=0; ctx.fillStyle='#777';
  ctx.textAlign='right';
  ctx.fillText(`Enemies: ${Math.max(0,waveTotal-waveKilled)}`, W-16, 20+fs);

  // HP pips
  const pr=S*.019, pg=pr*2.9;
  const sx=W/2-(G.maxHp*pg)/2+pg/2, py=H-44;
  for(let i=0;i<G.maxHp;i++){
    const px=sx+i*pg, filled=i<G.hp;
    ctx.shadowBlur=filled?14:0; ctx.shadowColor='#00ff88';
    ctx.beginPath(); ctx.arc(px,py,pr,0,Math.PI*2);
    ctx.fillStyle=filled?'#00ff88':'#111'; ctx.fill();
    ctx.strokeStyle='#00ff6644'; ctx.lineWidth=1.5; ctx.stroke();
  }
  ctx.restore();
}

// ── UI Panels ─────────────────────────────────────────────
function showMenu(){
  G.highScore = parseInt(localStorage.getItem('rs2_hs')||'0');
  UI.className='active';
  UI.innerHTML=`
    <div class="panel">
      <div class="title">RING SIEGE</div>
      <div class="tagline">Dual-Fire · Neon Defence · Infinite Waves</div>
      ${G.highScore>0?`<div class="hs-row">Best Score: ${G.highScore}</div>`:''}
      <button class="btn" onclick="startGame()">PLAY</button>
      <div class="hint">
        Your turret fires in two opposing directions at once<br>
        Survive each wave to earn coins and buy upgrades<br>
        Tap or click to override the auto-aim
      </div>
    </div>
  `;
}

function showShop(){
  const avail = UPGRADES.filter(u=>(G.upgrades[u.id]||0)<u.max);
  avail.sort(()=>Math.random()-.5);
  const picks = avail.slice(0,3);

  UI.className='active';
  UI.innerHTML=`
    <div class="panel">
      <div class="wave-title">Wave ${G.wave} Complete!</div>
      <div class="coins-label" id="shopCoins">\u{1F4B0} ${G.coins} coins available</div>
      <div class="shop-grid" id="shopGrid"></div>
      <button class="btn btn-ghost" id="contBtn">Continue \u2192</button>
    </div>
  `;

  const grid=document.getElementById('shopGrid');
  picks.forEach(upg=>{
    const lv=G.upgrades[upg.id]||0, af=G.coins>=upg.cost;
    const card=document.createElement('div');
    card.className='ucard'+(af?'':' ucard-dim');
    card.innerHTML=`
      <span class="ic">${upg.ic}</span>
      <div class="nm">${upg.name}</div>
      <div class="ds">${upg.ds}</div>
      ${lv>0?`<div class="lv">Level ${lv}</div>`:''}
      <div class="pr">\u{1F4B0} ${upg.cost}</div>
    `;
    if(af) card.addEventListener('click',()=>buyUpgrade(upg,card));
    grid.appendChild(card);
  });

  document.getElementById('contBtn').addEventListener('click',()=>{
    UI.className=''; UI.innerHTML='';
    startWave();
  });
}

function buyUpgrade(upg, card){
  if(G.coins<upg.cost) return;
  G.coins-=upg.cost;
  G.upgrades[upg.id]=(G.upgrades[upg.id]||0)+1;
  recalc();
  if(upg.id==='repair') G.hp=Math.min(G.maxHp,G.hp+1);
  SFX.upgrade();

  const el=document.getElementById('shopCoins');
  if(el) el.textContent=`\u{1F4B0} ${G.coins} coins available`;

  card.classList.add('ucard-done');
  card.style.pointerEvents='none';

  // Refresh affordability of remaining cards
  document.querySelectorAll('.ucard:not(.ucard-done)').forEach(c=>{
    const pr=c.querySelector('.pr');
    if(pr){
      const cost=parseInt(pr.textContent.replace(/[^\d]/g,''));
      if(G.coins<cost){ c.classList.add('ucard-dim'); c.style.pointerEvents='none'; }
    }
  });
}

function showGameOver(){
  UI.className='active';
  UI.innerHTML=`
    <div class="panel">
      <div style="font-size:clamp(38px,11vw,72px);font-weight:900;color:#ff2255;
        text-shadow:0 0 25px #ff2255,0 0 60px #ff225560;letter-spacing:4px;margin-bottom:16px;">
        GAME OVER
      </div>
      <div style="margin-bottom:22px;">
        <div class="stat-row">Score: <span class="stat-hi">${G.score}</span></div>
        <div class="stat-row">Wave Reached: <span class="stat-hi">${G.wave}</span></div>
        <div class="stat-row">Best Score: <span class="stat-hi">${G.highScore}</span></div>
      </div>
      <button class="btn" onclick="startGame()">PLAY AGAIN</button>
    </div>
  `;
}

// ── Input ─────────────────────────────────────────────────
function handleTap(px,py){
  if(G.phase!=='playing') return;
  initAudio();
  if(enemies.length===0) return;
  // Aim toward tap
  const ta=Math.atan2(py-H/2, px-W/2);
  let best=null, bestS=-Infinity;
  for(const e of enemies){
    const ea=Math.atan2(e.y-H/2,e.x-W/2);
    let d=Math.abs(ea-ta); if(d>Math.PI) d=Math.PI*2-d;
    const dist=Math.hypot(e.x-W/2,e.y-H/2);
    const score = -d*2 - dist*.0008;
    if(score>bestS){bestS=score;best=e;}
  }
  if(best){ doFire(best); T.fireTimer=-0.05; }
}

CV.addEventListener('click', e=>{ initAudio(); handleTap(e.clientX,e.clientY); });
CV.addEventListener('touchstart', e=>{ e.preventDefault(); initAudio(); handleTap(e.touches[0].clientX,e.touches[0].clientY); },{passive:false});

// ── Main Loop ─────────────────────────────────────────────
let lastT=0;
function loop(t){
  const dt=Math.min((t-lastT)/1000,.05);
  lastT=t;
  update(dt);
  render(t);
  requestAnimationFrame(loop);
}

G.highScore=parseInt(localStorage.getItem('rs2_hs')||'0');
showMenu();
requestAnimationFrame(t=>{ lastT=t; requestAnimationFrame(loop); });
</script>
