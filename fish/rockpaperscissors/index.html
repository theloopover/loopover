<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RPS Ultra</title>
    <style>
        :root { --bg: #000; --txt: #fff; --acc: #bb86fc; --dim: #555; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
        
        body {
            margin: 0; background: var(--bg); color: var(--txt);
            font-family: system-ui, -apple-system, sans-serif;
            height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }

        /* High-Efficiency Header */
        #header { text-align: center; padding: 20px 0 10px; flex-shrink: 0; }
        #mainScore { font-size: 5rem; font-weight: 900; line-height: 1; display: block; }
        .stats { font-size: 0.8rem; color: var(--dim); letter-spacing: 2px; margin-top: 5px; }

        #hint { text-align: center; color: var(--acc); font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px; height: 1rem; }

        /* Battlefield Layout */
        #stage {
            display: flex; justify-content: space-around; align-items: center;
            flex-grow: 1; position: relative; padding: 0 10px;
        }

        .char { display: flex; flex-direction: column; align-items: center; width: 40%; }
        .stick { width: 80px; height: 120px; stroke: #fff; stroke-width: 4; fill: none; }
        .cpu-s { stroke: var(--acc); }
        .hand { font-size: 4rem; height: 5rem; display: flex; align-items: center; justify-content: center; }

        #pool { font-size: 1.5rem; color: var(--acc); position: absolute; bottom: 20%; }

        /* Hardware Accelerated Overlays */
        #msg {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 2rem; font-weight: 900; text-align: center;
            opacity: 0; pointer-events: none; will-change: transform, opacity;
            background: rgba(0,0,0,0.9); padding: 10px 20px; border-radius: 8px; z-index: 10;
        }

        /* Controls: Optimized for Thumb & Mouse */
        #ctrls { padding: 20px; border-top: 1px solid #222; background: var(--bg); flex-shrink: 0; }
        .pane { display: none; gap: 10px; justify-content: center; }
        .active { display: flex; }

        button {
            flex: 1; max-width: 110px; height: 80px;
            background: none; border: 2px solid var(--dim); color: #fff;
            font-size: 2.5rem; border-radius: 12px; cursor: pointer;
            transition: transform 0.05s;
        }
        button:active { transform: scale(0.95); background: #222; border-color: #fff; }
        .btn-t { border-color: var(--acc); color: var(--acc); }

        /* Level Banner */
        #lvlUp {
            position: absolute; top: 0; width: 100%; background: var(--acc);
            color: #000; text-align: center; padding: 10px 0; font-weight: 900;
            transform: translateY(-100%); transition: transform 0.4s cubic-bezier(.18,.89,.32,1.28);
        }

        /* Fast Animations */
        .show { opacity: 1 !important; transform: translate(-50%, -50%) scale(1.1) !important; }
        .flash { animation: f 0.15s ease-out; }
        @keyframes f { 0% { background: #fff; } 100% { background: #000; } }
    </style>
</head>
<body id="body">

<div id="lvlUp">LEVEL UP</div>

<div id="header">
    <span id="mainScore">0</span>
    <div class="stats">LEVEL <span id="lv">1</span> • BEST <span id="hi">0</span></div>
</div>

<div id="hint">Pick your hands</div>

<div id="stage">
    <div class="char">
        <div id="pHand" class="hand">👤</div>
        <svg class="stick"><circle cx="40" cy="25" r="12"/><path d="M40 37v40m0-30H20m20 0h20m-20 30L25 110m15-33 15 33"/></svg>
    </div>
    
    <div id="pool">--</div>

    <div class="char">
        <div id="cHand" class="hand">🤖</div>
        <svg class="stick cpu-s"><rect x="28" y="13" width="24" height="24" rx="2"/><path d="M40 37v40m0-30H20m20 0h20m-20 30L25 110m15-33 15 33"/></svg>
    </div>
    <div id="msg"></div>
</div>

<div id="ctrls">
    <div id="pPool" class="pane active">
        <button data-v="0">🪨</button>
        <button data-v="1">📄</button>
        <button data-v="2">✂️</button>
    </div>
    <div id="pThrow" class="pane">
        <button id="t0" class="btn-t"></button>
        <button id="t1" class="btn-t"></button>
    </div>
</div>

<script>
    const icons = ["🪨", "📄", "✂️"], wins = {0:2, 1:0, 2:1};
    let state = { sc: 0, hi: localStorage.getItem('rps_v9') || 0, lv: 1, pP: [], cP: [] };

    const $ = id => document.getElementById(id);
    $('hi').textContent = state.hi;

    // Use Pointer Events for unified Mobile/PC control
    window.addEventListener('pointerdown', e => {
        const btn = e.target.closest('button');
        if (!btn) return;
        
        if (btn.parentNode.id === 'pPool') {
            const v = parseInt(btn.dataset.v);
            state.pP.push(v);
            $('pool').textContent = state.pP.map(i => icons[i]).join(' ') || '--';
            if (state.pP.length === 2) {
                state.cP = [Math.random()*3|0, Math.random()*3|0];
                $('cHand').textContent = "❓❓";
                $('t0').textContent = icons[state.pP[0]];
                $('t1').textContent = icons[state.pP[1]];
                $('pPool').classList.remove('active');
                $('pThrow').classList.add('active');
                $('hint').textContent = "Final move";
            } else {
                $('hint').textContent = "Pick another";
            }
        } 
        else if (btn.parentNode.id === 'pThrow') {
            resolve(state.pP[btn.id === 't0' ? 0 : 1]);
        }
    });

    function resolve(pt) {
        const isS = state.pP[0] === state.pP[1], ca = state.cP[0], cb = state.cP[1];
        let ct = (isS && (wins[ca]===pt || ca===pt)) ? ca : (wins[ca]===pt ? ca : (wins[cb]===pt ? cb : (Math.random()>.5?ca:cb)));
        
        $('pHand').textContent = icons[pt];
        $('cHand').textContent = icons[ct];
        $('pool').textContent = "";
        
        let p = 0, m = "LOSE";
        if (pt === ct) { if(isS){ m="MIRROR +1"; p=1; } else m="DRAW"; }
        else if (wins[pt] === ct) { if(isS){ m="SUPER WIN +2"; p=2; flash(); } else { m="WIN +1"; p=1; } }

        const r = $('msg');
        r.textContent = m; r.classList.add('show');
        
        update(p);
        setTimeout(reset, 1200);
    }

    function update(p) {
        state.sc += p;
        $('mainScore').textContent = state.sc;
        if (state.sc > state.hi) { state.hi = state.sc; localStorage.setItem('rps_v9', state.hi); $('hi').textContent = state.hi; }
        let nl = (state.sc / 5 | 0) + 1;
        if (nl > state.lv) { state.lv = nl; $('lv').textContent = state.lv; banner(); }
    }

    function flash() { $('body').classList.add('flash'); setTimeout(() => $('body').classList.remove('flash'), 150); }
    function banner() { $('lvlUp').style.transform = "translateY(0)"; setTimeout(() => $('lvlUp').style.transform = "translateY(-100%)", 1500); }

    function reset() {
        state.pP = [];
        $('msg').classList.remove('show');
        $('pHand').textContent = "👤";
        $('cHand').textContent = "🤖";
        $('pool').textContent = "--";
        $('hint').textContent = "Pick your hands";
        $('pThrow').classList.remove('active');
        $('pPool').classList.add('active');
    }
</script>
</body>
</html>
