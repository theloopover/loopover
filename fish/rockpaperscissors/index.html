<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RPS Ultra</title>
    <style>
        :root {
            --bg: #000000;
            --text: #ffffff;
            --accent: #bb86fc; /* Subtle purple for interactive elements */
            --subtle: #333333;
        }

        body {
            font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            touch-action: manipulation;
            -webkit-user-select: none;
            user-select: none;
        }

        /* Top Stats Bar - Simplified */
        #header {
            display: flex;
            justify-content: space-between;
            padding: 20px 30px;
            font-size: 1.2rem;
            font-weight: 300;
            letter-spacing: 1px;
            border-bottom: 1px solid var(--subtle);
        }

        .stat-group { display: flex; gap: 20px; }
        .stat-label { opacity: 0.5; font-size: 0.8rem; margin-right: 5px;}

        /* Central Battle Arena */
        #battlefield {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            flex-grow: 1;
            gap: 40px;
        }

        .hand-display {
            text-align: center;
            transition: transform 0.2s ease;
        }

        /* HUGE Icons */
        .hand-icon {
            font-size: 10rem; /* Ultra large */
            line-height: 1;
            display: block;
            filter: drop-shadow(0 0 15px rgba(255,255,255,0.1));
        }

        /* Flip CPU hand so they face each other */
        #cpuHand { transform: scaleX(-1); }

        /* Pool indicators (mini icons) */
        #poolIndicators {
            font-size: 2.5rem;
            margin-top: -20px;
            color: var(--accent);
            letter-spacing: 10px;
            height: 1.2em;
        }

        /* Bottom Controls Area */
        #controls {
            padding: 30px;
            padding-bottom: 50px; /* Extra space for modern phone home bars */
            border-top: 1px solid var(--subtle);
        }

        .panel {
            display: none;
            justify-content: center;
            gap: 20px;
            animation: fadeIn 0.4s ease;
        }

        .active { display: flex; }

        /* Sleek, Icon-only buttons */
        button {
            background: none;
            border: 2px solid var(--text);
            color: var(--text);
            font-size: 3.5rem;
            padding: 20px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s ease;
            flex: 1;
            max-width: 120px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        button:active {
            background-color: var(--text);
            color: var(--bg);
            transform: scale(0.95);
        }

        /* Throw buttons are slightly different colored border */
        .btn-throw {
            border-color: var(--accent);
            color: var(--accent);
        }

        .btn-throw:active {
            background-color: var(--accent);
            color: var(--bg);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Result Text - Minimal & centered */
        #resultText {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 2.5rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 3px;
            text-align: center;
            width: 100%;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .show-result { opacity: 1 !important; }

    </style>
</head>
<body>

    <div id="header">
        <div class="stat-group">
            <span><span class="stat-label">HI</span><span id="highScore">0</span></span>
        </div>
        <div class="stat-group">
            <span><span class="stat-label">LV</span><span id="level">1</span></span>
            <span><span class="stat-label">SC</span><span id="score">0</span></span>
        </div>
    </div>

    <div id="resultText"></div>

    <div id="battlefield">
        <div class="hand-display">
            <span class="hand-icon" id="cpuHand">🤖</span> </div>
        
        <div id="poolIndicators">❓❓</div>

        <div class="hand-display">
            <span class="hand-icon" id="playerHand">👤</span> </div>
    </div>

    <div id="controls">
        <div id="poolPanel" class="panel active">
            <button onclick="pickPool(0)">🪨</button>
            <button onclick="pickPool(1)">📄</button>
            <button onclick="pickPool(2)">✂️</button>
        </div>

        <div id="throwPanel" class="panel">
            <button id="throwBtn1" class="btn-throw" onclick="resolveRound(0)"></button>
            <button id="throwBtn2" class="btn-throw" onclick="resolveRound(1)"></button>
        </div>
    </div>

    <script>
        const icons = ["🪨", "📄", "✂️"];
        
        let gameState = {
            score: 0,
            highScore: localStorage.getItem('rps_ultra_highScore') || 0,
            level: 1,
            playerPool: [],
            cpuPool: []
        };

        document.getElementById('highScore').innerText = gameState.highScore;

        function pickPool(handIndex) {
            gameState.playerPool.push(handIndex);
            
            // Update the central pool indicators
            let p1 = gameState.playerPool[0] !== undefined ? icons[gameState.playerPool[0]] : "❓";
            let p2 = gameState.playerPool[1] !== undefined ? icons[gameState.playerPool[1]] : "❓";
            document.getElementById('poolIndicators').innerText = p1 + p2;

            if (gameState.playerPool.length === 2) {
                startThrowPhase();
            }
        }

        function startThrowPhase() {
            gameState.cpuPool = [Math.floor(Math.random() * 3), Math.floor(Math.random() * 3)];
            
            // Briefly show CPU pool in their big hand display, then hide it
            document.getElementById('cpuHand').innerText = icons[gameState.cpuPool[0]] + icons[gameState.cpuPool[1]];
            
            // Set up Throw Buttons
            document.getElementById('throwBtn1').innerText = icons[gameState.playerPool[0]];
            document.getElementById('throwBtn2').innerText = icons[gameState.playerPool[1]];

            // Switch panels
            document.getElementById('poolPanel').classList.remove('active');
            document.getElementById('throwPanel').classList.add('active');
        }

        function resolveRound(poolIndex) {
            const playerThrow = gameState.playerPool[poolIndex];
            const cpuThrow = gameState.cpuPool[Math.floor(Math.random() * 2)];
            const isSuperPair = gameState.playerPool[0] === gameState.playerPool[1];
            
            // Show final throws
            document.getElementById('playerHand').innerText = icons[playerThrow];
            document.getElementById('cpuHand').innerText = icons[cpuThrow];
            document.getElementById('poolIndicators').innerText = ""; // Clear pool view
            
            let points = 0;
            let resultKey = ""; // for simplified messages

            if (playerThrow === cpuThrow) {
                if (isSuperPair) {
                    resultKey = "SUPER DRAW"; points = 1;
                } else {
                    resultKey = "DRAW";
                }
            } else if ((playerThrow === 0 && cpuThrow === 2) || (playerThrow === 1 && cpuThrow === 0) || (playerThrow === 2 && cpuThrow === 1)) {
                if (isSuperPair) {
                    resultKey = "SUPER WIN"; points = 2;
                } else {
                    resultKey = "WIN"; points = 1;
                }
            } else {
                resultKey = "LOSE";
            }

            // Show central result message
            const resEl = document.getElementById('resultText');
            resEl.innerText = resultKey;
            resEl.classList.add('show-result');

            updateScore(points);
            setTimeout(resetRound, 1500);
        }

        function updateScore(p) {
            gameState.score += p;
            document.getElementById('score').innerText = gameState.score;
            if (gameState.score > gameState.highScore) {
                gameState.highScore = gameState.score;
                localStorage.setItem('rps_ultra_highScore', gameState.highScore);
                document.getElementById('highScore').innerText = gameState.highScore;
            }
            gameState.level = Math.floor(gameState.score / 5) + 1;
            document.getElementById('level').innerText = gameState.level;
        }

        function resetRound() {
            gameState.playerPool = [];
            gameState.cpuPool = [];
            
            // Reset Visuals
            document.getElementById('resultText').classList.remove('show-result');
            document.getElementById('playerHand').innerText = "👤";
            document.getElementById('cpuHand').innerText = "🤖";
            document.getElementById('poolIndicators').innerText = "❓❓";
            
            // Switch panels back
            document.getElementById('throwPanel').classList.remove('active');
            document.getElementById('poolPanel').classList.add('active');
        }
    </script>
</body>
</html>
